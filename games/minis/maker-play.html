<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Моя игра · Blue Cat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #eee; font-family: "Segoe UI", system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .top { width: min(960px, 100%); padding: 10px 14px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .top a { color: #5eb0ff; text-decoration: none; font-weight: 700; }
    .top h1 { font-size: 1.05rem; flex: 1; color: #ffcc00; }
    .btn { border: 0; border-radius: 10px; padding: 10px 16px; font-weight: 800; cursor: pointer; font: inherit; }
    .btn-go { background: linear-gradient(135deg,#3d8bfd,#1a5fd0); color: #fff; }
    .btn-sec { background: #222; color: #ddd; border: 1px solid #444; }
    canvas { background: #111; border: 2px solid #333; border-radius: 14px; max-width: 96vw; touch-action: none; display: block; margin: 8px auto; }
    .hud { width: min(960px, 100%); padding: 0 14px 8px; display: flex; gap: 14px; flex-wrap: wrap; font-size: 14px; color: #aaa; }
    .hud b { color: #ffcc00; }
    .msg { color: #888; padding: 40px 20px; text-align: center; }
    .pads { display: none; gap: 10px; margin: 8px; flex-wrap: wrap; justify-content: center; }
    .is-touch .pads { display: flex; }
    .pad { width: 56px; height: 56px; border-radius: 14px; border: 1px solid #444; background: #1a1a1a; color: #fff; font-size: 20px; font-weight: 800; }
  </style>
</head>
<body>
  <div class="top">
    <a href="../../index.html">⬅ На сайт</a>
    <a href="../../play.html?id=snake" id="backPlay" style="display:none">Описание</a>
    <h1 id="title">Моя игра</h1>
    <button type="button" class="btn btn-sec" id="restartBtn">Заново</button>
  </div>
  <div class="hud">
    <span>Очки: <b id="score">0</b></span>
    <span>Жизни: <b id="lives">3</b></span>
    <span id="hint">—</span>
  </div>
  <canvas id="c" width="800" height="480"></canvas>
  <div class="pads" id="pads">
    <button type="button" class="pad" data-k="left">◀</button>
    <button type="button" class="pad" data-k="up">▲</button>
    <button type="button" class="pad" data-k="down">▼</button>
    <button type="button" class="pad" data-k="right">▶</button>
    <button type="button" class="pad" data-k="action">⚡</button>
  </div>
  <p class="msg" id="err" hidden></p>
  <script>
(function () {
  const STORAGE = "portal_created_games_v1";
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  let game = null;
  let state = null;
  let keys = {};
  let last = 0;
  let running = false;

  if ("ontouchstart" in window || navigator.maxTouchPoints > 0) {
    document.documentElement.classList.add("is-touch");
  }

  function loadGame() {
    const id = (location.hash || "").replace(/^#/, "") || new URLSearchParams(location.search).get("id");
    if (!id) return null;
    try {
      const list = JSON.parse(localStorage.getItem(STORAGE) || "[]");
      return (list || []).find(g => g && g.id === id) || null;
    } catch { return null; }
  }

  function showError(msg) {
    document.getElementById("err").hidden = false;
    document.getElementById("err").textContent = msg;
    canvas.style.display = "none";
  }

  function init() {
    game = loadGame();
    if (!game) {
      showError("Игра не найдена. Создай её на сайте → вкладка «Создать игру».");
      return;
    }
    document.getElementById("title").textContent = (game.emoji || "🎮") + " " + game.title;
    const hints = {
      clicker: "Кликай / тапай по цели",
      dodge: "Стрелки / WASD — уворачивайся",
      catch: "Стрелки — лови падающее",
      memory: "Запомни и повтори цвета (клик)",
      runner: "Прыжок: ↑ / W / Пробел / ⚡",
      shooter: "Стрелки · ⚡ стрельба",
      builder: "Бегай по своей постройке · ⚡ прыжок",
      race: "Вправо / ⚡ ускорение · до финиша",
      platform: "←→ и прыжок по блокам",
      puzzle: "Кликай клетки — собери 3 в ряд"
    };
    document.getElementById("hint").textContent = (hints[game.type] || "Играй!") + " · герой: " + (game.hero || "custom");
    reset();
    running = true;
    last = performance.now();
    requestAnimationFrame(loop);
  }

  function mul() {
    return 0.7 + (Number(game.difficulty) || 2) * 0.35;
  }

  function defaultMap() {
    const cols = 16, rows = 8;
    const m = [];
    for (let y = 0; y < rows; y++) {
      const row = [];
      for (let x = 0; x < cols; x++) row.push(y === rows - 1 ? 1 : 0);
      m.push(row);
    }
    // platforms
    for (let x = 2; x < 6; x++) m[5][x] = 1;
    for (let x = 9; x < 14; x++) m[4][x] = 1;
    return m;
  }

  function reset() {
    const m = mul();
    const map = (game.map && game.map.length) ? game.map : defaultMap();
    state = {
      score: 0, lives: 3, t: 0, over: false, won: false,
      player: { x: 80, y: H - 80, vx: 0, vy: 0, r: 18, onGround: false },
      entities: [], target: { x: W/2, y: H/2, r: 28, pulse: 0 },
      spawn: 0, map: map,
      memorySeq: [Math.floor(Math.random()*4)], memoryStep: 0, memoryShow: true,
      memoryFlash: 0, memoryWait: 0.8, memoryInput: [],
      pads: [{color:"#e74c3c"},{color:"#3498db"},{color:"#2ecc71"},{color:"#f1c40f"}],
      puzzle: null, raceX: 40, finish: W - 60
    };
    if (game.type === "memory") {
      state.memoryFlash = state.memorySeq[0];
    }
    if (game.type === "puzzle") {
      state.puzzle = [];
      for (let i = 0; i < 36; i++) state.puzzle.push(Math.floor(Math.random() * 5));
    }
    if (game.type === "builder" || game.type === "platform") {
      state.player.x = 60;
      state.player.y = 100;
      state.player.vy = 0;
    }
    updateHud();
  }

  function updateHud() {
    document.getElementById("score").textContent = String(Math.floor(state.score));
    document.getElementById("lives").textContent = String(state.lives);
  }

  function endGame(win) {
    state.over = true;
    state.won = !!win;
  }

  function solidAt(px, py) {
    const map = state.map;
    if (!map || !map.length) return false;
    const rows = map.length, cols = map[0].length;
    const tw = W / cols, th = H / rows;
    const cx = Math.floor(px / tw), cy = Math.floor(py / th);
    if (cx < 0 || cy < 0 || cx >= cols || cy >= rows) return cy >= rows;
    return !!map[cy][cx];
  }

  function update(dt) {
    if (!state || state.over) return;
    state.t += dt;
    const type = game.type;
    const m = mul();
    const p = state.player;
    const left = keys.ArrowLeft || keys.a || keys.left;
    const right = keys.ArrowRight || keys.d || keys.right;
    const up = keys.ArrowUp || keys.w || keys.up || keys[" "] || keys.action;

    if (type === "clicker") {
      state.target.pulse += dt * 4;
    } else if (type === "dodge") {
      const spd = 220 * m;
      let dx = 0, dy = 0;
      if (left) dx -= 1; if (right) dx += 1;
      if (keys.ArrowUp || keys.w || keys.up) dy -= 1;
      if (keys.ArrowDown || keys.s || keys.down) dy += 1;
      if (dx || dy) {
        const len = Math.hypot(dx, dy) || 1;
        p.x += (dx / len) * spd * dt;
        p.y += (dy / len) * spd * dt;
      }
      p.x = Math.max(20, Math.min(W - 20, p.x));
      p.y = Math.max(20, Math.min(H - 20, p.y));
      state.spawn -= dt;
      if (state.spawn <= 0) {
        state.spawn = Math.max(0.25, 0.9 / m);
        const side = Math.floor(Math.random() * 4);
        const s = 80 + Math.random() * 120 * m;
        let x, y, vx, vy;
        if (side === 0) { x = Math.random()*W; y = -20; vx = (Math.random()-0.5)*60; vy = s; }
        else if (side === 1) { x = Math.random()*W; y = H+20; vx = (Math.random()-0.5)*60; vy = -s; }
        else if (side === 2) { x = -20; y = Math.random()*H; vx = s; vy = (Math.random()-0.5)*60; }
        else { x = W+20; y = Math.random()*H; vx = -s; vy = (Math.random()-0.5)*60; }
        state.entities.push({ x, y, vx, vy, r: 10 + Math.random()*10, kind: "bad" });
      }
      for (let i = state.entities.length - 1; i >= 0; i--) {
        const e = state.entities[i];
        e.x += e.vx * dt; e.y += e.vy * dt;
        if (e.x < -50 || e.x > W+50 || e.y < -50 || e.y > H+50) { state.entities.splice(i, 1); continue; }
        if (Math.hypot(e.x - p.x, e.y - p.y) < e.r + p.r) {
          state.entities.splice(i, 1);
          state.lives--; updateHud();
          if (state.lives <= 0) endGame(false);
        }
      }
      state.score = Math.floor(state.t * 10);
      updateHud();
      if (state.score >= 300) endGame(true);
    } else if (type === "catch") {
      const spd = 280 * m;
      if (left) p.x -= spd * dt;
      if (right) p.x += spd * dt;
      p.x = Math.max(30, Math.min(W - 30, p.x));
      p.y = H - 50;
      state.spawn -= dt;
      if (state.spawn <= 0) {
        state.spawn = Math.max(0.35, 0.85 / m);
        state.entities.push({
          x: 40 + Math.random() * (W - 80), y: -20,
          vy: 120 + Math.random() * 80 * m, r: 14,
          good: Math.random() > 0.25, kind: "fall"
        });
      }
      for (let i = state.entities.length - 1; i >= 0; i--) {
        const e = state.entities[i];
        e.y += e.vy * dt;
        if (e.y > H + 30) {
          state.entities.splice(i, 1);
          if (e.good) { state.lives--; updateHud(); if (state.lives <= 0) endGame(false); }
          continue;
        }
        if (Math.hypot(e.x - p.x, e.y - p.y) < e.r + 22) {
          state.entities.splice(i, 1);
          if (e.good) state.score += 10;
          else { state.lives--; if (state.lives <= 0) endGame(false); }
          updateHud();
        }
      }
      if (state.score >= 200) endGame(true);
    } else if (type === "memory") {
      if (state.memoryShow) {
        state.memoryWait -= dt;
        if (state.memoryWait <= 0) {
          state.memoryFlash = -1;
          state.memoryStep++;
          if (state.memoryStep >= state.memorySeq.length) {
            state.memoryShow = false; state.memoryStep = 0; state.memoryInput = [];
          } else {
            state.memoryFlash = state.memorySeq[state.memoryStep];
            state.memoryWait = 0.55;
          }
        }
      }
    } else if (type === "runner" || type === "race") {
      // auto run right with jump
      if (type === "runner") {
        p.x += 180 * m * dt;
        if (p.x > W + 40) { p.x = -20; state.score += 10; updateHud(); }
      } else {
        if (right || keys.action) p.x += 220 * m * dt;
        if (left) p.x -= 100 * dt;
        state.raceX = p.x;
        if (p.x >= state.finish) { state.score = 100; endGame(true); }
      }
      p.vy += 900 * dt;
      p.y += p.vy * dt;
      const ground = H - 60;
      if (p.y > ground) { p.y = ground; p.vy = 0; p.onGround = true; }
      else p.onGround = false;
      if (up && p.onGround) p.vy = -420;
      // obstacles
      state.spawn -= dt;
      if (state.spawn <= 0 && type === "runner") {
        state.spawn = Math.max(0.7, 1.4 / m);
        state.entities.push({ x: W + 20, y: ground, vx: -200 * m, r: 18, kind: "obs" });
      }
      for (let i = state.entities.length - 1; i >= 0; i--) {
        const e = state.entities[i];
        e.x += (e.vx || 0) * dt;
        if (e.x < -40) { state.entities.splice(i, 1); continue; }
        if (Math.hypot(e.x - p.x, e.y - p.y) < e.r + p.r) {
          state.entities.splice(i, 1);
          state.lives--; updateHud();
          if (state.lives <= 0) endGame(false);
        }
      }
      if (type === "runner" && state.score >= 80) endGame(true);
    } else if (type === "shooter") {
      const spd = 240 * m;
      if (left) p.x -= spd * dt;
      if (right) p.x += spd * dt;
      if (keys.ArrowUp || keys.w || keys.up) p.y -= spd * dt;
      if (keys.ArrowDown || keys.s || keys.down) p.y += spd * dt;
      p.x = Math.max(20, Math.min(W - 20, p.x));
      p.y = Math.max(20, Math.min(H - 20, p.y));
      if (keys.action || keys[" "]) {
        if (!state.shootCd || state.shootCd <= 0) {
          state.entities.push({ x: p.x, y: p.y - 20, vx: 0, vy: -400, r: 6, kind: "bullet" });
          state.shootCd = 0.2;
        }
      }
      state.shootCd = Math.max(0, (state.shootCd || 0) - dt);
      state.spawn -= dt;
      if (state.spawn <= 0) {
        state.spawn = Math.max(0.4, 0.9 / m);
        state.entities.push({ x: 40 + Math.random() * (W - 80), y: -20, vx: 0, vy: 80 + 40 * m, r: 16, kind: "enemy", hp: 1 });
      }
      for (let i = state.entities.length - 1; i >= 0; i--) {
        const e = state.entities[i];
        e.x += (e.vx || 0) * dt; e.y += (e.vy || 0) * dt;
        if (e.y > H + 40 || e.y < -40) { state.entities.splice(i, 1); continue; }
        if (e.kind === "enemy" && Math.hypot(e.x - p.x, e.y - p.y) < e.r + p.r) {
          state.entities.splice(i, 1); state.lives--; updateHud();
          if (state.lives <= 0) endGame(false);
          continue;
        }
        if (e.kind === "bullet") {
          for (let j = state.entities.length - 1; j >= 0; j--) {
            const o = state.entities[j];
            if (o.kind !== "enemy") continue;
            if (Math.hypot(e.x - o.x, e.y - o.y) < e.r + o.r) {
              state.entities.splice(j, 1);
              state.entities.splice(i, 1);
              state.score += 10; updateHud();
              if (state.score >= 150) endGame(true);
              break;
            }
          }
        }
      }
    } else if (type === "builder" || type === "platform") {
      // platformer on custom map
      const acc = 800, maxSpd = 220, grav = 1200, jump = -480;
      if (left) p.vx = -maxSpd;
      else if (right) p.vx = maxSpd;
      else p.vx *= 0.8;
      p.vy += grav * dt;
      // move x
      p.x += p.vx * dt;
      if (solidAt(p.x, p.y + p.r - 2) || solidAt(p.x, p.y - p.r + 2)) {
        p.x -= p.vx * dt; p.vx = 0;
      }
      // move y
      p.y += p.vy * dt;
      p.onGround = false;
      if (solidAt(p.x - p.r + 2, p.y + p.r) || solidAt(p.x + p.r - 2, p.y + p.r)) {
        // snap up
        while (solidAt(p.x, p.y + p.r)) p.y -= 1;
        p.vy = 0; p.onGround = true;
      }
      if (solidAt(p.x, p.y - p.r) && p.vy < 0) {
        p.vy = 0;
      }
      if (up && p.onGround) p.vy = jump;
      // coins
      state.spawn -= dt;
      if (state.spawn <= 0) {
        state.spawn = 1.2;
        state.entities.push({ x: 40 + Math.random() * (W - 80), y: 40 + Math.random() * (H - 160), r: 12, kind: "coin" });
      }
      for (let i = state.entities.length - 1; i >= 0; i--) {
        const e = state.entities[i];
        if (e.kind === "coin" && Math.hypot(e.x - p.x, e.y - p.y) < e.r + p.r) {
          state.entities.splice(i, 1);
          state.score += 10; updateHud();
          if (state.score >= 100) endGame(true);
        }
      }
      if (p.y > H + 40) {
        state.lives--; updateHud();
        p.x = 60; p.y = 80; p.vy = 0;
        if (state.lives <= 0) endGame(false);
      }
    } else if (type === "puzzle") {
      // idle — click handled in pointer
    }
  }

  function drawMap() {
    const map = state.map;
    if (!map || !map.length) return;
    const rows = map.length, cols = map[0].length;
    const tw = W / cols, th = H / rows;
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        if (!map[y][x]) continue;
        ctx.fillStyle = "#3d6b4f";
        ctx.fillRect(x * tw, y * th, tw + 0.5, th + 0.5);
        ctx.fillStyle = "#6bcf7f";
        ctx.fillRect(x * tw, y * th, tw + 0.5, 4);
      }
    }
  }

  function drawPlayer() {
    const p = state.player;
    const color = game.color || "#5eb0ff";
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    ctx.font = "20px Segoe UI";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(game.emoji || "🎮", p.x, p.y + 1);
  }

  function draw() {
    const color = game.color || "#5eb0ff";
    ctx.fillStyle = "#0d0d14";
    ctx.fillRect(0, 0, W, H);
    const type = game.type;

    if (type === "builder" || type === "platform") drawMap();

    if (type === "clicker") {
      const t = state.target;
      const r = t.r + Math.sin(state.target.pulse) * 4;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(t.x, t.y, r, 0, Math.PI * 2); ctx.fill();
      ctx.font = "bold 28px Segoe UI";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(game.emoji || "🎯", t.x, t.y);
      ctx.fillStyle = "#aaa";
      ctx.font = "16px Segoe UI";
      ctx.fillText("Кликай! Цель: 50", W/2, 36);
    } else if (type === "dodge" || type === "catch" || type === "shooter" || type === "runner" || type === "race" || type === "builder" || type === "platform") {
      if (type === "race") {
        ctx.fillStyle = "#333";
        ctx.fillRect(0, H - 40, W, 40);
        ctx.fillStyle = "#4ade80";
        ctx.fillRect(state.finish - 4, H - 120, 8, 80);
        ctx.fillStyle = "#fff";
        ctx.font = "14px Segoe UI";
        ctx.fillText("🏁", state.finish, H - 130);
      }
      if (type === "runner" || type === "race") {
        ctx.fillStyle = "#2a2a2a";
        ctx.fillRect(0, H - 42, W, 42);
      }
      for (const e of state.entities) {
        if (e.kind === "bad" || e.kind === "obs" || e.kind === "enemy") {
          ctx.fillStyle = "#e74c3c";
          ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill();
        } else if (e.kind === "fall") {
          ctx.fillStyle = e.good ? "#4ade80" : "#f87171";
          ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill();
          ctx.fillText(e.good ? "⭐" : "💣", e.x, e.y);
        } else if (e.kind === "bullet") {
          ctx.fillStyle = "#ffcc00";
          ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill();
        } else if (e.kind === "coin") {
          ctx.fillStyle = "#f1c40f";
          ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill();
          ctx.fillText("🪙", e.x, e.y);
        }
      }
      drawPlayer();
    } else if (type === "memory") {
      const padW = 160, padH = 140, gap = 24;
      const ox = (W - (padW * 2 + gap)) / 2;
      const oy = (H - (padH * 2 + gap)) / 2;
      state.pads.forEach((pad, i) => {
        const col = i % 2, row = Math.floor(i / 2);
        const x = ox + col * (padW + gap);
        const y = oy + row * (padH + gap);
        pad.x = x; pad.y = y; pad.w = padW; pad.h = padH;
        ctx.fillStyle = state.memoryFlash === i ? "#fff" : pad.color;
        ctx.globalAlpha = state.memoryFlash === i ? 1 : 0.75;
        ctx.fillRect(x, y, padW, padH);
        ctx.globalAlpha = 1;
      });
      ctx.fillStyle = "#aaa";
      ctx.font = "16px Segoe UI";
      ctx.textAlign = "center";
      ctx.fillText(state.memoryShow ? "Смотри…" : "Повтори!", W/2, 36);
    } else if (type === "puzzle") {
      const n = 6, cell = 56, gap = 6;
      const ox = (W - n * (cell + gap)) / 2;
      const oy = (H - n * (cell + gap)) / 2;
      const colors = ["#e74c3c", "#3498db", "#2ecc71", "#f1c40f", "#9b59b6"];
      for (let i = 0; i < 36; i++) {
        const x = i % n, y = Math.floor(i / n);
        const px = ox + x * (cell + gap), py = oy + y * (cell + gap);
        ctx.fillStyle = colors[state.puzzle[i] % 5];
        ctx.fillRect(px, py, cell, cell);
      }
      ctx.fillStyle = "#aaa";
      ctx.font = "16px Segoe UI";
      ctx.textAlign = "center";
      ctx.fillText("Кликни клетку — смени цвет. 3 в ряд = очки!", W/2, 36);
    }

    if (state.over) {
      ctx.fillStyle = "rgba(0,0,0,.72)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = state.won ? "#4ade80" : "#f87171";
      ctx.font = "bold 42px Segoe UI";
      ctx.textAlign = "center";
      ctx.fillText(state.won ? "🏆 Победа!" : "💀 Конец", W/2, H/2 - 10);
      ctx.fillStyle = "#fff";
      ctx.font = "20px Segoe UI";
      ctx.fillText("Очки: " + Math.floor(state.score) + " · Enter / Заново", W/2, H/2 + 30);
    }
  }

  function loop(now) {
    if (!running) return;
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function clickerHit(mx, my) {
    const t = state.target;
    if (Math.hypot(mx - t.x, my - t.y) <= t.r + 8) {
      state.score++;
      t.x = 60 + Math.random() * (W - 120);
      t.y = 60 + Math.random() * (H - 120);
      updateHud();
      if (state.score >= 50) endGame(true);
    }
  }

  function memoryClick(mx, my) {
    if (state.memoryShow || state.over) return;
    for (let i = 0; i < state.pads.length; i++) {
      const pad = state.pads[i];
      if (mx >= pad.x && mx <= pad.x + pad.w && my >= pad.y && my <= pad.y + pad.h) {
        state.memoryFlash = i;
        setTimeout(() => { if (state.memoryFlash === i) state.memoryFlash = -1; }, 200);
        const need = state.memorySeq[state.memoryInput.length];
        if (i !== need) {
          state.lives--; updateHud();
          if (state.lives <= 0) endGame(false);
          else {
            state.memoryInput = [];
            state.memoryShow = true; state.memoryStep = 0;
            state.memoryFlash = state.memorySeq[0]; state.memoryWait = 0.7;
          }
          return;
        }
        state.memoryInput.push(i);
        if (state.memoryInput.length >= state.memorySeq.length) {
          state.score += 10; updateHud();
          if (state.memorySeq.length >= 8) { endGame(true); return; }
          state.memorySeq.push(Math.floor(Math.random() * 4));
          state.memoryInput = [];
          state.memoryShow = true; state.memoryStep = 0;
          state.memoryFlash = state.memorySeq[0]; state.memoryWait = 0.7;
        }
        return;
      }
    }
  }

  function puzzleClick(mx, my) {
    if (state.over) return;
    const n = 6, cell = 56, gap = 6;
    const ox = (W - n * (cell + gap)) / 2;
    const oy = (H - n * (cell + gap)) / 2;
    const x = Math.floor((mx - ox) / (cell + gap));
    const y = Math.floor((my - oy) / (cell + gap));
    if (x < 0 || y < 0 || x >= n || y >= n) return;
    const i = y * n + x;
    state.puzzle[i] = (state.puzzle[i] + 1) % 5;
    // check matches
    let cleared = 0;
    for (let row = 0; row < n; row++) {
      for (let col = 0; col < n - 2; col++) {
        const a = state.puzzle[row * n + col];
        if (a === state.puzzle[row * n + col + 1] && a === state.puzzle[row * n + col + 2]) {
          state.puzzle[row * n + col] = Math.floor(Math.random() * 5);
          state.puzzle[row * n + col + 1] = Math.floor(Math.random() * 5);
          state.puzzle[row * n + col + 2] = Math.floor(Math.random() * 5);
          cleared += 3;
        }
      }
    }
    for (let col = 0; col < n; col++) {
      for (let row = 0; row < n - 2; row++) {
        const a = state.puzzle[row * n + col];
        if (a === state.puzzle[(row + 1) * n + col] && a === state.puzzle[(row + 2) * n + col]) {
          state.puzzle[row * n + col] = Math.floor(Math.random() * 5);
          state.puzzle[(row + 1) * n + col] = Math.floor(Math.random() * 5);
          state.puzzle[(row + 2) * n + col] = Math.floor(Math.random() * 5);
          cleared += 3;
        }
      }
    }
    if (cleared) {
      state.score += cleared;
      updateHud();
      if (state.score >= 60) endGame(true);
    }
  }

  function pointer(e) {
    if (!state || state.over) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top) * (H / rect.height);
    if (game.type === "clicker") clickerHit(mx, my);
    if (game.type === "memory") memoryClick(mx, my);
    if (game.type === "puzzle") puzzleClick(mx, my);
  }

  canvas.addEventListener("pointerdown", pointer);
  window.addEventListener("keydown", (e) => {
    keys[e.key] = true;
    if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," "].includes(e.key)) e.preventDefault();
    if (e.key === "Enter" && state && state.over) reset();
  });
  window.addEventListener("keyup", (e) => { keys[e.key] = false; });

  document.querySelectorAll(".pad").forEach(btn => {
    const k = btn.getAttribute("data-k");
    const down = (e) => { e.preventDefault(); keys[k] = true; };
    const up = (e) => { e.preventDefault(); keys[k] = false; };
    btn.addEventListener("pointerdown", down);
    btn.addEventListener("pointerup", up);
    btn.addEventListener("pointerleave", up);
  });

  document.getElementById("restartBtn").addEventListener("click", () => { if (game) reset(); });

  init();
})();
  </script>
</body>
</html>
