<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a40">
  <title>Пакман</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: "Segoe UI", Arial, sans-serif; color: #fff;
      background: radial-gradient(ellipse at 50% 0%, #1a1a4a, transparent 55%),
                  linear-gradient(160deg, #050510, #0a0a28 50%, #080818);
      padding: 12px; gap: 10px;
    }
    .top {
      width: min(448px, 96vw); display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .top a {
      color: #2a1200; text-decoration: none; font-weight: 800; padding: 8px 14px; border-radius: 999px;
      background: linear-gradient(135deg, #ffcc00, #ff9f1c); font-size: 14px;
    }
    .top a.ghost { background: rgba(255,255,255,.08); color: #9ecbff; border: 1px solid rgba(100,160,255,.3); }
    h1 { font-size: 1.35rem; color: #ffcc00; text-shadow: 0 0 18px rgba(255,204,0,.45); }
    .hud {
      width: min(448px, 96vw); display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap;
      background: rgba(0,0,0,.4); border: 1px solid rgba(80,120,255,.3); border-radius: 12px; padding: 10px 14px; font-weight: 700;
    }
    .hud b { color: #ffcc00; }
    canvas {
      width: min(448px, 96vw); height: auto;
      border: 4px solid #2233aa; border-radius: 12px; background: #000;
      box-shadow: 0 0 40px rgba(40,80,255,.35); touch-action: none; outline: none;
    }
    .hint { color: rgba(180,200,255,.75); font-size: 13px; text-align: center; max-width: 448px; line-height: 1.4; }
    .pad {
      display: none; grid-template-columns: 68px 68px 68px; gap: 8px; margin-top: 8px;
      touch-action: none; user-select: none;
    }
    @media (max-width: 900px), (pointer: coarse), (hover: none) { .pad { display: grid; } }
    .pad button {
      width: 68px; height: 56px; border: none; border-radius: 14px; font-size: 22px; font-weight: 800;
      background: rgba(80,120,255,.3); color: #fff; border: 2px solid rgba(100,140,255,.5); cursor: pointer;
      touch-action: none; -webkit-tap-highlight-color: transparent;
    }
    .pad button:active { background: rgba(255,204,0,.4); }
    .pad .empty { visibility: hidden; }
  </style>
</head>
<body>
  <div class="top">
    <a href="../../index.html">⬅ На сайт</a>
    <h1 style="display:flex;align-items:center;gap:10px">
      <img src="../../images/pacman.png" alt="" width="40" height="40"
           style="object-fit:contain;border-radius:8px"
           onerror="this.style.display='none'">
      Пакман
    </h1>
    <a class="ghost" href="../../index.html">Сайт</a>
  </div>
  <div class="hud">
    <span>Счёт: <b id="score">0</b></span>
    <span>Жизни: <b id="lives">3</b></span>
    <span id="status">Собирай точки!</span>
  </div>
  <canvas id="c" width="448" height="496" tabindex="0"></canvas>
  <p class="hint">Стрелки / WASD — ходить · Пробел — пауза · R — заново<br>Собери все точки, избегай призраков!</p>
  <div class="pad">
    <span class="empty"></span>
    <button type="button" data-d="0,-1">▲</button>
    <span class="empty"></span>
    <button type="button" data-d="-1,0">◀</button>
    <button type="button" data-d="0,1">▼</button>
    <button type="button" data-d="1,0">▶</button>
  </div>
<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const TILE = 16;
  // 0 wall, 1 path+dot, 2 empty path, 3 power, 4 gate
  const MAP = [
    "1111111111111111111111111111",
    "1............11............1",
    "1.1111.11111.11.11111.1111.1",
    "131111.11111.11.11111.111131",
    "1..........................1",
    "1.1111.11.11111111.11.1111.1",
    "1......11....11....11......1",
    "111111.11111.11.11111.111111",
    "000001.11..........11.100000",
    "000001.11.11144111.11.100000",
    "111111.11.1      1.11.111111",
    "..........1  GG  1..........",
    "111111.11.1      1.11.111111",
    "000001.11.11111111.11.100000",
    "000001.11..........11.100000",
    "111111.11.11111111.11.111111",
    "1............11............1",
    "1.1111.11111.11.11111.1111.1",
    "13...1................1...31",
    "1111.1.11.11111111.11.1.1111",
    "1......11....11....11......1",
    "1.1111111111.11.1111111111.1",
    "1..........................1",
    "1111111111111111111111111111",
  ];
  const ROWS = MAP.length;
  const COLS = MAP[0].length;

  function cell(x, y) {
    if (y < 0 || y >= ROWS || x < 0 || x >= COLS) return "1";
    return MAP[y][x];
  }
  function isWall(x, y) {
    const c = cell(x, y);
    return c === "1" || c === "0";
  }
  function canWalk(x, y, ghost) {
    const c = cell(x, y);
    if (c === "1" || c === "0") return false;
    if (c === "4" && !ghost) return false;
    return true;
  }

  let dots, score, lives, alive, paused, won, powerT, mouth, frame;
  let pac, ghosts, wantDir;

  const GHOST_COLORS = ["#ff4d6d", "#ff9ad5", "#6ecbff", "#ffa94d"];

  function buildDots() {
    dots = {};
    let n = 0;
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const c = MAP[y][x];
        if (c === "." || c === "3") {
          dots[x + "," + y] = c === "3" ? "power" : "dot";
          n++;
        }
      }
    }
    return n;
  }

  function resetLevel(full) {
    if (full) {
      score = 0;
      lives = 3;
    }
    buildDots();
    pac = { x: 13.5, y: 18.5, dir: { x: -1, y: 0 }, speed: 0.12 };
    wantDir = { x: -1, y: 0 };
    ghosts = [
      { x: 13.5, y: 11.5, dir: { x: 1, y: 0 }, color: GHOST_COLORS[0], speed: 0.095, home: true },
      { x: 12.5, y: 11.5, dir: { x: -1, y: 0 }, color: GHOST_COLORS[1], speed: 0.09, home: true },
      { x: 14.5, y: 11.5, dir: { x: 1, y: 0 }, color: GHOST_COLORS[2], speed: 0.09, home: true },
      { x: 13.5, y: 10.5, dir: { x: 0, y: -1 }, color: GHOST_COLORS[3], speed: 0.092, home: false },
    ];
    powerT = 0;
    alive = true;
    paused = false;
    won = false;
    mouth = 0;
    document.getElementById("score").textContent = score;
    document.getElementById("lives").textContent = lives;
    document.getElementById("status").textContent = "Собирай точки!";
  }

  function tileCenter(v) {
    return Math.abs(v - Math.floor(v) - 0.5) < 0.08;
  }

  function tryTurn(entity, dir, isGhost) {
    if (!dir.x && !dir.y) return;
    if (!tileCenter(entity.x) && !tileCenter(entity.y)) return;
    const nx = Math.floor(entity.x) + dir.x;
    const ny = Math.floor(entity.y) + dir.y;
    // snap to center for clean turns
    if (dir.x !== 0 && tileCenter(entity.y)) {
      if (canWalk(nx, Math.floor(entity.y), isGhost)) {
        entity.y = Math.floor(entity.y) + 0.5;
        entity.dir = { ...dir };
      }
    } else if (dir.y !== 0 && tileCenter(entity.x)) {
      if (canWalk(Math.floor(entity.x), ny, isGhost)) {
        entity.x = Math.floor(entity.x) + 0.5;
        entity.dir = { ...dir };
      }
    }
  }

  function moveEntity(e, isGhost) {
    let nx = e.x + e.dir.x * e.speed;
    let ny = e.y + e.dir.y * e.speed;
    // tunnel
    if (nx < 0) nx = COLS - 0.01;
    if (nx >= COLS) nx = 0.01;

    const lookX = e.dir.x > 0 ? Math.floor(nx + 0.45) : e.dir.x < 0 ? Math.floor(nx - 0.45) : Math.floor(e.x);
    const lookY = e.dir.y > 0 ? Math.floor(ny + 0.45) : e.dir.y < 0 ? Math.floor(ny - 0.45) : Math.floor(e.y);
    if (canWalk(lookX, lookY, isGhost)) {
      e.x = nx;
      e.y = ny;
    } else {
      e.x = Math.floor(e.x) + 0.5;
      e.y = Math.floor(e.y) + 0.5;
      if (isGhost) pickGhostDir(e);
    }
  }

  function pickGhostDir(g) {
    const opts = [
      { x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }
    ].filter(d => !(d.x === -g.dir.x && d.y === -g.dir.y));
    const valid = opts.filter(d => canWalk(Math.floor(g.x) + d.x, Math.floor(g.y) + d.y, true));
    if (!valid.length) {
      g.dir = { x: -g.dir.x, y: -g.dir.y };
      return;
    }
    // chase or flee
    let best = valid[0], bestScore = Infinity;
    for (const d of valid) {
      const tx = g.x + d.x - pac.x;
      const ty = g.y + d.y - pac.y;
      let dist = tx * tx + ty * ty;
      if (powerT > 0) dist = -dist;
      // leave home
      if (g.home && g.y > 10) dist -= 5;
      if (dist < bestScore || (Math.abs(dist - bestScore) < 0.1 && Math.random() < 0.4)) {
        bestScore = dist;
        best = d;
      }
    }
    g.dir = best;
    g.home = false;
  }

  function update() {
    if (!alive || paused || won) return;
    tryTurn(pac, wantDir, false);
    moveEntity(pac, false);

    // eat dots
    const px = Math.floor(pac.x), py = Math.floor(pac.y);
    const key = px + "," + py;
    if (dots[key]) {
      if (dots[key] === "power") {
        score += 50;
        powerT = 360;
      } else score += 10;
      delete dots[key];
      document.getElementById("score").textContent = score;
      if (!Object.keys(dots).length) {
        won = true;
        document.getElementById("status").textContent = "Победа! R — ещё раз";
      }
    }

    if (powerT > 0) powerT--;

    ghosts.forEach((g, i) => {
      g.speed = powerT > 0 ? 0.065 : 0.09 + i * 0.004;
      if (Math.random() < 0.04 || (tileCenter(g.x) && tileCenter(g.y))) pickGhostDir(g);
      moveEntity(g, true);

      const dx = g.x - pac.x, dy = g.y - pac.y;
      if (dx * dx + dy * dy < 0.45) {
        if (powerT > 0) {
          score += 200;
          document.getElementById("score").textContent = score;
          g.x = 13.5; g.y = 11.5; g.home = true;
        } else {
          lives--;
          document.getElementById("lives").textContent = lives;
          if (lives <= 0) {
            alive = false;
            document.getElementById("status").textContent = "Конец! R — заново";
          } else {
            pac.x = 13.5; pac.y = 18.5; pac.dir = { x: -1, y: 0 };
            wantDir = { x: -1, y: 0 };
            ghosts.forEach((gg, j) => {
              gg.x = 12.5 + j * 0.5; gg.y = 11.5; gg.home = true;
            });
            document.getElementById("status").textContent = "Осторожнее!";
          }
        }
      }
    });
    mouth += 0.25;
  }

  function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const c = MAP[y][x];
        if (c === "1") {
          ctx.fillStyle = "#1a2aff";
          ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
          ctx.strokeStyle = "#4466ff";
          ctx.strokeRect(x * TILE + 1, y * TILE + 1, TILE - 2, TILE - 2);
        } else if (c === "4") {
          ctx.fillStyle = "#ff9ad5";
          ctx.fillRect(x * TILE, y * TILE + TILE / 2 - 1, TILE, 2);
        }
      }
    }

    for (const [k, type] of Object.entries(dots)) {
      const [x, y] = k.split(",").map(Number);
      const cx = x * TILE + TILE / 2, cy = y * TILE + TILE / 2;
      if (type === "power") {
        ctx.fillStyle = "#ffdb4d";
        ctx.beginPath();
        ctx.arc(cx, cy, 5 + Math.sin(frame / 8) * 1.2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = "#ffccaa";
        ctx.beginPath();
        ctx.arc(cx, cy, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // pacman
    const px = pac.x * TILE, py = pac.y * TILE;
    const ang = Math.atan2(pac.dir.y, pac.dir.x);
    const open = 0.25 + Math.abs(Math.sin(mouth)) * 0.35;
    ctx.fillStyle = "#ffcc00";
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.arc(px, py, TILE * 0.45, ang + open, ang + Math.PI * 2 - open);
    ctx.closePath();
    ctx.fill();

    // ghosts
    ghosts.forEach(g => {
      const gx = g.x * TILE, gy = g.y * TILE;
      const scared = powerT > 0;
      ctx.fillStyle = scared ? (powerT < 80 && frame % 20 < 10 ? "#fff" : "#3355ff") : g.color;
      ctx.beginPath();
      ctx.arc(gx, gy - 2, TILE * 0.42, Math.PI, 0);
      ctx.lineTo(gx + TILE * 0.42, gy + TILE * 0.4);
      for (let i = 0; i < 3; i++) {
        const wx = gx + TILE * 0.42 - (i + 0.5) * (TILE * 0.28);
        ctx.lineTo(wx, gy + TILE * 0.2);
        ctx.lineTo(wx - TILE * 0.14, gy + TILE * 0.4);
      }
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(gx - 4, gy - 3, 3, 0, Math.PI * 2);
      ctx.arc(gx + 4, gy - 3, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#111";
      const lookX = scared ? 0 : Math.sign(pac.x - g.x) * 1.2;
      const lookY = scared ? 0 : Math.sign(pac.y - g.y) * 1.2;
      ctx.beginPath();
      ctx.arc(gx - 4 + lookX, gy - 3 + lookY, 1.5, 0, Math.PI * 2);
      ctx.arc(gx + 4 + lookX, gy - 3 + lookY, 1.5, 0, Math.PI * 2);
      ctx.fill();
    });

    if (paused) banner("ПАУЗА");
    if (!alive) banner("ИГРА ОКОНЧЕНА");
    if (won) banner("УРОВЕНЬ ПРОЙДЕН!");
  }

  function banner(t) {
    ctx.fillStyle = "rgba(0,0,0,.55)";
    ctx.fillRect(0, canvas.height / 2 - 40, canvas.width, 80);
    ctx.fillStyle = "#ffcc00";
    ctx.font = "bold 26px Segoe UI, Arial";
    ctx.textAlign = "center";
    ctx.fillText(t, canvas.width / 2, canvas.height / 2);
    ctx.fillStyle = "#fff";
    ctx.font = "14px Segoe UI, Arial";
    ctx.fillText("R — начать заново", canvas.width / 2, canvas.height / 2 + 28);
  }

  function setWant(x, y) { wantDir = { x, y }; }

  document.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (k === "arrowup" || k === "w") { e.preventDefault(); setWant(0, -1); }
    else if (k === "arrowdown" || k === "s") { e.preventDefault(); setWant(0, 1); }
    else if (k === "arrowleft" || k === "a") { e.preventDefault(); setWant(-1, 0); }
    else if (k === "arrowright" || k === "d") { e.preventDefault(); setWant(1, 0); }
    else if (k === " " || k === "escape") {
      e.preventDefault();
      if (alive && !won) {
        paused = !paused;
        document.getElementById("status").textContent = paused ? "Пауза" : "Собирай точки!";
      }
    } else if (k === "r") resetLevel(true);
  });

  document.querySelectorAll(".pad button").forEach(btn => {
    btn.addEventListener("click", () => {
      const [x, y] = btn.dataset.d.split(",").map(Number);
      setWant(x, y);
    });
  });

  score = 0;
  lives = 3;
  resetLevel(true);
  frame = 0;
  function loop() {
    frame++;
    update();
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  canvas.focus();
})();
</script>
</body>
</html>
