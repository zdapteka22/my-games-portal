<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a1410">
  <title>Лабиринт — Ёжик / Пин vs Няня</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: "Segoe UI", Arial, sans-serif; color: #fff;
      background: radial-gradient(ellipse at 40% 0%, #1a3a2a, transparent 50%),
                  linear-gradient(160deg, #0a1410, #0d1a14 50%, #06100a);
      padding: 12px; gap: 10px;
    }
    .top {
      width: min(520px, 96vw); display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .top a {
      color: #2a1200; text-decoration: none; font-weight: 800; padding: 8px 14px; border-radius: 999px;
      background: linear-gradient(135deg, #ffcc00, #ff9f1c); font-size: 14px;
    }
    .top a.ghost { background: rgba(255,255,255,.1); color: #b8ffc8; border: 1px solid rgba(100,255,140,.3); }
    h1 { font-size: 1.25rem; color: #7dff9a; text-shadow: 0 0 16px rgba(80,255,120,.35); }
    .hud {
      width: min(520px, 96vw); display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap;
      background: rgba(0,0,0,.4); border: 1px solid rgba(100,255,140,.25); border-radius: 12px; padding: 10px 14px; font-weight: 700;
    }
    .hud b { color: #ffcc00; }
    canvas {
      width: min(520px, 96vw); height: auto; aspect-ratio: 1;
      border: 4px solid #4caf50; border-radius: 14px; background: #0a1a10;
      box-shadow: 0 0 40px rgba(76,175,80,.3); touch-action: none; outline: none;
    }
    .hint { color: rgba(200,255,210,.75); font-size: 13px; text-align: center; max-width: 520px; line-height: 1.4; }
    .chars { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .chars button {
      border: 2px solid #4caf50; border-radius: 12px; background: rgba(20,40,25,.75); color: #fff;
      padding: 8px 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px;
    }
    .chars button.active { border-color: #ffcc00; background: rgba(60,50,10,.55); }
    .chars img { width: 36px; height: 36px; object-fit: contain; }
    .pad { display: none; grid-template-columns: 68px 68px 68px; gap: 8px; margin-top: 8px; touch-action: none; }
    @media (max-width: 900px), (pointer: coarse), (hover: none) { .pad { display: grid; } }
    .pad button {
      width: 68px; height: 56px; border: none; border-radius: 14px; font-size: 22px; font-weight: 800;
      background: rgba(100,255,140,.25); color: #fff; border: 2px solid rgba(100,255,140,.45); cursor: pointer;
      touch-action: none; -webkit-tap-highlight-color: transparent;
    }
    .pad button:active { background: rgba(255,204,0,.4); }
    .pad .empty { visibility: hidden; }
  </style>
</head>
<body>
  <div class="top">
    <a href="../../index.html">⬅ На сайт</a>
    <h1>🌀 Лабиринт</h1>
    <a class="ghost" href="../../index.html">Сайт</a>
  </div>
  <div class="chars" id="chars">
    <button type="button" class="active" data-hero="yozhik"><img src="../smeshariki/images/yozhik.png" alt=""> Ёжик</button>
    <button type="button" data-hero="pin"><img src="../smeshariki/images/pin.png" alt=""> Пин</button>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
    <button type="button" id="lMode1" style="padding:8px 12px;border-radius:10px;border:2px solid #ffcc00;background:#14301a;color:#7dff9a;font-weight:800">👤 1 игрок</button>
    <button type="button" id="lMode2" style="padding:8px 12px;border-radius:10px;border:2px solid #555;background:#111;color:#ddd;font-weight:800">👥 2 игрока / с другом</button>
  </div>
  <div class="hud">
    <span>Уровень: <b id="lvl">1</b></span>
    <span>Время: <b id="time">0</b>с</span>
    <span id="status">Найди выход ⭐ · Няня ловит!</span>
  </div>
  <canvas id="c" width="480" height="480" tabindex="0"></canvas>
  <p class="hint" id="lHint"><b>P1:</b> WASD · <b>P2:</b> стрелки · R новый · Пробел пауза<br>
    Ёжик/Пин vs Няня · добеги до ⭐ · вдвоём — кто первый</p>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:min(520px,96vw)">
    <div style="flex:1;min-width:120px">
      <div style="text-align:center;font-size:11px;font-weight:800;color:#7dff9a">P1</div>
      <div class="pad" data-pad="1" style="display:grid;grid-template-columns:56px 56px 56px;gap:6px;justify-content:center;margin:4px auto">
        <span class="empty"></span>
        <button type="button" data-d="0,-1">▲</button>
        <span class="empty"></span>
        <button type="button" data-d="-1,0">◀</button>
        <button type="button" data-d="0,1">▼</button>
        <button type="button" data-d="1,0">▶</button>
      </div>
    </div>
    <div id="lPad2" style="flex:1;min-width:120px;display:none">
      <div style="text-align:center;font-size:11px;font-weight:800;color:#ffb74d">P2</div>
      <div class="pad" data-pad="2" style="display:grid;grid-template-columns:56px 56px 56px;gap:6px;justify-content:center;margin:4px auto">
        <span class="empty"></span>
        <button type="button" data-d="0,-1">▲</button>
        <span class="empty"></span>
        <button type="button" data-d="-1,0">◀</button>
        <button type="button" data-d="0,1">▼</button>
        <button type="button" data-d="1,0">▶</button>
      </div>
    </div>
  </div>
<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const COLS = 21, ROWS = 21;
  const CELL = canvas.width / COLS;

  const imgHero = { yozhik: new Image(), pin: new Image() };
  imgHero.yozhik.src = "../smeshariki/images/yozhik.png";
  imgHero.pin.src = "../smeshariki/images/pin.png";
  const imgNanny = new Image();
  imgNanny.src = "../smeshariki/images/robonanny.png";

  let heroId = "yozhik";
  document.querySelectorAll("#chars button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#chars button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      heroId = btn.dataset.hero;
      document.getElementById("status").textContent =
        "Ты — " + (heroId === "pin" ? "Пин" : "Ёжик") + " · Няня ловит! ⭐";
    });
  });

  let grid, player, player2, nanny, exit, level, time, alive, won, paused, keys, hold, hold2;
  let twoPlayer = false;
  try {
    const m = new URLSearchParams(location.search).get("mode");
    if (m === "2" || m === "friend") twoPlayer = true;
  } catch (_) {}

  // 1 = wall, 0 = path
  function genMaze() {
    grid = Array.from({ length: ROWS }, () => Array(COLS).fill(1));
    function carve(x, y) {
      grid[y][x] = 0;
      const dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]];
      for (let i = dirs.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = dirs[i]; dirs[i] = dirs[j]; dirs[j] = t;
      }
      for (const [dx, dy] of dirs) {
        const nx = x + dx, ny = y + dy;
        if (nx > 0 && ny > 0 && nx < COLS - 1 && ny < ROWS - 1 && grid[ny][nx] === 1) {
          grid[y + dy / 2][x + dx / 2] = 0;
          carve(nx, ny);
        }
      }
    }
    carve(1, 1);
    // a few extra openings
    for (let i = 0; i < 18; i++) {
      const x = 1 + Math.floor(Math.random() * (COLS - 2));
      const y = 1 + Math.floor(Math.random() * (ROWS - 2));
      if (grid[y][x] === 1) {
        let n = 0;
        if (grid[y - 1]?.[x] === 0) n++;
        if (grid[y + 1]?.[x] === 0) n++;
        if (grid[y][x - 1] === 0) n++;
        if (grid[y][x + 1] === 0) n++;
        if (n >= 1) grid[y][x] = 0;
      }
    }
    grid[1][1] = 0;
    grid[ROWS - 2][COLS - 2] = 0;
  }

  function cellCenter(cx, cy) {
    return { x: (cx + 0.5) * CELL, y: (cy + 0.5) * CELL };
  }

  function syncLabUi() {
    const b1 = document.getElementById("lMode1");
    const b2 = document.getElementById("lMode2");
    if (b1) b1.style.borderColor = twoPlayer ? "#555" : "#ffcc00";
    if (b2) b2.style.borderColor = twoPlayer ? "#ffcc00" : "#555";
    const pad2 = document.getElementById("lPad2");
    if (pad2) pad2.style.display = twoPlayer ? "block" : "none";
  }

  function reset(full) {
    if (full) level = 1;
    genMaze();
    const start = cellCenter(1, 1);
    const start2 = cellCenter(1, 3);
    const end = cellCenter(COLS - 2, ROWS - 2);
    player = { x: start.x, y: start.y, r: CELL * 0.28, speed: 2.1 + level * 0.08 };
    player2 = { x: start2.x, y: start2.y, r: CELL * 0.28, speed: 2.1 + level * 0.08 };
    // nanny starts opposite-ish
    const mid = cellCenter(COLS - 2, 1);
    nanny = { x: mid.x, y: mid.y, r: CELL * 0.3, speed: 1.35 + level * 0.12 };
    exit = end;
    time = 0;
    alive = true;
    won = false;
    paused = false;
    keys = {};
    hold = { up: false, down: false, left: false, right: false };
    hold2 = { up: false, down: false, left: false, right: false };
    document.getElementById("lvl").textContent = level;
    document.getElementById("time").textContent = "0";
    document.getElementById("status").textContent = twoPlayer
      ? "2 игрока: P1 WASD · P2 стрелки · кто первый к ⭐"
      : "Найди выход ⭐ · Няня ловит!";
    syncLabUi();
  }

  function blocked(x, y, r) {
    const pts = [
      [x - r, y - r], [x + r, y - r], [x - r, y + r], [x + r, y + r], [x, y]
    ];
    for (const [px, py] of pts) {
      const cx = Math.floor(px / CELL), cy = Math.floor(py / CELL);
      if (cx < 0 || cy < 0 || cx >= COLS || cy >= ROWS) return true;
      if (grid[cy][cx] === 1) return true;
    }
    return false;
  }

  function moveEnt(ent, dx, dy) {
    const nx = ent.x + dx, ny = ent.y + dy;
    if (!blocked(nx, ent.y, ent.r * 0.85)) ent.x = nx;
    if (!blocked(ent.x, ny, ent.r * 0.85)) ent.y = ny;
  }

  function update() {
    if (!alive || paused || won) return;
    time += 1 / 60;
    if (Math.floor(time * 10) % 10 === 0) document.getElementById("time").textContent = String(Math.floor(time));

    let mx = 0, my = 0;
    if (keys["w"] || keys["W"] || hold.up) my -= 1;
    if (keys["s"] || keys["S"] || hold.down) my += 1;
    if (keys["a"] || keys["A"] || hold.left) mx -= 1;
    if (keys["d"] || keys["D"] || hold.right) mx += 1;
    if (!twoPlayer) {
      if (keys["ArrowUp"] || hold.up) my -= 1;
      if (keys["ArrowDown"] || hold.down) my += 1;
      if (keys["ArrowLeft"] || hold.left) mx -= 1;
      if (keys["ArrowRight"] || hold.right) mx += 1;
    }
    if (mx || my) {
      const len = Math.hypot(mx, my) || 1;
      moveEnt(player, (mx / len) * player.speed, (my / len) * player.speed);
    }
    if (twoPlayer) {
      let mx2 = 0, my2 = 0;
      if (keys["ArrowUp"] || hold2.up) my2 -= 1;
      if (keys["ArrowDown"] || hold2.down) my2 += 1;
      if (keys["ArrowLeft"] || hold2.left) mx2 -= 1;
      if (keys["ArrowRight"] || hold2.right) mx2 += 1;
      if (mx2 || my2) {
        const len2 = Math.hypot(mx2, my2) || 1;
        moveEnt(player2, (mx2 / len2) * player2.speed, (my2 / len2) * player2.speed);
      }
    }

    // nanny chases nearest player
    let target = player;
    if (twoPlayer) {
      const d1 = Math.hypot(player.x - nanny.x, player.y - nanny.y);
      const d2 = Math.hypot(player2.x - nanny.x, player2.y - nanny.y);
      if (d2 < d1) target = player2;
    }
    const dx = target.x - nanny.x, dy = target.y - nanny.y;
    const dist = Math.hypot(dx, dy) || 1;
    const tryX = (dx / dist) * nanny.speed;
    const tryY = (dy / dist) * nanny.speed;
    const ox = nanny.x, oy = nanny.y;
    moveEnt(nanny, tryX, 0);
    moveEnt(nanny, 0, tryY);
    if (nanny.x === ox && nanny.y === oy) {
      const opts = [[nanny.speed, 0], [-nanny.speed, 0], [0, nanny.speed], [0, -nanny.speed]];
      const o = opts[Math.floor(Math.random() * opts.length)];
      moveEnt(nanny, o[0], o[1]);
    }

    // catch either player
    const caught1 = Math.hypot(player.x - nanny.x, player.y - nanny.y) < player.r + nanny.r - 2;
    const caught2 = twoPlayer && Math.hypot(player2.x - nanny.x, player2.y - nanny.y) < player2.r + nanny.r - 2;
    if (caught1 || caught2) {
      alive = false;
      document.getElementById("status").textContent = "Няня поймала! R — заново";
    }
    // exit — first wins
    if (Math.hypot(player.x - exit.x, player.y - exit.y) < CELL * 0.45) {
      won = true;
      level++;
      document.getElementById("status").textContent = twoPlayer ? "P1 нашёл выход! След. уровень…" : "Выход! След. уровень…";
      setTimeout(() => { if (won) reset(false); }, 900);
    } else if (twoPlayer && Math.hypot(player2.x - exit.x, player2.y - exit.y) < CELL * 0.45) {
      won = true;
      level++;
      document.getElementById("status").textContent = "P2 нашёл выход! След. уровень…";
      setTimeout(() => { if (won) reset(false); }, 900);
    }
  }

  function draw() {
    // floor
    ctx.fillStyle = "#0a1a10";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (grid[y][x] === 1) {
          ctx.fillStyle = "#1b5e20";
          ctx.fillRect(x * CELL, y * CELL, CELL + 0.5, CELL + 0.5);
          ctx.strokeStyle = "#2e7d32";
          ctx.strokeRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
        } else {
          ctx.fillStyle = (x + y) % 2 ? "#0d2418" : "#0f2a1c";
          ctx.fillRect(x * CELL, y * CELL, CELL + 0.5, CELL + 0.5);
        }
      }
    }
    // exit
    ctx.fillStyle = "#ffcc00";
    ctx.beginPath();
    ctx.arc(exit.x, exit.y, CELL * 0.28, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = "bold " + Math.floor(CELL * 0.55) + "px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("⭐", exit.x, exit.y + 1);

    // nanny
    const ns = CELL * 0.85;
    if (imgNanny.complete && imgNanny.naturalWidth) {
      ctx.drawImage(imgNanny, nanny.x - ns / 2, nanny.y - ns / 2, ns, ns);
    } else {
      ctx.fillStyle = "#ef5350";
      ctx.beginPath();
      ctx.arc(nanny.x, nanny.y, nanny.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // players
    const hs = CELL * 0.8;
    function drawHero(ent, id, label) {
      const hero = imgHero[id];
      if (hero && hero.complete && hero.naturalWidth) {
        ctx.drawImage(hero, ent.x - hs / 2, ent.y - hs / 2, hs, hs);
      } else {
        ctx.fillStyle = id === "pin" ? "#90a4ae" : "#b39ddb";
        ctx.beginPath();
        ctx.arc(ent.x, ent.y, ent.r, 0, Math.PI * 2);
        ctx.fill();
      }
      if (label) {
        ctx.fillStyle = "#ffcc00";
        ctx.font = "bold 11px Segoe UI, Arial";
        ctx.textAlign = "center";
        ctx.fillText(label, ent.x, ent.y - hs / 2 - 4);
      }
    }
    drawHero(player, heroId, twoPlayer ? "P1" : "");
    if (twoPlayer) {
      const id2 = heroId === "pin" ? "yozhik" : "pin";
      drawHero(player2, id2, "P2");
    }

    if (paused) overlay("ПАУЗА");
    if (!alive) overlay("НЯНЯ ПОЙМАЛА!");
    if (won) overlay("ВЫХОД!");
  }

  function overlay(text) {
    ctx.fillStyle = "rgba(0,0,0,.55)";
    ctx.fillRect(0, canvas.height / 2 - 40, canvas.width, 80);
    ctx.fillStyle = "#ffcc00";
    ctx.font = "bold 26px Segoe UI, Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, canvas.width / 2, canvas.height / 2);
    ctx.fillStyle = "#fff";
    ctx.font = "14px Segoe UI, Arial";
    ctx.fillText("R — новый лабиринт", canvas.width / 2, canvas.height / 2 + 28);
  }

  document.getElementById("lMode1")?.addEventListener("click", () => { twoPlayer = false; reset(true); });
  document.getElementById("lMode2")?.addEventListener("click", () => { twoPlayer = true; reset(true); });

  document.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
    if (e.key === " " || e.key === "Escape") { if (alive && !won) paused = !paused; }
    if (e.key === "r" || e.key === "R") reset(true);
  });
  document.addEventListener("keyup", e => { keys[e.key] = false; });
  document.querySelectorAll(".pad button").forEach(btn => {
    const map = { "0,-1": "up", "0,1": "down", "-1,0": "left", "1,0": "right" };
    const k = map[btn.dataset.d];
    btn.addEventListener("pointerdown", e => {
      e.preventDefault();
      const pad = Number(btn.closest("[data-pad]")?.getAttribute("data-pad") || 1);
      if (pad === 2) hold2[k] = true; else hold[k] = true;
    });
    btn.addEventListener("pointerup", e => {
      e.preventDefault();
      const pad = Number(btn.closest("[data-pad]")?.getAttribute("data-pad") || 1);
      if (pad === 2) hold2[k] = false; else hold[k] = false;
    });
    btn.addEventListener("pointerleave", e => {
      const pad = Number(btn.closest("[data-pad]")?.getAttribute("data-pad") || 1);
      if (pad === 2) hold2[k] = false; else hold[k] = false;
    });
  });

  reset(true);
  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }
  canvas.focus();
  canvas.addEventListener("click", () => canvas.focus());
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
