<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>🤖 Собери Железную няню</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Segoe UI",system-ui,sans-serif;background:linear-gradient(160deg,#1a1020,#201018,#0a0a12);color:#eee;min-height:100vh;padding:12px}
    .top{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
    .top a{text-decoration:none;font-weight:800;padding:8px 14px;border-radius:999px;background:linear-gradient(135deg,#ffcc00,#ff9f1c);color:#2a1200}
    h1{font-size:1.1rem;color:#ef9a9a;flex:1}
    .card{background:#1a1218;border:1px solid #4a3040;border-radius:16px;padding:14px;max-width:720px;margin:0 auto}
    p{color:#aab;font-size:14px;margin:0 0 12px;line-height:1.4}
    canvas{display:block;width:100%;max-width:680px;margin:0 auto;border-radius:12px;border:3px solid #c66;background:#120a10;touch-action:none;cursor:pointer}
    .score{text-align:center;font-weight:800;color:#ffcc00;margin:8px 0;font-size:18px}
    .bar{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
    button{border:0;border-radius:12px;padding:12px 16px;font-weight:800;font:inherit;cursor:pointer;background:linear-gradient(135deg,#ef5350,#c62828);color:#fff}
  </style>
</head>
<body>
  <div class="top">
    <a href="../smeshariki/index.html">⬅ Смешарики</a>
    <h1>🤖 Собери Железную няню</h1>
    <a href="../../index.html" style="background:#243038;color:#ffc;border:1px solid #456;text-decoration:none;font-weight:800;padding:8px 14px;border-radius:999px">Портал</a>
  </div>
  <div class="card">
    <p>Собери няню <b>сверху вниз</b>: Голова → Тело → Руки → Ноги. Кликай детали в верном порядке!</p>
    <div class="score" id="score">Деталь 1/4 · Ошибки: 0</div>
    <canvas id="c" width="680" height="440"></canvas>
    <div class="bar"><button type="button" id="again">↻ Заново</button></div>
  </div>
  <script>
(function(){
  const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
  const nanny=new Image();nanny.src='../smeshariki/images/robonanny.png';
  const PARTS=[
    {id:0,name:'Голова',emoji:'🤖',color:'#ef9a9a'},
    {id:1,name:'Тело',emoji:'📦',color:'#e57373'},
    {id:2,name:'Руки',emoji:'💪',color:'#ef5350'},
    {id:3,name:'Ноги',emoji:'🦵',color:'#c62828'}
  ];
  let order=[],need=0,err=0,won=false,slots=[];
  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
  function reset(){
    need=0;err=0;won=false;
    order=shuffle(PARTS.map(p=>({...p})));
    slots=order.map((p,i)=>({...p,x:40+i*160,y:280,w:140,h:100,placed:false}));
    upd();draw();
  }
  function upd(){document.getElementById('score').textContent=won?'✅ Няня собрана!':'Деталь '+(need+1)+'/4 · Ошибки: '+err}
  function draw(){
    ctx.clearRect(0,0,680,440);
    const g=ctx.createLinearGradient(0,0,0,440);g.addColorStop(0,'#2a1520');g.addColorStop(1,'#100810');
    ctx.fillStyle=g;ctx.fillRect(0,0,680,440);
    ctx.fillStyle='#ffcc00';ctx.font='bold 22px Segoe UI';ctx.textAlign='center';
    ctx.fillText(won?'НЯНЯ ГОТОВА!':'Сборка Железной няни',340,36);
    // silhouette slots top to bottom
    const bodySlots=[{y:70,h:50,label:'1 Голова'},{y:125,h:70,label:'2 Тело'},{y:200,h:40,label:'3 Руки'},{y:245,h:30,label:'4 Ноги'}];
    bodySlots.forEach((s,i)=>{
      ctx.fillStyle=i<need?'#4a2030':'#2a1520';
      round(250,s.y,180,s.h,10);ctx.fill();
      ctx.strokeStyle=i===need?'#ffcc00':'#666';ctx.lineWidth=i===need?3:1;ctx.stroke();
      if(i<need){ctx.font='20px serif';ctx.fillText(PARTS[i].emoji,340,s.y+s.h/2+8)}
      else{ctx.fillStyle='#888';ctx.font='12px Segoe UI';ctx.fillText(s.label,340,s.y+s.h/2+4)}
    });
    if(nanny.complete&&nanny.naturalWidth&&won) ctx.drawImage(nanny,520,80,120,120);
    slots.forEach(p=>{
      if(p.placed)return;
      ctx.fillStyle=p.color;round(p.x,p.y,p.w,p.h,12);ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='bold 15px Segoe UI';ctx.fillText(p.emoji+' '+p.name,p.x+p.w/2,p.y+p.h/2+6);
    });
  }
  function round(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
  function pos(e){const r=canvas.getBoundingClientRect();const t=e.changedTouches?e.changedTouches[0]:e;return{x:(t.clientX-r.left)*(canvas.width/r.width),y:(t.clientY-r.top)*(canvas.height/r.height)}}
  function tap(e){if(won)return;e.preventDefault();const m=pos(e);for(const p of slots){if(p.placed)continue;if(m.x>=p.x&&m.x<=p.x+p.w&&m.y>=p.y&&m.y<=p.y+p.h){if(p.id===need){p.placed=true;need++;if(need>=4)won=true}else{err++}upd();draw();return}}}
  canvas.addEventListener('click',tap);canvas.addEventListener('touchend',tap,{passive:false});
  document.getElementById('again').onclick=reset;nanny.onload=draw;reset();
})();
  </script>
</body>
</html>
