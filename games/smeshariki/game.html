        ctx.strokeStyle = selected ? ch.color : (hovered ? '#fff' : '#555');
        ctx.lineWidth = selected ? 5 : 2;
        roundRect(c.x, c.y, c.w, c.h, 16);
        ctx.fill();
        ctx.stroke();

        const img = images[ch.img];
        const imgSize = ch.isPacman ? 70 : 72;
        if (img && img.complete && img.naturalWidth) {
            ctx.drawImage(img, cx - imgSize / 2, c.y + 18, imgSize, imgSize);
        } else if (ch.drawStyle) {
            const fake = { x: cx, y: c.y + 54, size: imgSize, drawStyle: ch.drawStyle };
            drawFallbackSprite(fake);
        } else {
            ctx.fillStyle = ch.color;
            ctx.beginPath();
            ctx.arc(cx, c.y + 54, 32, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.fillStyle = selected ? '#ffcc00' : '#fff';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(ch.name, cx, c.y + 120);

        ctx.fillStyle = '#ccc';
        ctx.font = '10px Arial';
        ctx.fillText(ch.desc, cx, c.y + 140);

        ctx.fillStyle = ch.color;
        ctx.font = '9px Arial';
        if (gameMode === 'chase' || gameMode === 'tag' || gameMode === 'custom' || gameMode === 'race' || gameMode === 'pac') {
            ctx.fillText('Скорость ' + ch.speed, cx, c.y + 162);
        } else {
            ctx.fillText('HP ' + ch.hp + ' · Урон ' + ch.damage, cx, c.y + 162);
        }

        if (selected) {
            ctx.fillStyle = '#ffcc00';
            ctx.font = 'bold 13px Arial';
            ctx.fillText('★ ВЫБРАН', cx, c.y + c.h - 12);
        }
        ctx.restore();
    });

    const cur = selectList[selectedIndex] || selectList[0];
    if (!cur) return;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    roundRect(160, 440, 580, 140, 14);
    ctx.fill();
    ctx.fillStyle = cur.color;
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(cur.name + (gameMode === 'chase' ? ' — БЕГИ ЗА 🥕!'
        : gameMode === 'tag' ? ' — СТАРТУЕТ ГОЛЕЙ!'
        : gameMode === 'race' ? ' — НА СТАРТ!'
        : gameMode === 'pac' ? (cur.id === 'robonanny' ? ' — ПРИЗРАК! ЛОВИ!' : ' — ПАКМАН! ЕШЬ 🥕!')
        : gameMode === 'custom' ? ' — ПРОЙДИ УРОВЕНЬ!'
        : ' — В БОЙ!'), 450, 478);
    ctx.fillStyle = '#ffeeaa';
    ctx.font = '14px Arial';
    ctx.fillText('Описание: ' + cur.desc, 450, 505);
    ctx.fillStyle = '#fff';
    ctx.font = '14px Arial';
    if (gameMode === 'chase') {
        ctx.fillText('Режим Догонялки: собери ' + CARROTS_TO_WIN + ' 🥕 первым. Няня ловит — скорость ' + cur.speed, 450, 528);
    } else if (gameMode === 'tag') {
        ctx.fillText('Режим Голя: ты водящий ' + TAG_ROUND_SEC + ' сек. Кого коснёшься — тот станет голей', 450, 528);
    } else if (gameMode === 'race') {
        ctx.fillText('Гонки: беги вправо к финишу! Shift — ускорение. Скорость героя ' + cur.speed, 450, 528);
    } else if (gameMode === 'pac') {
        if (cur.id === 'robonanny') {
            ctx.fillText('👻 Ты ПРИЗРАК-НЯНЯ! Лови Пина, Кроша и Ёжика (у них 3❤)', 450, 528);
        } else {
            ctx.fillText('Пакман: ешь 🥕 · золотая 🥕 → няня синяя · можно выбрать няню!', 450, 528);
        }
    } else if (gameMode === 'custom') {
        const g = customLevel ? customLevel.goalCarrots : 5;
        ctx.fillText('Свой уровень: собери ' + g + ' 🥕, стены мешают, няня (если есть) ловит. Скорость ' + cur.speed, 450, 528);
    } else {
        ctx.fillText('Режим Битва: HP ' + cur.hp + ' · Урон ' + cur.damage + ' · Скорость ' + cur.speed + ' · бей и выживи', 450, 528);
    }
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 18px Arial';
    ctx.fillText('Enter / клик — начать  ·  Esc — к режимам', 450, 558);

    drawMusicToast();
    if (showExitDialog) drawExitDialog();
}

function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
}

function pickAt(mx, my) {
    const cards = cardLayout();
    for (let i = 0; i < cards.length; i++) {
        const c = cards[i];
        if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) return i;
    }
    return -1;
}

// ——— Игровая отрисовка ———
function drawField() {
    if (gameMode === 'pac') {
        // тёмный фон как в Пакмане
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, 900, 600);
        ctx.fillStyle = '#0a0a28';
        for (let i = 0; i < 18; i++) {
            ctx.beginPath();
            ctx.arc(40 + i * 50, 40 + (i % 4) * 120, 18, 0, Math.PI * 2);
            ctx.fill();
        }
        drawPacMazeWalls();
        return;
    }
    ctx.fillStyle = gameMode === 'chase' || gameMode === 'custom' ? '#c8e6c9'
        : gameMode === 'tag' ? '#e1bee7'
        : '#f4e8c0';
    ctx.fillRect(0, 0, 900, 600);
    ctx.fillStyle = gameMode === 'chase' || gameMode === 'custom' ? '#a5d6a7'
        : gameMode === 'tag' ? '#ce93d8'
        : '#e8d9a8';
    for (let i = 0; i < 12; i++) {
        ctx.beginPath();
        ctx.arc(80 + i * 70, 80 + (i % 3) * 40, 30, 0, Math.PI * 2);
        ctx.fill();
    }
    // грядки в догонялках / своём уровне
    if (gameMode === 'chase' || gameMode === 'custom') {
        ctx.strokeStyle = 'rgba(76,120,40,0.25)';
        ctx.lineWidth = 2;
        for (let y = 80; y < 560; y += 40) {
            ctx.beginPath();
            ctx.moveTo(60, y);
            ctx.lineTo(840, y);
            ctx.stroke();
        }
    }
    if (gameMode === 'tag') {
        ctx.strokeStyle = 'rgba(123,31,162,0.2)';
        ctx.lineWidth = 2;
        for (let y = 80; y < 560; y += 45) {
            ctx.beginPath();
            ctx.moveTo(60, y);
            ctx.lineTo(840, y);
            ctx.stroke();
        }
    }
    if (gameMode === 'custom' && customLevel) {
        drawCustomWalls(customLevel.walls);
    }
}

function drawCarrot(c) {
    // В режиме Пакман — вместо точек рисуем морковки (маленькие / power — крупнее)
    if (gameMode === 'pac') {
        const pulse = 1 + Math.sin(c.pulse) * 0.12;
        const scale = (c.power ? 0.55 : 0.32) * pulse;
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.scale(scale, scale);
        // свечение
        ctx.fillStyle = c.power ? 'rgba(255,220,80,0.35)' : 'rgba(255,152,0,0.28)';
        ctx.beginPath();
        ctx.arc(0, 0, c.power ? 28 : 22, 0, Math.PI * 2);
        ctx.fill();
        // тело моркови
        ctx.fillStyle = c.power ? '#ffc107' : '#ff6d00';
        ctx.beginPath();
        ctx.moveTo(0, 16);
        ctx.quadraticCurveTo(11, 3, 7, -9);
        ctx.lineTo(-7, -9);
        ctx.quadraticCurveTo(-11, 3, 0, 16);
        ctx.closePath();
        ctx.fill();
        // полоски
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(4, 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-3, 7); ctx.lineTo(3, 9); ctx.stroke();
        // ботва
        ctx.fillStyle = '#66bb6a';
        ctx.beginPath();
        ctx.moveTo(-3, -9);
        ctx.quadraticCurveTo(-9, -20, -1, -24);
        ctx.quadraticCurveTo(0, -14, 0, -9);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(3, -9);
        ctx.quadraticCurveTo(9, -20, 1, -24);
        ctx.quadraticCurveTo(0, -14, 0, -9);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        return;
    }
    const s = 1 + Math.sin(c.pulse) * 0.12;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(s, s);
    // свечение
    ctx.fillStyle = 'rgba(255,152,0,0.25)';
    ctx.beginPath();
    ctx.arc(0, 0, 26, 0, Math.PI * 2);
    ctx.fill();
    // тело моркови
    ctx.fillStyle = '#ff6d00';
    ctx.beginPath();
    ctx.moveTo(0, 18);
    ctx.quadraticCurveTo(12, 4, 8, -10);
    ctx.lineTo(-8, -10);
    ctx.quadraticCurveTo(-12, 4, 0, 18);
    ctx.closePath();
    ctx.fill();
    // полоски
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(5, 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-4, 8); ctx.lineTo(4, 10); ctx.stroke();
    // ботва
    ctx.fillStyle = '#43a047';
    ctx.beginPath();
    ctx.moveTo(-4, -10);
    ctx.quadraticCurveTo(-10, -22, -2, -26);
    ctx.quadraticCurveTo(0, -16, 0, -10);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, -10);
    ctx.quadraticCurveTo(2, -24, 8, -28);
    ctx.quadraticCurveTo(6, -16, 4, -10);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(2, -10);
    ctx.quadraticCurveTo(12, -20, 10, -26);
    ctx.quadraticCurveTo(4, -18, 4, -10);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

function drawAllCarrots() {
    for (const c of carrots) drawCarrot(c);
}

function drawKnifeOnGround() {
    if (!knife.onGround) return;
    const s = 1 + Math.sin(knife.pulse) * 0.15;
    ctx.save();
    ctx.translate(knife.x, knife.y);
    ctx.rotate(knife.pulse);
    ctx.scale(s, s);
    ctx.fillStyle = 'rgba(255,0,0,0.25)';
    ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ccc'; ctx.fillRect(-4, -22, 8, 28);
    ctx.fillStyle = '#8b0000';
    ctx.beginPath(); ctx.moveTo(0, -22); ctx.lineTo(10, -8); ctx.lineTo(-10, -8); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#444'; ctx.fillRect(-7, 4, 14, 5);
    ctx.restore();
    ctx.fillStyle = '#ff2222';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('НОЖ!', knife.x, knife.y + 38);
}
function drawKnifeHeld(ent) {
    if (!ent.hasKnife || ent.hp <= 0 || (ent.isPacman && ent.dead)) return;
    const a = ent.angle, kx = ent.x + Math.cos(a) * 22, ky = ent.y + Math.sin(a) * 22;
    ctx.save();
    ctx.translate(kx, ky);
    ctx.rotate(a + Math.PI / 4);
    ctx.fillStyle = '#ccc'; ctx.fillRect(-3, -16, 6, 20);
    ctx.fillStyle = '#ff0000';
    ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(8, -4); ctx.lineTo(-8, -4); ctx.closePath(); ctx.fill();
    ctx.restore();
    if (knife.heldBy === ent) {
        const sec = knifeHoldSecondsLeft();
        const urgent = sec <= 5;
        ctx.fillStyle = urgent ? '#ff2222' : '#ffcc00';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        const kills = knife.killsLeft || 0;
        const label = '🔪 ' + sec + 'с · ×' + kills;
        ctx.strokeText(label, ent.x, ent.y - ent.size / 2 - 28);
        ctx.fillText(label, ent.x, ent.y - ent.size / 2 - 28);
        const barW = 50, barH = 6;
        const bx = ent.x - barW / 2, by = ent.y - ent.size / 2 - 22;
        const t = knife.holdMax > 0 ? knife.holdTimer / knife.holdMax : 0;
        ctx.fillStyle = '#333';
        ctx.fillRect(bx, by, barW, barH);
        ctx.fillStyle = urgent ? '#ff2222' : '#ff9800';
        ctx.fillRect(bx, by, barW * t, barH);
    }
}

function drawFallbackSprite(ent) {
    const r = ent.size / 2;
    const style = ent.drawStyle;
    ctx.save();
    ctx.translate(ent.x, ent.y);
    if (style === 'barash') {
        ctx.fillStyle = '#f8bbd0';
        ctx.beginPath(); ctx.arc(0, 0, r * 0.85, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#f48fb1';
        for (let i = 0; i < 8; i++) {
            const a = (i / 8) * Math.PI * 2;
            ctx.beginPath();
            ctx.arc(Math.cos(a) * r * 0.7, Math.sin(a) * r * 0.7, r * 0.28, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-r * 0.28, -r * 0.1, r * 0.18, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(r * 0.28, -r * 0.1, r * 0.18, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.arc(-r * 0.28, -r * 0.1, r * 0.08, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(r * 0.28, -r * 0.1, r * 0.08, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#c2185b';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, r * 0.2, r * 0.25, 0.1, Math.PI - 0.1); ctx.stroke();
    } else if (style === 'kopatych') {
        ctx.fillStyle = '#8d6e63';
        ctx.beginPath(); ctx.arc(0, 0, r * 0.9, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#6d4c41';
        ctx.beginPath(); ctx.arc(-r * 0.55, -r * 0.55, r * 0.32, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(r * 0.55, -r * 0.55, r * 0.32, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffcc80';
        ctx.beginPath(); ctx.ellipse(0, r * 0.15, r * 0.45, r * 0.38, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.arc(-r * 0.22, -r * 0.15, r * 0.09, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(r * 0.22, -r * 0.15, r * 0.09, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#3e2723';
        ctx.beginPath(); ctx.ellipse(0, r * 0.22, r * 0.12, r * 0.08, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#43a047';
        ctx.beginPath();
        ctx.moveTo(-r * 0.5, -r * 0.5);
        ctx.lineTo(0, -r * 1.05);
        ctx.lineTo(r * 0.5, -r * 0.5);
        ctx.closePath();
        ctx.fill();
    } else {
        ctx.fillStyle = '#888';
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold ' + Math.floor(r) + 'px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('?', 0, 0);
        ctx.textBaseline = 'alphabetic';
    }
    ctx.restore();
}
function drawStick(ent) {
    if (gameMode === 'chase' || gameMode === 'tag') return;
    if (ent.hp <= 0 || ent.hasKnife) return;
    const tip = stickTip(ent);
    ctx.strokeStyle = ent.upgraded ? '#ffd700' : '#5c3317';
    ctx.lineWidth = ent.upgraded ? 10 : 7;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(ent.x + Math.cos(ent.angle) * 8, ent.y + Math.sin(ent.angle) * 8);
    ctx.lineTo(tip.x, tip.y);
    ctx.stroke();
}
function drawHpBar(ent) {
    if (gameMode === 'chase' || gameMode === 'tag') return;
    if (ent.hp <= 0) return;
    const w = ent.upgraded ? 60 : 44, bx = ent.x - w / 2, by = ent.y - ent.size / 2 - 18;
    ctx.fillStyle = '#333'; ctx.fillRect(bx, by, w, 7);
    ctx.fillStyle = ent.upgraded ? '#ffd700' : (ent === nanny ? '#ff4444' : '#44cc44');
    ctx.fillRect(bx, by, w * (ent.hp / ent.hpMax), 7);
}
function drawPacmanSprite(ent) {
    if (ent.dead || ent.hp <= 0) return;
    if (ent.invuln > 0 && Math.floor(ent.invuln / 8) % 2 === 0) return;
    // голя-свечение для пакмана
    if (gameMode === 'tag' && ent.isGola) {
        const pulse = 0.25 + Math.sin(chasePulse * 2) * 0.12;
        ctx.fillStyle = 'rgba(233,30,99,' + pulse + ')';
        ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.size / 2 + 20, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#e91e63';
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.size / 2 + 16, 0, Math.PI * 2); ctx.stroke();
    }
    const r = ent.size / 2;
    const img = images.pacman || images[ent.img];
    ctx.save();
    ctx.translate(ent.x, ent.y);
    ctx.rotate(ent.angle);
    const chomp = 1 + Math.sin(ent.mouth || 0) * 0.06;
    ctx.scale(chomp, 1 / chomp);
    if (img && img.complete && img.naturalWidth) {
        ctx.drawImage(img, -r, -r, ent.size, ent.size);
    } else {
        const mo = 0.35 + Math.abs(Math.sin(ent.mouth || 0)) * 0.35;
        ctx.fillStyle = '#ffff00';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, r, mo, -mo, true);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(r * 0.25, -r * 0.35, 5, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
    if (gameMode === 'tag' && ent.isGola) {
        ctx.fillStyle = '#e91e63';
        ctx.font = 'bold 15px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('ГОЛЯ!', ent.x, ent.y + r + 16);
    }
    if (gameMode === 'battle') drawKnifeHeld(ent);
    if (gameMode === 'battle' && ent.livesMax > 0) {
        for (let i = 0; i < ent.livesMax; i++) {
            ctx.fillStyle = i < ent.lives ? '#ffff00' : '#555';
            ctx.beginPath();
            ctx.arc(ent.x - 12 + i * 24, ent.y - r - 14, 7, 0.2, Math.PI * 2 - 0.2);
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            ctx.stroke();
        }
    }
    if (ent.upgraded && gameMode === 'battle') {
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 13px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('ПРОКАЧАН', ent.x, ent.y + r + 16);
    }
}
function drawPacman() {
    drawPacmanSprite(pacman);
}
function drawCharacter(ent) {
    if (ent.hp <= 0 || ent.dead) return;
    if (ent.isPacman) {
        drawPacmanSprite(ent);
        return;
    }
    if (ent.upgraded) {
        ctx.fillStyle = gameMode === 'chase' || gameMode === 'tag' ? 'rgba(255,152,0,0.25)' : 'rgba(255,215,0,0.25)';
        ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.size / 2 + 12, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = gameMode === 'chase' || gameMode === 'tag' ? '#ff9800' : '#ffd700';
        ctx.lineWidth = 3; ctx.stroke();
    }
    // няня в chase — красное свечение
    if (gameMode === 'chase' && ent === nanny) {
        const pulse = 0.2 + Math.sin(chasePulse) * 0.1;
        ctx.fillStyle = 'rgba(244,67,54,' + pulse + ')';
        ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.size / 2 + 18, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#f44336';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.size / 2 + 14, 0, Math.PI * 2); ctx.stroke();
    }
    // голя — яркое красно-фиолетовое свечение
    if (gameMode === 'tag' && ent.isGola) {
        const pulse = 0.25 + Math.sin(chasePulse * 2) * 0.12;
        ctx.fillStyle = 'rgba(233,30,99,' + pulse + ')';
        ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.size / 2 + 20, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#e91e63';
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.size / 2 + 16, 0, Math.PI * 2); ctx.stroke();
    }
    if (gameMode === 'battle') {
        drawStick(ent); drawKnifeHeld(ent); drawHpBar(ent);
    }
    const img = images[ent.img], half = ent.size / 2;
    if (img && img.complete && img.naturalWidth) {
        ctx.drawImage(img, ent.x - half, ent.y - half - 5, ent.size, ent.size);
    } else if (ent.drawStyle) {
        drawFallbackSprite(ent);
    } else {
        ctx.font = (ent.size - 10) + 'px Arial';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#000';
        ctx.fillText('?', ent.x, ent.y + 10);
    }
    if (ent.upgraded) {
        ctx.fillStyle = gameMode === 'chase' || gameMode === 'tag' || gameMode === 'custom' ? '#ff9800' : '#ffd700';
        ctx.font = 'bold 13px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(gameMode === 'chase' || gameMode === 'tag' || gameMode === 'custom' ? 'ТЫ' : 'ПРОКАЧАН', ent.x, ent.y + ent.size / 2 + 14);
    }
    if ((gameMode === 'chase' || gameMode === 'custom') && ent === nanny) {
        ctx.fillStyle = '#f44336';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';

function fighterLabel(f) {
    if (f === player) return player.displayName || 'Игрок';
    if (f === nanny) return nanny.displayName || 'Враг';
    if (f && f.isPacman) return 'Пакман';
    return (f && f.displayName) || (f && f.name) || '?';
}

function drawUIChase() {
    // таблица мест по моркови (живой рейтинг)
    const board = [];
    if (player) board.push(player);
    if (npcs) for (const n of npcs) if (n) board.push(n);
    if (pacman && !pacman.dead) board.push(pacman);
    board.sort((a, b) => (b.carrots || 0) - (a.carrots || 0));

    const panelH = 100 + board.length * 20;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(8, 8, 280, Math.min(panelH, 340));

    ctx.fillStyle = gameMode === 'pac' ? '#ffeb3b' : '#ff9800';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'left';
    const myCar = player ? (player.carrots || 0) : carrotsCollected;
    if (gameMode === 'pac' && pacPlayAsGhost) {
        ctx.fillText('👻 НЯНЯ · поймай всех героев', 16, 32);
    } else {
        ctx.fillText((gameMode === 'pac' ? '🟡 ПАКМАН  ' : '') + '🥕 Цель: ' + CARROTS_TO_WIN + '  (★' + CARROTS_LEGEND + ')', 16, 32);
    }
    ctx.fillStyle = '#fff';
    ctx.font = '15px Arial';
    // жизни (режим Пакман — 3 у всех)
    if (gameMode === 'pac' && player) {
        const hearts = '❤'.repeat(Math.max(0, player.lives || 0)) + '♡'.repeat(Math.max(0, (player.livesMax || 3) - (player.lives || 0)));
        ctx.fillStyle = '#ff5252';
        ctx.font = 'bold 16px Arial';
        ctx.fillText('Ты ' + hearts + '  🥕 ' + myCar + '/' + CARROTS_TO_WIN, 16, 54);
    } else {
        ctx.fillText('Ты: ' + myCar + ' / ' + CARROTS_TO_WIN, 16, 54);
    }

    // прогресс-бар игрока
    const barW = 250, barH = 10;
    ctx.fillStyle = '#333';
    ctx.fillRect(16, 62, barW, barH);
    const pct = Math.min(1, myCar / CARROTS_TO_WIN);
    ctx.fillStyle = '#ff6d00';
    ctx.fillRect(16, 62, barW * pct, barH);
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 1;
    ctx.strokeRect(16, 62, barW, barH);

    // места 1..N
    let y = 92;
    ctx.font = 'bold 13px Arial';
    ctx.fillStyle = '#ffcc00';
    ctx.fillText(gameMode === 'pac' ? 'МЕСТА · жизни' : 'МЕСТА (морковь)', 16, y);
    y += 18;
    ctx.font = '13px Arial';
    board.forEach((ent, i) => {
        const place = i + 1;
        const medal = place === 1 ? '🥇' : place === 2 ? '🥈' : place === 3 ? '🥉' : place + '.';
        const isMe = ent === player;
        const caught = ent.hp <= 0 || ent.dead;
        ctx.fillStyle = caught ? '#666' : (isMe ? '#4fc3f7' : '#eee');
        let name = (ent.displayName || ent.name) + (isMe ? ' (ты)' : '') + (caught ? ' ✕' : '');
        if (gameMode === 'pac' && ent.livesMax > 0 && !caught) {
            name += ' ❤' + (ent.lives || 0);
        }
        ctx.fillText(medal + ' ' + name, 16, y);
        ctx.fillStyle = caught ? '#666' : '#ffab40';
        ctx.fillText((ent.carrots || 0) + ' 🥕', 210, y);
        y += 18;
    });

    // предупреждение о няне
    if (player && nanny && !gameOver && !playerDead) {
        const d = dist(player, nanny);
        if (d < 180) {
            const flash = Math.sin(chasePulse * 3) > 0;
            ctx.fillStyle = flash ? 'rgba(244,67,54,0.9)' : 'rgba(183,28,28,0.85)';
            roundRect(300, 8, 300, 40, 10);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(d < 90 ? '⚠ НЯНЯ РЯДОМ!!!' : 'Няня близко!', 450, 36);
        }
    }

    drawButton(BTN_EXIT_GAME, 'ВЫЙТИ', '#8b0000', '#ff6666', '#fff');

    // кто охотится / синяя няня
    ctx.font = '14px Arial';
    ctx.textAlign = 'left';
    if (gameMode === 'pac' && isNannyScared()) {
        const sec = Math.ceil(nannyPowerT / 60);
        ctx.fillStyle = nannyPowerT < 90 ? '#fff' : '#42a5f5';
        ctx.font = 'bold 15px Arial';
        ctx.fillText('💙 Няня СИНЯЯ ' + sec + 'с — догони и съешь! +' + PAC_EAT_NANNY_SCORE + '🥕', 300, 70);
    } else {
        ctx.fillStyle = '#f44336';
        const hunt = nearestChaseVictim();
        const huntName = hunt
            ? (hunt === player ? 'тебя' : (hunt.displayName || hunt.name || 'жертву'))
            : '…';
        ctx.fillText((gameMode === 'pac' ? '👻 ' : '') + (nanny.displayName || 'Няня') + ' — за ' + huntName, 300, 70);
    }
    // вспышка «съел няню»
    if (nannyEatenFlash > 0) {
        const a = Math.min(1, nannyEatenFlash / 40);
        ctx.fillStyle = 'rgba(66,165,245,' + (0.55 * a) + ')';
        roundRect(280, 200, 340, 70, 14);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 26px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('😋 СЪЕЛ НЯНЮ! +' + PAC_EAT_NANNY_SCORE + '🥕', 450, 245);
    }
}

    if (gameMode === 'race') {
        drawRaceUI();
        drawMusicToast();

        return;
    }
    if (gameMode === 'chase' || gameMode === 'pac') drawUIChase();

    else drawUIBattle();

        ctx.fillStyle = 'rgba(0,0,0,0.72)';

    ctx.fillText('Цель гонки: ' + CARROTS_TO_WIN + ' 🥕   |   Легенда: ' + CARROTS_LEGEND + ' 🥕', 450, panelY + 94);

    // таблица мест
    const rows = (r.all && r.all.length) ? r.all : [];
    const maxShow = Math.min(rows.length, 10);
    let y = panelY + 120;
    for (let i = 0; i < maxShow; i++) {
        const who = rows[i];
        const place = i + 1;
        const medal = place === 1 ? '🥇' : place === 2 ? '🥈' : place === 3 ? '🥉' : (place + '.');
        const color = place === 1 ? '#ffd700' : place === 2 ? '#c0c0c0' : place === 3 ? '#cd7f32' : '#b0bec5';
        const isMe = player && who.name === player.name;

        ctx.fillStyle = isMe ? 'rgba(79,195,247,0.25)' : 'rgba(0,0,0,0.35)';
        roundRect(140, y - 18, 620, 34, 8);
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.textAlign = 'left';
        ctx.font = 'bold 16px Arial';
        ctx.fillStyle = color;
        ctx.fillText(medal + '  ' + place + ' МЕСТО', 155, y + 5);

        ctx.fillStyle = '#fff';
        ctx.font = isMe ? 'bold 17px Arial' : '16px Arial';
        ctx.fillText((who.displayName || '???') + (isMe ? ' ★' : ''), 320, y + 5);

        ctx.textAlign = 'right';
        ctx.fillStyle = '#ffab40';
        ctx.font = 'bold 17px Arial';
        const car = who.carrots || 0;
        let label = car + ' 🥕';
        if (car >= CARROTS_LEGEND) label += ' ★90';
        else if (car >= CARROTS_TO_WIN) label += ' ✓' + CARROTS_TO_WIN;
        ctx.fillText(label, 740, y + 5);

        if (who.img && images[who.img] && images[who.img].complete && images[who.img].naturalWidth) {
            try { ctx.drawImage(images[who.img], 750, y - 14, 28, 28); } catch (e) { /* ignore */ }
        }
        y += 38;
    }

    if (!rows.length) {
        ctx.textAlign = 'center';
        ctx.fillStyle = '#aaa';
        ctx.font = '18px Arial';
        ctx.fillText('Никто не собрал морковь…', 450, panelY + 200);
    }

    drawButton(RES_RESTART, 'ЗАНОВО', '#1565c0', '#64b5f6', '#fff');
    drawButton(RES_SELECT, 'ВЫБОР', '#6a1b9a', '#ce93d8', '#fff');
}

function drawGame() {
    if (gameMode === 'race') {
        drawRaceTrack();
        for (const n of npcs) {
            if (n) drawCharacter(n);
        }
        if (player) drawCharacter(player);
        drawUI();
        return;
    }
    drawField();
    if (gameMode === 'custom') {
        var pmD = getCustomPlayMode();
        if (pmD === 'chase') drawAllCarrots();
        if (pmD === 'race') {
            var fxx = (customLevel && customLevel._raceFinishX) || RACE_FINISH_X;
            ctx.save();
            ctx.strokeStyle = 'rgba(255,204,0,0.9)';
            ctx.lineWidth = 6;
            ctx.setLineDash([14, 10]);
            ctx.beginPath();
            ctx.moveTo(fxx, FIELD.minY);
            ctx.lineTo(fxx, FIELD.maxY);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#ffcc00';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🏁 ФИНИШ', fxx, FIELD.minY + 22);
            ctx.restore();
        }
        if (pmD === 'battle' || pmD === 'team' || pmD === 'chase') {
            drawStickOnGround();
            drawGroundKnives();
        }
        function drawTeamRing(ent) {
            if (!isCustomTeamMode() || !ent) return;
            ctx.beginPath();
            ctx.arc(ent.x, ent.y, (ent.size || 64) * 0.42, 0, Math.PI * 2);
            ctx.strokeStyle = ent.team === 'ally' ? 'rgba(66,165,245,0.95)' : 'rgba(239,83,80,0.95)';
            ctx.lineWidth = 4;
            ctx.stroke();
        }
        for (const n of npcs) {
            if (n && !n.dead && n.hp > 0) {
                drawTeamRing(n);
                if (n.isPacman) drawPacmanSprite(n);
                else drawCharacter(n);
                if (n.hasKnife) drawKnifeHeld(n);
                else if (n.hasStick) drawStick(n);
            }
        }
        if (pacman && !pacman.dead && pacman.hp > 0) {
            drawTeamRing(pacman);
            drawPacmanSprite(pacman);
            if (pacman.hasKnife) drawKnifeHeld(pacman);
            else if (pacman.hasStick) drawStick(pacman);
        }
        if (nanny && !nanny.dead && nanny.hp > 0) {
            drawTeamRing(nanny);
            drawCharacter(nanny);
            if (nanny.hasStick) drawStick(nanny);
        }
        if (player) {
            drawTeamRing(player);
            drawCharacter(player);
            if (player.hasKnife) drawKnifeHeld(player);
            else if (player.hasStick) drawStick(player);
        }
    } else if (gameMode === 'chase' || gameMode === 'pac') {
        drawAllCarrots();
        for (const n of npcs) drawCharacter(n);
        if (pacman && !pacman.dead) drawPacman();
        if (nanny && !(pacPlayAsGhost && nanny === player)) {
            if (gameMode === 'pac') {
                const scared = isNannyScared();
                // мигание перед концом силы
                const blink = scared && nannyPowerT < 90 && Math.floor(nannyPowerT / 8) % 2 === 0;
                ctx.save();
                // синяя подложка под няней
                if (scared) {
                    ctx.beginPath();
                    ctx.arc(nanny.x, nanny.y, (nanny.size || 50) * 0.55, 0, Math.PI * 2);
                    ctx.fillStyle = blink ? 'rgba(255,255,255,0.35)' : 'rgba(33,150,243,0.55)';
                    ctx.fill();
                }
                ctx.globalAlpha = blink ? 0.4 : (scared ? 0.95 : 0.88);
                drawCharacter(nanny);
                ctx.globalAlpha = 1;
                // ореол
                ctx.beginPath();
                ctx.arc(nanny.x, nanny.y, (nanny.size || 60) * 0.58, 0, Math.PI * 2);
                if (scared) {
                    ctx.strokeStyle = blink ? '#ffffff' : '#42a5f5';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    ctx.fillStyle = blink ? '#fff' : '#90caf9';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(blink ? 'Скоро…' : 'СИНЯЯ — ЕШЬ!', nanny.x, nanny.y + (nanny.size || 40) * 0.55 + 14);
                } else {
                    ctx.strokeStyle = 'rgba(255,80,80,0.65)';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
                ctx.restore();
            } else {
                drawCharacter(nanny);
            }
        }
        if (pacPlayAsGhost && player) {
            // ореол призрака на тебе
            ctx.save();
            const scared = isNannyScared();
            ctx.beginPath();
            ctx.arc(player.x, player.y, (player.size || 50) * 0.58, 0, Math.PI * 2);
            ctx.strokeStyle = scared ? '#42a5f5' : 'rgba(255,80,80,0.85)';
            ctx.lineWidth = 4;
            ctx.stroke();
            if (scared) {
                ctx.fillStyle = 'rgba(33,150,243,0.35)';
                ctx.fill();
                ctx.fillStyle = '#90caf9';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('ТЫ СИНЯЯ!', player.x, player.y + 28);
            }
            ctx.restore();
        }
        drawCharacter(player);
    } else if (gameMode === 'tag') {
        for (const n of npcs) drawCharacter(n);
        if (pacman && !pacman.dead) drawPacman();
        if (nanny) drawCharacter(nanny);
        drawCharacter(player);
    } else {
        drawKnifeOnGround();
        if (pacman) {
            drawPacman();
            if (!pacman.dead && pacman.hp > 0) drawKnifeHeld(pacman);
        }
        for (const n of npcs) drawCharacter(n);
        if (nanny) drawCharacter(nanny);
        drawCharacter(player);
    }
    drawUI();
}

function updateGame() {
    if (showExitDialog || paused) return;
    if (gameOver) return;

    if (gameMode === 'custom') {
        updateCustomLevel();
        return;
    }

    if (gameMode === 'race') {
        updateRace();
        return;
    }

    if (gameMode === 'chase' || gameMode === 'pac') {
        chasePulse += 0.08;
        updatePlayer();
        // не клинит в стенах лабиринта
        if (gameMode === 'pac') {
            if (player) unstickFromWalls(player);
            if (nanny) unstickFromWalls(nanny);
            if (npcs) for (let i = 0; i < npcs.length; i++) if (npcs[i]) unstickFromWalls(npcs[i]);
        }
        updateNannyChase();
        updateChaseNPCs();
        if (gameMode === 'pac') {
            if (player) unstickFromWalls(player);
            if (nanny) unstickFromWalls(nanny);
        }
        updateCarrots();
        checkNannyCatch();
        return;
    }

    if (gameMode === 'tag') {
        updatePlayer();
        updateTagAI();
        tryTransferGola();
        updateTagRound();
        return;
    }

    updatePlayer();
    updatePacman();
    updateAI(nanny);
    for (const n of npcs) updateAI(n);
    updateKnifeSpawn();
    updateTimers();
    checkCombat();
    checkKnifeCombat();
    checkGameEnd();
}

function restartSameChar() {
    if (!player) return;
    const cfg = CHARACTERS.find(c => c.id === player.name) || CHARACTERS[selectedIndex];
    startGame(cfg);
}

function goSelect() {
    gameplayStop();
    screen = 'select';
    showExitDialog = false;
    playerDead = false;
    gameOver = false;
    gameWon = false;
    deathOrder = [];
    finalRanking = null;
    paused = false;
    setHintSelect();
}

function goModeSelect() {
    gameplayStop();
    screen = 'mode';
    showExitDialog = false;
    playerDead = false;
    gameOver = false;
    gameWon = false;
    deathOrder = [];
    finalRanking = null;
    paused = false;

        'Выбери режим 1–6 | M — муз. · N — след. трек · B — пред. | Q — выйти';

    if (mode === 'custom') {
        openEditor();
        return;
    }
    gameMode = mode;
    screen = 'select';
    showExitDialog = false;

// Ввод
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') e.preventDefault();

    // Музыка: M — mute (в редакторе: Shift+M), N/]/ — след., B/[, — пред.
    if (e.code === 'KeyM') {
        if (screen === 'editor' && !e.shiftKey) {
            // fallthrough: в редакторе M = режим уровня
        } else {
            toggleMusic();
            return;
        }
    }
    if (!showExitDialog && (e.code === 'KeyN' || e.code === 'BracketRight' || e.code === 'Period')) {
        e.preventDefault();
        nextMusicTrack(false);
        return;
    }
    if (!showExitDialog && (e.code === 'KeyB' || e.code === 'BracketLeft' || e.code === 'Comma')) {
        e.preventDefault();
        prevMusicTrack();
        return;
    }

    // Q — выход (диалог подтверждения)
    if (e.code === 'KeyQ') {
        if (!showExitDialog) {
            showExitDialog = true;
            if (screen === 'game') paused = true;
        }
        return;
    }

    if (showExitDialog) {
        if (e.code === 'Enter' || e.code === 'KeyY') { doExit(); return; }
        if (e.code === 'Escape' || e.code === 'KeyN') { showExitDialog = false; return; }
        return;
    }

    if (screen === 'mode') {
        if (e.code === 'Digit1' || e.code === 'Numpad1') { chooseMode('battle'); return; }
        if (e.code === 'Digit2' || e.code === 'Numpad2') { chooseMode('chase'); return; }
        if (e.code === 'Digit3' || e.code === 'Numpad3') { chooseMode('tag'); return; }
        if (e.code === 'Digit4' || e.code === 'Numpad4') { chooseMode('race'); return; }
        if (e.code === 'Digit5' || e.code === 'Numpad5') { chooseMode('pac'); return; }
        if (e.code === 'Digit6' || e.code === 'Numpad6') { openEditor(); return; }
        if (e.code === 'Escape') { showExitDialog = true; return; }
        return;
    }

    if (screen === 'editor') {
        if (e.code === 'Escape') {
            if (levelsListOpen) { levelsListOpen = false; return; }
            goModeSelect();
            return;
        }
        if (e.code === 'Digit1' || e.code === 'Numpad1') { editorTool = 'wall'; return; }
        if (e.code === 'Digit2' || e.code === 'Numpad2') { editorTool = 'carrot'; return; }
        if (e.code === 'Digit3' || e.code === 'Numpad3') { editorTool = 'spawn'; return; }
        if (e.code === 'Digit4' || e.code === 'Numpad4') { editorTool = 'nanny'; return; }
        if (e.code === 'Digit5' || e.code === 'Numpad5') {
            editorTool = 'hero';
            showEditorMsg('👥 Хранилище героев');
            return;
        }
        if (e.code === 'Digit6' || e.code === 'Numpad6') { editorTool = 'stick'; return; }
        if (e.code === 'Digit7' || e.code === 'Numpad7') { editorTool = 'knife'; return; }
        if (e.code === 'Digit8' || e.code === 'Numpad8') { editorTool = 'erase'; return; }
        // стрелки в хранилище — переключить героя
        if (editorTool === 'hero') {
            const list = placeableCharacters();
            let idx = list.findIndex(c => c.id === editorCharId);
            if (idx < 0) idx = 0;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                idx = (idx - 1 + list.length) % list.length;
                editorCharId = list[idx].id;
                saveCharStorage();
                showEditorMsg('👥 ' + list[idx].name);
                return;
            }
            if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                idx = (idx + 1) % list.length;
                editorCharId = list[idx].id;
                saveCharStorage();
                showEditorMsg('👥 ' + list[idx].name);
                return;
            }
        }
        if (e.code === 'KeyS' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            saveCurrentLevel();
            return;
        }
        if (e.code === 'KeyS') { saveCurrentLevel(); return; }
        if (e.code === 'Enter' || e.code === 'KeyP') { startCustomFromEditor(); return; }
        if (e.code === 'KeyM') {
            editorLevel.playMode = cyclePlayMode(editorLevel.playMode);
            showEditorMsg(playModeMeta(editorLevel.playMode).label);
            return;
        }
        if (e.code === 'KeyT' && normalizePlayMode(editorLevel.playMode) === 'team') {
            editorNpcTeam = editorNpcTeam === 'ally' ? 'enemy' : 'ally';
            showEditorMsg(editorNpcTeam === 'ally' ? '🔵 Союзники' : '🔴 Враги');
            return;
        }
        return;
    }

    if (screen === 'select') {
        const selList = selectableCharacters();
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
            selectedIndex = (selectedIndex - 1 + selList.length) % selList.length;
        }
        if (e.code === 'ArrowRight' || e.code === 'KeyD') {
            selectedIndex = (selectedIndex + 1) % selList.length;
        }
        if (e.code === 'KeyT') {
            pickRandomCharacter();
        }
        if (e.code === 'KeyR') {
            startGame(pickRandomCharacter());
            return;
        }
        if (e.code === 'Enter' || e.code === 'Space') {
            startGame(selList[selectedIndex] || selList[0]);
        }
        if (e.code === 'Escape') {
            if (gameMode === 'custom') openEditor();
            else goModeSelect();
        }
        return;
    }

    if (e.code === 'Escape') {
        if (paused) showExitDialog = true;
        else {
            paused = true;
            gameplayStop();
        }
        return;
    }
    if (e.code === 'KeyR') {
        if (gameMode === 'custom') { openEditor(); return; }
        goSelect();
        return;
    }
    if (e.code === 'Enter' && (playerDead || gameOver)) {
        restartSameChar();
    }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('mousemove', e => {
    if (showExitDialog) return;
    const { mx, my } = canvasMouse(e);
    if (screen === 'editor') {
        handleEditorMouseMove(mx, my);
        return;
    }
    if (screen !== 'select') return;
    hoverIndex = pickAt(mx, my);
    if (hoverIndex >= 0) selectedIndex = hoverIndex;
});

canvas.addEventListener('mousedown', e => {
    if (screen !== 'editor' || showExitDialog) return;
    const { mx, my } = canvasMouse(e);
    handleEditorMouseDown(mx, my);
});
canvas.addEventListener('mouseup', e => {
    if (screen !== 'editor') return;
    const { mx, my } = canvasMouse(e);
    handleEditorMouseUp(mx, my);
});
canvas.addEventListener('mouseleave', () => {
    if (wallDrag) handleEditorMouseUp(wallDrag.x1, wallDrag.y1);
});

function handleCanvasTap(e) {
    // унифицированный клик/тач (мобилки + ПК)
    if (e && e.cancelable) e.preventDefault();
    canvas.focus();
    const { mx, my } = canvasMouse(e.changedTouches ? e.changedTouches[0] : e);

    if (showExitDialog) {
        if (hitBtn(EXIT_YES, mx, my)) { doExit(); return; }
        if (hitBtn(EXIT_NO, mx, my)) { showExitDialog = false; return; }
        return;
    }

    if (screen === 'mode') {
        if (hitBtn(BTN_EXIT_SELECT, mx, my)) {
            showExitDialog = true;
            return;
        }
        if (hitBtn(BTN_MODE_BATTLE, mx, my)) {
            chooseMode('battle');
            return;
        }
        if (hitBtn(BTN_MODE_CHASE, mx, my)) {
            chooseMode('chase');
            return;
        }
        if (hitBtn(BTN_MODE_TAG, mx, my)) {
            chooseMode('tag');
            return;
        }
        if (hitBtn(BTN_MODE_RACE, mx, my)) {
            chooseMode('race');
            return;
        }
        if (hitBtn(BTN_MODE_PAC, mx, my)) {
            chooseMode('pac');
            return;
        }
        if (hitBtn(BTN_MODE_EDITOR, mx, my)) {
            openEditor();
            return;
        }
        return;
    }

    if (screen === 'editor') {
        if (editorTool === 'wall' && wallDrag) return;
        handleEditorClick(mx, my);
        return;
    }

    if (screen === 'select') {
        if (hitBtn(BTN_EXIT_SELECT, mx, my)) {
            showExitDialog = true;
            return;
        }
        if (hitBtn(BTN_BACK_MODE, mx, my)) {
            if (gameMode === 'custom') openEditor();
            else goModeSelect();
            return;
        }
        if (hitBtn(BTN_RANDOM, mx, my)) {
            startGame(pickRandomCharacter());
            return;
        }
        const i = pickAt(mx, my);
        if (i >= 0) {
            selectedIndex = i;
            const list = selectableCharacters();
            startGame(list[selectedIndex] || list[0]);
        }
        return;
    }

    if (hitBtn(BTN_EXIT_GAME, mx, my)) {
        showExitDialog = true;
        return;
    }
    if (playerDead && !gameOver && gameMode === 'battle') {
        if (hitBtn(DEAD_RESTART, mx, my)) { restartSameChar(); return; }
        if (hitBtn(DEAD_SELECT, mx, my)) { goSelect(); return; }
    }
    if (gameOver) {
        if (hitBtn(RES_RESTART, mx, my)) { restartSameChar(); return; }
        if (hitBtn(RES_SELECT, mx, my)) { goSelect(); return; }
    }
}

canvas.addEventListener('click', handleCanvasTap);
canvas.addEventListener('touchend', handleCanvasTap, { passive: false });

function loop() {
    if (screen === 'mode') drawModeScreen();
    else if (screen === 'select') drawSelectScreen();
    else if (screen === 'editor') drawEditorScreen();
    else { updateGame(); drawGame(); }
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ?mode=battle|chase|tag|race|pac — сразу режим (с портала / мини-ссылок)
(function applyUrlMode() {
    try {
        const m = new URLSearchParams(location.search).get('mode');
        if (!m) return;
        if (m === 'editor' || m === 'custom') { openEditor(); return; }
        if (m === 'battle' || m === 'chase' || m === 'tag' || m === 'race' || m === 'pac') {
            chooseMode(m);
        }
