/** Лабиринт для режима Пакман (Смешарики): # стена, . путь, o энергетик, P игрок, N няня, A союзник */
function buildPacMaze() {
    // Большой лабиринт БЕЗ ТУПИКОВ (только петли) — почти весь экран
    // # стена  . путь  o энергетик  P игрок  N няня  A союзник
    // каждый коридор — петля (degree ≥ 2), тупиков нет
    const MAP = [
        '#############################', // верх
        '#o.........................o#',
        '#.#...#.#...#.#...#.#...#.#.#',
        '#...........................#',
        '#.....#...#.#...#.#...#.....#',
        '#...........................#',
        '#.#.#...#.#...#.#...#.#...#.#',
        '#...........................#',
        '#.#...#.#...#.#...#.#...#.#.#',
        '#...........................#',
        '#..A#.#...#.#.N.#.#...#.#A..#', // няня
        '#...........................#',
        '#.#.#...#.#...#.#...#.#...#.#',
        '#...........................#',
        '#.#...#.#...#.#...#.#...#.#.#',
        '#...........................#',
        '#.....#...#.#...#.#...#.....#',
        '#...........................#',
        '#.#.#...#.#...#.#...#.#...#.#',
        '#o............P............o#', // игрок
        '#############################' // низ
    ];
    const COLS = 29;
    for (let i = 0; i < MAP.length; i++) {
        if (MAP[i].length < COLS) MAP[i] = MAP[i] + '#'.repeat(COLS - MAP[i].length);
        else if (MAP[i].length > COLS) MAP[i] = MAP[i].slice(0, COLS);
    }
    const ROWS = MAP.length;
    // клетка максимально большая, maze почти на весь 900×600
    const TILE = Math.max(20, Math.min(
        Math.floor((900 - 12) / COLS),
        Math.floor((600 - 12) / ROWS)
    ));
    const mazeW = COLS * TILE;
    const mazeH = ROWS * TILE;
    const ox = Math.floor((900 - mazeW) / 2);
    const oy = Math.floor((600 - mazeH) / 2);
    pacWalls = [];
    pacOpenSpots = [];
    pacPlayerSpawns = [];
    pacNannySpawns = [];
    pacDotSpots = [];
    const allySpawns = [];

    // карта стен 0/1 — потом сольём в длинные стены (не «кубики»)
    const solid = [];
    for (let r = 0; r < ROWS; r++) {
        solid[r] = [];
        for (let c = 0; c < COLS; c++) {
            const ch = MAP[r][c];
            const x = ox + c * TILE;
            const y = oy + r * TILE;
            const cx = x + TILE / 2;
            const cy = y + TILE / 2;
            if (ch === '#') {
                solid[r][c] = 1;
            } else {
                solid[r][c] = 0;
                const spot = { x: cx, y: cy, r: r, c: c };
                pacOpenSpots.push(spot);
                if (ch === 'P') pacPlayerSpawns.push(spot);
                else if (ch === 'N') pacNannySpawns.push(spot);
                else if (ch === 'A') allySpawns.push(spot);
                if (ch === '.' || ch === 'o' || ch === 'P' || ch === 'A') {
                    pacDotSpots.push({ x: cx, y: cy, power: ch === 'o' });
                }
            }
        }
    }
    // Сливаем стены в длинные прямоугольники — гладкие коридоры, без «кубиков»
    pacWalls = mergeMazeWallRects(solid, ROWS, COLS, ox, oy, TILE);
    // запасные точки
    if (!pacPlayerSpawns.length && pacOpenSpots.length) {
        // широкий коридор снизу/сверху — не угол
        pacPlayerSpawns.push(pickWidestOpenSpot(pacOpenSpots) || pacOpenSpots[pacOpenSpots.length - 1]);
    }
    if (!pacNannySpawns.length && pacOpenSpots.length) pacNannySpawns.push(pacOpenSpots[Math.floor(pacOpenSpots.length / 2)]);
    // союзники: A + свободные клетки
    pacAllySpawns = allySpawns.length ? allySpawns : pacOpenSpots.slice(2, 6);
    // стены вокруг лабиринта — нельзя убежать за maze
    pacWalls.push({ x: 0, y: 0, w: 900, h: oy });
    pacWalls.push({ x: 0, y: oy + mazeH, w: 900, h: 600 - (oy + mazeH) });
    pacWalls.push({ x: 0, y: oy, w: ox, h: mazeH });
    pacWalls.push({ x: ox + mazeW, y: oy, w: 900 - (ox + mazeW), h: mazeH });
    // кэш для unstick
    pacMazeMeta = { ox: ox, oy: oy, TILE: TILE, ROWS: ROWS, COLS: COLS, solid: solid };
    return { ox, oy, TILE, ROWS, COLS };
}
let pacAllySpawns = [];
let pacMazeMeta = null;

/** Слить сетку стен в длинные rect — без отдельных кубиков */
function mergeMazeWallRects(solid, ROWS, COLS, ox, oy, TILE) {
    const used = [];
    for (let r = 0; r < ROWS; r++) {
        used[r] = [];
        for (let c = 0; c < COLS; c++) used[r][c] = false;
    }
    const out = [];
    // горизонтальные полосы
    for (let r = 0; r < ROWS; r++) {
        let c = 0;
        while (c < COLS) {
            if (!solid[r][c] || used[r][c]) { c++; continue; }
            let c2 = c;
            while (c2 < COLS && solid[r][c2]) c2++;
            // насколько вниз тянется такой же прямоугольник
            let r2 = r + 1;
            while (r2 < ROWS) {
                let ok = true;
                for (let cc = c; cc < c2; cc++) {
                    if (!solid[r2][cc] || used[r2][cc]) { ok = false; break; }
                }
                if (!ok) break;
                r2++;
            }
            for (let rr = r; rr < r2; rr++) {
                for (let cc = c; cc < c2; cc++) used[rr][cc] = true;
            }
            // inset чуть меньше, чем раньше — коридоры шире, не застреваешь
            const inset = 0.5;
            out.push({
                x: ox + c * TILE + inset,
                y: oy + r * TILE + inset,
                w: (c2 - c) * TILE - inset * 2,
                h: (r2 - r) * TILE - inset * 2
            });
            c = c2;
        }
    }
    return out;
}

/** Клетка с наибольшим «воздухом» вокруг (для безопасного спавна) */
function pickWidestOpenSpot(spots) {
    if (!spots || !spots.length) return null;
    let best = spots[0], bestScore = -1;
    for (let i = 0; i < spots.length; i++) {
        const s = spots[i];
        let free = 0;
        const step = 18;
        const dirs = [[step,0],[-step,0],[0,step],[0,-step],[step,step],[-step,step],[step,-step],[-step,-step]];
        for (let d = 0; d < dirs.length; d++) {
            if (!circleHitsWall(s.x + dirs[d][0], s.y + dirs[d][1], 6, pacWalls)) free++;
        }
        // бонус нижним/центральным открытым рядам
        const score = free * 10 - Math.abs(s.y - 480) * 0.02;
        if (score > bestScore) { bestScore = score; best = s; }
    }
    return best;
}

function pickPacSpot(list, fallback) {
    // рандом по списку (если есть), иначе по fallback
    if (list && list.length) return list[Math.floor(Math.random() * list.length)];
    if (fallback && fallback.length) return fallback[Math.floor(Math.random() * fallback.length)];
    return { x: 450, y: 480 };
}

/** Список безопасных клеток лабиринта (не в стене) */
function pacSafeSpots(radius) {
    const r = radius == null ? 6 : radius;
    const walls = pacWalls && pacWalls.length ? pacWalls : activeWalls();
    const out = [];
    const spots = pacOpenSpots || [];
    for (let i = 0; i < spots.length; i++) {
        const s = spots[i];
        if (!circleHitsWall(s.x, s.y, r, walls)) out.push(s);
    }
    return out.length ? out : spots.slice();
}

/**
 * Рандомный спавн: безопасная клетка, далеко от already[]
 * minDist — минимальная дистанция до уже занятых
 */
function randomPacSpawn(already, minDist, radius) {
    const safe = pacSafeSpots(radius == null ? 6 : radius);
    const used = already || [];
    const md = minDist == null ? 100 : minDist;
    let pool = [];
    for (let i = 0; i < safe.length; i++) {
        const s = safe[i];
        let ok = true;
        for (let j = 0; j < used.length; j++) {
            if (Math.hypot(s.x - used[j].x, s.y - used[j].y) < md) { ok = false; break; }
        }
        if (ok) pool.push(s);
    }
    if (!pool.length) pool = safe;
    if (!pool.length) return { x: 450, y: 400 };
    return pool[Math.floor(Math.random() * pool.length)];
}

/** Если персонаж застрял в стене — вытолкнуть в ближайшую свободную клетку */
function unstickFromWalls(ent) {
    if (!ent || gameMode !== 'pac') return false;
    const r = ent.radius || 8;
    if (!circleHitsWall(ent.x, ent.y, r, activeWalls())) return false;
    // ищем ближайшую открытую точку
    let best = null, bestD = Infinity;
    const spots = pacOpenSpots || [];
    for (let i = 0; i < spots.length; i++) {
        const s = spots[i];
        if (circleHitsWall(s.x, s.y, r, activeWalls())) continue;
        const d = Math.hypot(s.x - ent.x, s.y - ent.y);
        if (d < bestD) { bestD = d; best = s; }
    }
    if (best) {
        ent.x = best.x;
        ent.y = best.y;
        return true;
    }
    // микро-сдвиги
    const tryOff = [12, -12, 20, -20, 28, -28];
    for (let i = 0; i < tryOff.length; i++) {
        for (let j = 0; j < tryOff.length; j++) {
            const nx = ent.x + tryOff[i], ny = ent.y + tryOff[j];
            if (canMove(nx, ny, r)) {
                ent.x = nx; ent.y = ny;
                return true;
            }
        }
    }
    return false;
}

function ensureClearPacSpawn(ent) {
    if (!ent) return;
    // уменьшаем радиус под коридор
    ent.radius = Math.min(ent.radius || 8, 6);
    if (circleHitsWall(ent.x, ent.y, ent.radius, activeWalls())) {
        unstickFromWalls(ent);
    }
    // если всё ещё плохо — широкий слот
    if (circleHitsWall(ent.x, ent.y, ent.radius, activeWalls())) {
        const s = pickWidestOpenSpot(pacOpenSpots);
        if (s) { ent.x = s.x; ent.y = s.y; }
    }
}

function drawPacMazeWalls() {
    if (!pacWalls || !pacWalls.length) return;
    for (const w of pacWalls) {
        ctx.fillStyle = '#1520c8';
        roundRect(w.x, w.y, w.w, w.h, 4);
        ctx.fill();
        ctx.strokeStyle = '#4d6aff';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
    // рамка лабиринта
    ctx.strokeStyle = '#6688ff';
    ctx.lineWidth = 3;
    ctx.strokeRect(FIELD.minX - 4, FIELD.minY - 4, FIELD.maxX - FIELD.minX + 8, FIELD.maxY - FIELD.minY + 8);
}

/** Режим 3: Голя — выбранный персонаж начинает водящим, кого коснулся — тот стал голей */

    player.hp = 1;
    player.hpMax = 1;
    player.carrots = 0;
    player.isGola = true; // ты выбрал голю — начинаешь водящим

    // остальные — убегают (как в chase, без моркови)
    buildNpcsAndBoss(charCfg, true);
    if (nanny) {
        nanny.isGola = false;
        nanny.hp = 1;
        nanny.hpMax = 1;
        // няня в режиме голи — обычный участник (убегает / становится голей)
        nanny.speed = Math.max(4.2, (charCfg.speed || 6.5) * 0.78);
    }
    for (const n of npcs) {
        if (!n) continue;
        n.isGola = false;
        n.hp = 1;
        n.hpMax = 1;
        n.speed = 4.8 + Math.random() * 0.8;
    }
    if (pacman) {
        pacman.isGola = false;
        if (!pacman.dead) {
            pacman.hp = 1;
            pacman.hpMax = 1;
            pacman.speed = 5.5;
        }
    }

    knife = {
        onGround: false, x: 0, y: 0, heldBy: null, spawnCD: 99999, pulse: 0,
        holdTimer: 0, holdMax: 0, killsLeft: 0
    };
    placeAllFighters();
    // остальных разбросать подальше от голи (игрока)
    if (player) {
        const others = [nanny, ...(npcs || []), pacman].filter(e => e && !e.dead);
        for (const o of others) {
            let best = null, bestD = -1;
            for (let i = 0; i < 20; i++) {
                const p = randomFieldPos(55);
                const d = Math.hypot(p.x - player.x, p.y - player.y);
                if (d > bestD) { bestD = d; best = p; }
            }
            if (best) { o.x = best.x; o.y = best.y; }
        }
    }

    carrots = [];
    carrotsCollected = 0;
    chaseCaught = false;
    chasePulse = 0;
    gola = player;
    tagCooldown = TAG_COOLDOWN; // старт: нельзя сразу кого-то задеть
    tagTimer = TAG_ROUND_SEC * FPS_EST;
    tagTimeAsGola = {};
    lastTagFlash = 0;
    // учёт времени «в голях»
    for (const e of tagParticipants()) {
        if (e && e.name) tagTimeAsGola[e.name] = 0;
    }

    paused = false;
    gameOver = false;
    gameWon = false;
    playerDead = false;
    showExitDialog = false;
    deathOrder = [];
    finalRanking = null;
    screen = 'game';
    gameplayStart();
    document.getElementById('hint').textContent =
        '🔴 Ты ГОЛЯ! Догони кого-нибудь — он станет голей | WASD | Shift | ' + TAG_ROUND_SEC + 'с | Q — выйти';
}

/** Все участники салок (живые) */
function tagParticipants() {
    const list = [];
    if (player && !player.dead && player.hp > 0) list.push(player);
    if (nanny && !nanny.dead && nanny.hp > 0) list.push(nanny);
    if (npcs) {
        for (const n of npcs) {
            if (n && !n.dead && n.hp > 0) list.push(n);
        }
    }
    if (pacman && !pacman.dead && pacman.hp > 0) list.push(pacman);
    return list;
}

function setGola(ent) {
    if (!ent) return;
    for (const e of tagParticipants()) {
        e.isGola = false;
    }
    ent.isGola = true;
    gola = ent;
    tagCooldown = TAG_COOLDOWN;
    lastTagFlash = 50;
    // лёгкий отскок, чтобы не залипать
    if (player && ent !== player && gola) {
        // nothing
    }
    const name = ent.displayName || ent.name || '???';
    if (ent === player) {
        document.getElementById('hint').textContent =
            '🔴 Ты ГОЛЯ! Догоняй всех | WASD | Shift | Esc | Q';
    } else {
        document.getElementById('hint').textContent =
            '🔴 Голя: ' + name + ' — убегай! | WASD | Shift | Esc | Q';
    }
}

function tryTransferGola() {
    if (!gola || gameOver || tagCooldown > 0) return;
    const targets = tagParticipants().filter(e => e !== gola);
    for (const t of targets) {
        if (dist(gola, t) < TAG_RADIUS) {
            // оттолкнуть старую голю чуть назад
            const dx = t.x - gola.x;
            const dy = t.y - gola.y;
            const len = Math.hypot(dx, dy) || 1;
            moveEntity(gola, -(dx / len) * 28, -(dy / len) * 28);
            moveEntity(t, (dx / len) * 18, (dy / len) * 18);
            setGola(t);
            return;
        }
    }
}

/** AI: голя бежит к ближайшему, остальные убегают от голи */
function updateTagAI() {
    if (!gola || gameOver) return;
    const all = tagParticipants();
    for (const ent of all) {
        if (ent === player) continue; // игрока двигает updatePlayer
        if (ent === gola) {
            // голя (AI) — к ближайшей жертве
            let best = null, bestD = Infinity;
            for (const v of all) {
                if (v === ent) continue;
                const d = dist(ent, v);
                if (d < bestD) { bestD = d; best = v; }
            }
            if (best) {
                const dx = best.x - ent.x;
                const dy = best.y - ent.y;
                const len = Math.hypot(dx, dy) || 1;
                const boost = len < 140 ? 1.15 : 1.0;
                moveEntity(ent, (dx / len) * ent.speed * boost, (dy / len) * ent.speed * boost);
            }
        } else {
            // убегать от голи
            const d = dist(ent, gola);
            const dx = ent.x - gola.x;
            const dy = ent.y - gola.y;
            const len = Math.hypot(dx, dy) || 1;
            ent.fleeAngle = (ent.fleeAngle || 0) + (Math.random() - 0.5) * 0.2;
            const nx = dx / len + Math.cos(ent.fleeAngle) * 0.4;
            const ny = dy / len + Math.sin(ent.fleeAngle) * 0.4;
            const nlen = Math.hypot(nx, ny) || 1;
            const panic = d < 100 ? 1.35 : (d < 200 ? 1.15 : 0.9);
            if (d < 220) {
                moveEntity(ent, (nx / nlen) * ent.speed * panic, (ny / nlen) * ent.speed * panic);
            } else {
                ent.wander = (ent.wander || 0) + 0.05;
                if (Math.random() < 0.02) ent.wander = Math.random() * Math.PI * 2;
                moveEntity(ent, Math.cos(ent.wander) * ent.speed * 0.6, Math.sin(ent.wander) * ent.speed * 0.6);
            }
        }
        if (ent.isPacman) {
            ent.mouth = (ent.mouth + 0.25) % (Math.PI * 2);
        }
    }
}

function updateTagRound() {
    if (gameOver) return;
    if (tagCooldown > 0) tagCooldown--;
    if (lastTagFlash > 0) lastTagFlash--;
    chasePulse += 0.08;

    // считаем время в роли голи
    if (gola && gola.name) {
        tagTimeAsGola[gola.name] = (tagTimeAsGola[gola.name] || 0) + 1;
    }

    if (tagTimer > 0) {
        tagTimer--;
        if (tagTimer <= 0) {
            finishTag();
        }
    }
}

function finishTag() {
    if (gameOver) return;
    gameOver = true;
    gameplayStop();
    showFullscreenAd();
    // меньше всего был голей — лучше (1 место)
    const all = tagParticipants();
    // добавить всех, кто был в tagTimeAsGola
    const names = new Set(Object.keys(tagTimeAsGola));
    for (const e of all) if (e && e.name) names.add(e.name);

    const ranked = [];
    for (const name of names) {
        let ent = all.find(e => e && e.name === name);
        if (!ent) {
            // выбывших нет — ищем среди известных
            if (player && player.name === name) ent = player;
            else if (nanny && nanny.name === name) ent = nanny;
            else if (pacman && pacman.name === name) ent = pacman;
            else if (npcs) ent = npcs.find(n => n && n.name === name);
        }
        if (!ent) continue;
        ranked.push({
            name: ent.name,
            displayName: ent.displayName || ent.name,
            img: ent.img || ent.name,
            carrots: 0,
            golaFrames: tagTimeAsGola[name] || 0,
            golaSec: Math.round((tagTimeAsGola[name] || 0) / FPS_EST)
        });
    }
    ranked.sort((a, b) => {
        if (a.golaFrames !== b.golaFrames) return a.golaFrames - b.golaFrames;
        return String(a.displayName).localeCompare(String(b.displayName), 'ru');
    });

    finalRanking = {
        first: ranked[0] || null,
        second: ranked[1] || null,
        third: ranked[2] || null,
        last: ranked.length ? ranked[ranked.length - 1] : null,
        all: ranked,
        winner: ranked[0] || null
    };
    gameWon = !!(ranked[0] && player && ranked[0].name === player.name);
    playerDead = false;
    const wName = ranked[0] ? ranked[0].displayName : '???';
    document.getElementById('hint').textContent =
        '🏁 Голя окончена! Меньше всех водящим: ' + wName + ' | Enter — заново | R — выбор';
}

function fighterRankEntry(ent) {
    if (!ent) return null;
    return {
        name: ent.name,
        displayName: ent.displayName || ent.name || '???',
        img: ent.img || ent.name,
        carrots: ent.carrots || 0
    };
}

/** Все, кто может собирать морковь (не няня) */
function carrotCollectors() {
    const list = [];
    // призрак не ест 🥕 (кроме что золотую едят герои)
    if (player && !player.dead && player.hp > 0 && !playerDead && !player.isGhost && !pacPlayAsGhost) {
        list.push(player);
    }
    if (npcs) {
        for (const n of npcs) {
            if (n && !n.dead && n.hp > 0 && n.isPacmanRole) list.push(n);
        }
    }
    if (pacman && !pacman.dead && pacman.hp > 0) list.push(pacman);
    return list;
}

function nearestCarrot(ent) {
    let best = null, bestD = Infinity;
    for (const c of carrots) {
        if (c.taken) continue;
        const d = dist(ent, c);
        if (d < bestD) { bestD = d; best = c; }
    }
    return best;
}

/** Итог гонки: места 1…10 по числу морковок (больше — выше) */
function buildChaseRanking(winner) {
    const all = [];
    if (player) all.push(player);
    if (npcs) for (const n of npcs) if (n) all.push(n);
    if (pacman && (pacman.livesMax > 0 || (pacman.carrots || 0) > 0 || !pacman.dead)) all.push(pacman);

    const ranked = all
        .filter(Boolean)
        .map(e => fighterRankEntry(e))
        .sort((a, b) => {
            if (b.carrots !== a.carrots) return b.carrots - a.carrots;
            // кто первым добежал до 10 — выше при равном счёте
            if (winner && a.name === winner.name) return -1;
            if (winner && b.name === winner.name) return 1;
            return String(a.displayName).localeCompare(String(b.displayName), 'ru');
        });

    finalRanking = {
        first: ranked[0] || null,
        second: ranked[1] || null,
        third: ranked[2] || null,
        last: ranked.length ? ranked[ranked.length - 1] : null,
        all: ranked,
        winner: winner ? fighterRankEntry(winner) : null
    };
}

function recordDeath(ent) {
    if (!ent || ent._recordedDeath) return;
    if (ent.isPacman && (ent.lives || 0) > 0 && !ent.dead) return;
    const reallyDead = ent.dead || ent.hp <= 0;
    if (!reallyDead) return;
    if (ent.isPacman && (ent.lives || 0) > 0) return;
    ent._recordedDeath = true;
    deathOrder.push(fighterRankEntry(ent));
}

function trackDeaths() {
    const all = [player, nanny, ...(npcs || [])];
    if (pacman) all.push(pacman);
    for (const f of all) {
        if (!f) continue;
        if (f.isPacman) {
            if (f.dead || ((f.lives || 0) <= 0 && f.hp <= 0)) recordDeath(f);
        } else if (f.hp <= 0 || f.dead) {
            f.dead = true;
            recordDeath(f);
        }
    }
}

function buildFinalRanking(winner) {
    const ranked = [];
    if (winner) ranked.push(fighterRankEntry(winner));
    for (let i = deathOrder.length - 1; i >= 0; i--) {
        const e = deathOrder[i];
        if (winner && e.name === winner.name) continue;
        ranked.push(e);
    }
    const last = ranked.length > 1 ? ranked[ranked.length - 1] : (ranked[0] || null);
    finalRanking = {
        first: ranked[0] || null,
        second: ranked[1] || null,
        third: ranked[2] || null,
        last: last,
        all: ranked
    };
}

function finishMatch(winner) {
    if (gameOver) return;
    trackDeaths();
    buildFinalRanking(winner || null);
    gameOver = true;
    gameplayStop();
    showFullscreenAd();
    gameWon = !!(winner && player && winner === player && !playerDead && player.hp > 0);
    const wName = finalRanking && finalRanking.first
        ? finalRanking.first.displayName
        : '???';
    document.getElementById('hint').textContent =
        '🏁 Конец! 1 место: ' + wName + ' | Enter — заново | R — выбор';
}

function finishChase(won, winnerEnt) {
    if (gameOver) return;
    gameOver = true;
    gameplayStop();
    showFullscreenAd();
    const winner = winnerEnt || (won ? player : null);
    gameWon = !!(won && winner && player && winner === player);
    playerDead = !!(player && (player.dead || player.hp <= 0));
    chaseCaught = !won && playerDead && !pacPlayAsGhost;
    if (player) carrotsCollected = player.carrots || 0;
    buildChaseRanking(winner);
    const wName = finalRanking && finalRanking.first
        ? finalRanking.first.displayName
        : '???';
    const wCar = finalRanking && finalRanking.first ? finalRanking.first.carrots : 0;
    if (pacPlayAsGhost) {
        document.getElementById('hint').textContent = gameWon
            ? '👻 Няня победила! Все герои пойманы | Enter — заново | R — выбор'
            : 'Герои спаслись / няню съели | Enter — заново | R — выбор';
    } else {
        document.getElementById('hint').textContent = won
            ? '🥕 1 место: ' + wName + ' (' + wCar + ' 🥕)! Enter — заново | R — выбор'
            : 'Няня поймала! Места по моркови | Enter — заново | R — выбор';
    }
}

function clampToField(ent) {
    ent.x = Math.max(FIELD.minX + ent.radius, Math.min(FIELD.maxX - ent.radius, ent.x));
    ent.y = Math.max(FIELD.minY + ent.radius, Math.min(FIELD.maxY - ent.radius, ent.y));
}
function circleHitsWall(x, y, r, walls) {
    if (!walls || !walls.length) return false;
    for (const w of walls) {
        const nx = Math.max(w.x, Math.min(x, w.x + w.w));
        const ny = Math.max(w.y, Math.min(y, w.y + w.h));
        if (Math.hypot(x - nx, y - ny) < r + 1) return true;
    }
    return false;
}
function activeWalls() {
    if (gameMode === 'custom' && customLevel) return customLevel.walls;
    if (gameMode === 'pac' && pacWalls && pacWalls.length) return pacWalls;
    return null;
}
function canMove(x, y, r) {
    if (!(x - r >= FIELD.minX && x + r <= FIELD.maxX && y - r >= FIELD.minY && y + r <= FIELD.maxY)) return false;
    if (circleHitsWall(x, y, r, activeWalls())) return false;
    return true;
}
function allFighters() {
    const l = [player, nanny, ...(npcs || [])].filter(f => f && f.hp > 0 && !f.dead);
    if (pacman && !pacman.dead && pacman.hp > 0) l.push(pacman);
    return l;
}
function moveEntity(ent, dx, dy) {
    if (dx === 0 && dy === 0) return false;
    const ox = ent.x, oy = ent.y;
    if (canMove(ent.x + dx, ent.y, ent.radius)) ent.x += dx;
    if (canMove(ent.x, ent.y + dy, ent.radius)) ent.y += dy;
    clampToField(ent);
    if (ent.x !== ox || ent.y !== oy) { ent.angle = Math.atan2(ent.y - oy, ent.x - ox); return true; }
    return false;
}
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function isDown(c) { return !!keys[c]; }

// ——— Нож (режим битвы) ———
function spawnKnife() {
    knife.onGround = true;
    knife.heldBy = null;
    knife.holdTimer = 0;
    knife.killsLeft = 0;
    knife.x = FIELD.minX + 60 + Math.random() * (FIELD.maxX - FIELD.minX - 120);
    knife.y = FIELD.minY + 60 + Math.random() * (FIELD.maxY - FIELD.minY - 120);
    knife.pulse = 0;
}
function dropKnifeFromHolder() {
    const holder = knife.heldBy;
    if (holder) holder.hasKnife = false;
    knife.heldBy = null;
    knife.holdTimer = 0;
    knife.killsLeft = 0;
    knife.onGround = false;
    knife.spawnCD = KNIFE_RESPAWN;
}
function moveTowardKnife(ent, mult = 1.4) {
    const dx = knife.x - ent.x, dy = knife.y - ent.y, len = Math.hypot(dx, dy) || 1;
    moveEntity(ent, (dx / len) * ent.speed * mult, (dy / len) * ent.speed * mult);
}
function tryPickupKnife(ent) {
    if (!knife.onGround || ent.hp <= 0 || (ent.isPacman && ent.dead)) return;
    if (dist(ent, { x: knife.x, y: knife.y }) < 38) {
        knife.onGround = false;
        knife.heldBy = ent;
        ent.hasKnife = true;
        knife.holdTimer = KNIFE_HOLD_FRAMES;
        knife.killsLeft = KNIFE_MAX_KILLS;
    }
}
function knifeKill(att, vic) {
    if (vic.isPacman) { vic.lives = 0; vic.hp = 0; vic.dead = true; }
    else { vic.hp = 0; }
    vic.hasKnife = false;
    knife.killsLeft = Math.max(0, (knife.killsLeft || 0) - 1);
    if (knife.killsLeft <= 0) dropKnifeFromHolder();
    else {
        att.hasKnife = true;
        knife.heldBy = att;
    }
}
function updateKnifeSpawn() {
    knife.pulse += 0.12;
    if (knife.heldBy) {
        const holder = knife.heldBy;
        if (holder.hp <= 0 || holder.dead) {
            dropKnifeFromHolder();
            return;
        }
        if (knife.holdTimer > 0) {
            knife.holdTimer--;
            if (knife.holdTimer <= 0) {
                dropKnifeFromHolder();
                return;
            }
        }
        return;
    }
    if (knife.onGround) return;
    if (knife.spawnCD > 0) knife.spawnCD--; else spawnKnife();
}
function knifeHoldSecondsLeft() {
    if (!knife.heldBy || knife.holdTimer <= 0) return 0;
    return Math.ceil(knife.holdTimer / FPS_EST);
}
function checkKnifeCombat() {
    const att = knife.heldBy;
    if (!att || att.hp <= 0 || (att.isPacman && att.dead)) return;
    const targets = [player, nanny, ...npcs];
    if (!pacman.dead && pacman.hp > 0) targets.push(pacman);
    for (const vic of targets) {
        if (vic === att || vic.hp <= 0 || (vic.isPacman && vic.dead)) continue;
        if (dist(att, vic) < 48) { knifeKill(att, vic); return; }
    }
}
function chaseWithKnife(ent) {
    const t = nearestEnemy(ent); if (!t) return;
    const dx = t.x - ent.x, dy = t.y - ent.y, len = Math.hypot(dx, dy) || 1;
    moveEntity(ent, (dx / len) * ent.speed * 1.5, (dy / len) * ent.speed * 1.5);
}

function trySwing(ent) {
    if (ent.hp <= 0 || ent.hasKnife) return;
    // в своём уровне бить можно только с палкой
    if (gameMode === 'custom' && !ent.hasStick && !isCustomTeamMode()) return;
    if (ent.isPacman) {
        if (ent.biteCooldown > 0 || ent.dead) return;
        ent.biteCooldown = ent.attackCooldown || 12;
        for (const v of allFighters()) {
            if (v === ent || v.hp <= 0) continue;
            if (dist(ent, v) < (ent.hitRadius || 42)) {
                if (v.isPacman && v !== ent) hurtPacmanEntity(v, ent);
                else {
                    v.hp -= ent.damage;
                    moveEntity(v, Math.cos(ent.angle) * 20, Math.sin(ent.angle) * 20);
                }
            }
        }
        return;
    }
    if (ent.swing > 0 || ent.hitCooldown > 0) return;
    ent.swing = 20;
}
function stickTip(ent) {
    const len = ent.swing > 9 ? (ent.upgraded ? 72 : 58) : (ent.upgraded ? 48 : 38);
    const off = ent.swing > 0 ? Math.sin((20 - ent.swing) / 20 * Math.PI) * 0.9 : 0;
    const a = ent.angle + off;
    return { x: ent.x + Math.cos(a) * len, y: ent.y + Math.sin(a) * len };
}
function nearestEnemy(ent) {
    let b = null, d = Infinity;
    for (const o of allFighters()) {
        if (o === ent) continue;
        const t = dist(ent, o);
        if (t < d) { d = t; b = o; }
    }
    return b;
}

function respawnPacmanEntity(ent) {
    ent.x = 200 + Math.random() * 500;
    ent.y = 100 + Math.random() * 400;
    if (ent === pacman) { ent.hp = 1; }
    else { ent.hp = Math.max(1, Math.floor(ent.hpMax * 0.5)); }
    ent.invuln = 90; ent.biteCooldown = 0; ent.dead = false;
    clampToField(ent);
}
function hurtPacmanEntity(ent, att) {
    if (ent.dead || ent.hp <= 0 || ent.invuln > 0) return;
    ent.lives--;
    if (ent.lives > 0) respawnPacmanEntity(ent);
    else { ent.hp = 0; ent.dead = true; }
    if (att) moveEntity(ent, Math.cos(att.angle) * 22, Math.sin(att.angle) * 22);
}
function hurtPacman(att) { hurtPacmanEntity(pacman, att); }

function updatePacman() {
    if (pacman.dead || pacman.hp <= 0) return;
    if (pacman.invuln > 0) pacman.invuln--;
    pacman.mouth = (pacman.mouth + 0.25) % (Math.PI * 2);
    if (knife.onGround) { moveTowardKnife(pacman, 1.5); tryPickupKnife(pacman); }
    else if (pacman.hasKnife) chaseWithKnife(pacman);
    else {
        const t = nearestEnemy(pacman);
        if (t) {
            const dx = t.x - pacman.x, dy = t.y - pacman.y, len = Math.hypot(dx, dy) || 1;
            moveEntity(pacman, (dx / len) * pacman.speed, (dy / len) * pacman.speed);
        } else moveEntity(pacman, Math.cos(pacman.angle) * pacman.speed * 0.5, Math.sin(pacman.angle) * pacman.speed * 0.5);
    }
    if (pacman.biteCooldown > 0) pacman.biteCooldown--;
    if (!pacman.hasKnife) {
        for (const v of [player, nanny, ...npcs]) {
            if (v.hp <= 0 || pacman.biteCooldown > 0) continue;
            if (dist(pacman, v) < 42) {
                if (v.isPacman) hurtPacmanEntity(v, pacman);
                else {
                    v.hp -= pacman.damage;
                    moveEntity(v, Math.cos(pacman.angle) * 20, Math.sin(pacman.angle) * 20);
                }
                pacman.biteCooldown = 40;
            }
        }
    }
}

function updateAI(ent) {
    if (!ent.ai || ent.hp <= 0 || ent.isPacman) return;
    if (knife.onGround) { moveTowardKnife(ent); tryPickupKnife(ent); return; }
    if (ent.hasKnife) { chaseWithKnife(ent); return; }
    const t = nearestEnemy(ent); if (!t) return;
    const dx = t.x - ent.x, dy = t.y - ent.y, len = Math.hypot(dx, dy) || 1, d = dist(ent, t);
    if (d > 60) moveEntity(ent, (dx / len) * ent.speed, (dy / len) * ent.speed);
    else if (d < 35) moveEntity(ent, -(dx / len) * ent.speed * 0.6, -(dy / len) * ent.speed * 0.6);
    else moveEntity(ent, (dx / len) * ent.speed * 0.4, (dy / len) * ent.speed * 0.4);
    if (d < 95) trySwing(ent);
}

// ——— Режим 2: AI ———
/**
 * Умный союзник (Пин / Ёжик / Крош):
 * — BFS-путь по лабиринту
 * — убегает от няни ЗАРАНЕЕ и в сторону, где есть выход
 * — выбирает БЕЗОПАСНУЮ морковку (не ту, что рядом с няней)
 * — не толпится: разные «предпочтительные» зоны
 */
function fleeFromNanny(ent, speedMult = 1) {
    if (!ent || ent.hp <= 0 || ent.dead) return;
    const dN = nanny ? dist(ent, nanny) : 9999;
    const spd = (ent.speed || 5) * speedMult;

    // --- ОПАСНО: бежим умно ---
    const dangerR = gameMode === 'pac' ? 170 : 200;
    const panicR = gameMode === 'pac' ? 95 : 90;
    if (nanny && dN < dangerR) {
        // точка побега: от няни + немного вбок (не в стену)
        const ax = ent.x - nanny.x;
        const ay = ent.y - nanny.y;
        const al = Math.hypot(ax, ay) || 1;
        // перпендикуляр для «среза» в коридоре
        const side = (ent._fleeSide != null) ? ent._fleeSide : (Math.random() < 0.5 ? 1 : -1);
        ent._fleeSide = side;
        let fx = ent.x + (ax / al) * 140 + (-ay / al) * 70 * side;
        let fy = ent.y + (ay / al) * 140 + (ax / al) * 70 * side;
        // если предсказанная точка в стене — чисто от няни
        if (!canMove(fx, fy, ent.radius || 8)) {
            fx = ent.x + (ax / al) * 160;
            fy = ent.y + (ay / al) * 160;
        }
        // рядом с няней — паника: быстрее
        const panic = dN < panicR ? 1.45 : 1.18;
        smartMoveToward(ent, fx, fy, spd * panic);
        // если почти зажали — рывок в любой свободный проход
        if (dN < 55) {
            const step = 28;
            const dirs = [[step,0],[-step,0],[0,step],[0,-step],[step,step],[-step,step],[step,-step],[-step,-step]];
            let best = null, bestAway = -1;
            for (let i = 0; i < dirs.length; i++) {
                const nx = ent.x + dirs[i][0], ny = ent.y + dirs[i][1];
                if (!canMove(nx, ny, ent.radius || 8)) continue;
                const away = Math.hypot(nx - nanny.x, ny - nanny.y);
                if (away > bestAway) { bestAway = away; best = { x: nx, y: ny }; }
            }
            if (best) smartMoveToward(ent, best.x, best.y, spd * 1.5);
        }
        return;
    }

    // --- БЕЗОПАСНО: умный сбор 🥕 ---
    const carrot = smartSafeCarrot(ent);
    if (carrot) {
        // липкость к выбранной морковке, чтобы не дёргались
        if (!ent._carrotT || ent._carrotT <= 0 || !ent._carrotGoal || ent._carrotGoal.taken) {
            ent._carrotGoal = carrot;
            ent._carrotT = 40 + Math.floor(Math.random() * 30);
        } else {
            ent._carrotT--;
        }
        const g = ent._carrotGoal || carrot;
        smartMoveToward(ent, g.x, g.y, spd * 1.05);
        return;
    }

    // --- нет морковок: патруль / к игроку не лезем, гуляем по maze ---
    if (!ent._patrol || ent._patrolT <= 0) {
        if (pacOpenSpots && pacOpenSpots.length) {
            ent._patrol = pacOpenSpots[Math.floor(Math.random() * pacOpenSpots.length)];
        } else {
            ent._patrol = randomFieldPos(60);
        }
        ent._patrolT = 50 + Math.floor(Math.random() * 40);
    } else {
        ent._patrolT--;
    }
    smartMoveToward(ent, ent._patrol.x, ent._patrol.y, spd * 0.85);
}

/** Безопасная морковка: далеко от няни, не занята другим союзником */
function smartSafeCarrot(ent) {
    if (!carrots || !carrots.length) return null;
    let best = null, bestScore = -Infinity;
    // «личная» зона — чтобы Пин и Ёжик не бежали в одну точку
    const preferX = ent._zoneX != null ? ent._zoneX : (ent.x);
    const preferY = ent._zoneY != null ? ent._zoneY : (ent.y);

    for (let i = 0; i < carrots.length; i++) {
        const c = carrots[i];
        if (!c || c.taken) continue;
        const dMe = dist(ent, c);
        let score = 500 - dMe;
        // бонус энергетику
        if (c.power) score += 40;
        // штраф, если няня близко к морковке
        if (nanny) {
            const dN = Math.hypot(c.x - nanny.x, c.y - nanny.y);
            if (dN < 70) score -= 400;
            else if (dN < 120) score -= 120;
            else score += Math.min(80, dN * 0.15);
        }
        // не толпиться: если другой NPC ближе к этой 🥕 — штраф
        if (npcs) {
            for (let j = 0; j < npcs.length; j++) {
                const o = npcs[j];
                if (!o || o === ent || o.dead) continue;
                if (dist(o, c) + 8 < dMe) score -= 55;
            }
        }
        // предпочитать «свою» половину карты
        const zd = Math.hypot(c.x - preferX, c.y - preferY);
        score -= zd * 0.08;
        if (score > bestScore) { bestScore = score; best = c; }
    }
    return best;
}

/** Все живые жертвы няни: игрок, NPC, пакман */
function chaseVictims() {
    const list = [];
    // жертвы няни = пакман-герои (не призрак)
    if (player && !player.dead && player.hp > 0 && !playerDead && !player.isGhost && !pacPlayAsGhost) {
        list.push(player);
    }
    if (npcs) {
        for (const n of npcs) {
            if (n && !n.dead && n.hp > 0 && (n.isPacmanRole || !n.isGhost)) list.push(n);
        }
    }
    if (pacman && !pacman.dead && pacman.hp > 0) list.push(pacman);
    return list;
}

/** Ближайшая / умная жертва (для UI «Няня — за …») */
function nearestChaseVictim() {
    return smartNannyTarget();
}

/**
 * Выбор жертвы: равно на ВСЕХ (ты / Пин / Ёжик / Крош).
 * Ближайший + лидер по 🥕 + тупик. Без «только игрок».
 */
function smartNannyTarget() {
    if (!nanny) return null;
    const victims = chaseVictims();
    if (!victims.length) return null;

    // липкость к текущей цели, но переключаемся, если кто-то заметно ближе
    if (nanny._huntTarget && victims.indexOf(nanny._huntTarget) >= 0) {
        nanny._huntSticky = (nanny._huntSticky || 0) - 1;
        if (nanny._huntSticky > 0) {
            const dCur = dist(nanny, nanny._huntTarget);
            let nearest = null, nd = Infinity;
            for (let i = 0; i < victims.length; i++) {
                const dd = dist(nanny, victims[i]);
                if (dd < nd) { nd = dd; nearest = victims[i]; }
            }
            // если другой ближе на ~45% — меняем цель
            if (nearest && nearest !== nanny._huntTarget && nd < dCur * 0.55) {
                nanny._huntTarget = nearest;
                nanny._huntSticky = 35;
                return nearest;
            }
            return nanny._huntTarget;
        }
    }

    let best = null, bestScore = -Infinity;
    for (let i = 0; i < victims.length; i++) {
        const v = victims[i];
        const d = dist(nanny, v);
        let score = 600 - d * 1.6;
        // лидер по моркови интереснее
        score += (v.carrots || 0) * 2;
        // в тупике — добить
        if (gameMode === 'pac' && typeof mazeTrapBonus === 'function') {
            score += mazeTrapBonus(v) * 22;
        }
        if (d < 70) score += 60;
        // все равны: без бонуса «только игрок»
        if (score > bestScore) { bestScore = score; best = v; }
    }
    nanny._huntTarget = best;
    nanny._huntSticky = 40 + Math.floor(Math.random() * 35);
    return best;
}

/** Сколько выходов закрыто (0..4) — для сжатия в тупике */
function mazeTrapBonus(ent) {
    if (!ent) return 0;
    const step = 24;
    const dirs = [[step, 0], [-step, 0], [0, step], [0, -step]];
    let blocked = 0;
    for (let i = 0; i < dirs.length; i++) {
        if (!canMove(ent.x + dirs[i][0], ent.y + dirs[i][1], ent.radius || 8)) blocked++;
    }
    return blocked;
}

/**
 * BFS-поиск пути по сетке с учётом стен.
 * Возвращает точку-следующий шаг {x,y} или null.
 */
function nannyPathStep(sx, sy, tx, ty, radius) {
    const G = 20; // шаг сетки
    const maxN = 900;
    const qx = [], qy = [];
    const came = new Map();
    const k = (x, y) => x + ',' + y;
    const sgx = Math.round(sx / G) * G;
    const sgy = Math.round(sy / G) * G;
    const tgx = Math.round(tx / G) * G;
    const tgy = Math.round(ty / G) * G;
    const sk = k(sgx, sgy);
    qx.push(sgx); qy.push(sgy);
    came.set(sk, null);
    let head = 0;
    const dirs = [[G,0],[-G,0],[0,G],[0,-G],[G,G],[G,-G],[-G,G],[-G,-G]];
    let found = null;
    while (head < qx.length && head < maxN) {
        const cx = qx[head], cy = qy[head];
        head++;
        if (Math.abs(cx - tgx) <= G && Math.abs(cy - tgy) <= G) {
            found = k(cx, cy);
            break;
        }
        for (let i = 0; i < dirs.length; i++) {
            // диагонали только если обе оси свободны (без срезания углов)
            const dx = dirs[i][0], dy = dirs[i][1];
            const nx = cx + dx, ny = cy + dy;
            const nk = k(nx, ny);
            if (came.has(nk)) continue;
            if (!canMove(nx, ny, radius)) continue;
            if (dx && dy) {
                if (!canMove(cx + dx, cy, radius) || !canMove(cx, cy + dy, radius)) continue;
            }
            came.set(nk, k(cx, cy));
            qx.push(nx); qy.push(ny);
        }
    }
    if (!found) {
        // не нашли — идём к ближайшей достигнутой клетке к цели
        let bestK = null, bestD = Infinity;
        came.forEach(function (_, key) {
            const p = key.split(',');
            const x = +p[0], y = +p[1];
            const d = (x - tgx) * (x - tgx) + (y - tgy) * (y - tgy);
            if (d < bestD) { bestD = d; bestK = key; }
        });
        found = bestK;
    }
    if (!found || found === sk) return null;
    // разматываем путь: нужен ПЕРВЫЙ шаг от старта
    let cur = found;
    let prev = came.get(cur);
    while (prev && prev !== sk) {
        cur = prev;
        prev = came.get(cur);
    }
    const parts = cur.split(',');
    return { x: +parts[0], y: +parts[1] };
}

/**
 * Умное движение: BFS-путь + обход + анти-застревание
 */
function smartMoveToward(ent, tx, ty, speed) {
    if (!ent || speed <= 0) return false;
    const r = ent.radius || 10;
    const ox = ent.x, oy = ent.y;

    // 1) BFS waypoint
    const step = nannyPathStep(ox, oy, tx, ty, r);
    let aimX = tx, aimY = ty;
    if (step) {
        aimX = step.x;
        aimY = step.y;
    }

    const dx = aimX - ox, dy = aimY - oy;
    const len = Math.hypot(dx, dy) || 1;
    // кандидаты направлений
    const cands = [
        { x: (dx / len) * speed, y: (dy / len) * speed },
        { x: Math.sign(dx) * speed, y: 0 },
        { x: 0, y: Math.sign(dy) * speed },
        { x: (dx / len) * speed * 0.7, y: (dy / len) * speed * 0.7 }
    ];
    // если застряла — пробуем все 8
    if ((ent._stuck || 0) > 8) {
        for (let a = 0; a < 8; a++) {
            const ang = a * Math.PI / 4 + (ent._unstuckAng || 0);
            cands.push({ x: Math.cos(ang) * speed, y: Math.sin(ang) * speed });
        }
    }

    let best = null, bestScore = -Infinity;
    for (let i = 0; i < cands.length; i++) {
        const o = cands[i];
        let nx = ox, ny = oy;
        if (canMove(ox + o.x, oy, r)) nx = ox + o.x;
        if (canMove(nx, oy + o.y, r)) ny = oy + o.y;
        if (nx === ox && ny === oy) continue;
        const toGoal = Math.hypot(tx - nx, ty - ny);
        const toAim = Math.hypot(aimX - nx, aimY - ny);
        const moved = Math.hypot(nx - ox, ny - oy);
        const score = -toGoal * 1.0 - toAim * 0.35 + moved * 0.5;
        if (score > bestScore) {
            bestScore = score;
            best = { x: nx, y: ny };
        }
    }

    if (!best) {
        ent._stuck = (ent._stuck || 0) + 3;
        ent._unstuckAng = Math.random() * Math.PI * 2;
        const a = ent._unstuckAng;
        return moveEntity(ent, Math.cos(a) * speed, Math.sin(a) * speed);
    }

    const movedDist = Math.hypot(best.x - ox, best.y - oy);
    if (movedDist < speed * 0.15) ent._stuck = (ent._stuck || 0) + 1;
    else ent._stuck = Math.max(0, (ent._stuck || 0) - 2);

    ent.x = best.x;
    ent.y = best.y;
    ent.angle = Math.atan2(best.y - oy, best.x - ox);
    clampToField(ent);
    return true;
}

/**
 * Умная няня v3 (ещё злее):
 * — BFS + двойной шаг (быстрее думает в лабиринте)
 * — перехват пути жертвы (cut-off)
 * — если жертва в тупике — сжимает
 * — скорость ≈ / чуть выше игрока вблизи
 * — не отпускает игрока
 */
function isNannyScared() {
    return gameMode === 'pac' && nannyPowerT > 0 && nanny && !nanny.dead;
}

/** Золотая морковь: няня синеет, её можно съесть */
function activatePacPower(eater) {
    if (gameMode !== 'pac') return;
    nannyPowerT = PAC_POWER_FRAMES;
    if (nanny) {
        nanny.scared = true;
        nanny.speed = PAC_SPEED_NANNY_SCARED;
    }
    const who = eater === player ? 'Ты' : ((eater && eater.displayName) || 'Герой');
    document.getElementById('hint').textContent =
        '💙 ' + who + ' съел золотую 🥕! Няня СИНЯЯ — догони и съешь!';
}

/** Съесть синюю няню (респавн в центре / N-точке) */
function eatScaredNanny(eater) {
    if (!nanny || !isNannyScared() || !eater || eater.dead) return false;
    if (dist(eater, nanny) >= CATCH_RADIUS + 6) return false;

    eater.carrots = (eater.carrots || 0) + PAC_EAT_NANNY_SCORE;
    if (eater === player) carrotsCollected = eater.carrots;

    // респавн няни
    const used = [{ x: eater.x, y: eater.y }];
    if (player && eater !== player) used.push({ x: player.x, y: player.y });
    const s = (typeof randomPacSpawn === 'function')
        ? randomPacSpawn(used, 140, 6)
        : (pacNannySpawns && pacNannySpawns[0]) || { x: 450, y: 300 };
    nanny.x = s.x;
    nanny.y = s.y;
    if (typeof ensureClearPacSpawn === 'function') ensureClearPacSpawn(nanny);
    nanny.invuln = 60;
    nannyPowerT = 0;
    nanny.scared = false;
    nanny.speed = nanny._baseSpeed || PAC_SPEED_NANNY;
    nannyEatenFlash = 70;

    const who = eater === player ? 'Ты' : ((eater && eater.displayName) || 'Герой');
    document.getElementById('hint').textContent =
        '😋 ' + who + ' съел няню! +' + PAC_EAT_NANNY_SCORE + ' 🥕';
    return true;
}

function updateNannyChase() {
    if (!nanny || gameOver || nanny.dead) return;

    // тик режима силы
    if (gameMode === 'pac' && nannyPowerT > 0) {
        nannyPowerT--;
        if (nannyPowerT <= 0) {
            nanny.scared = false;
            nanny.speed = nanny._baseSpeed || PAC_SPEED_NANNY;
            if (pacPlayAsGhost && player) {
                player.speed = PAC_SPEED_NANNY;
                player._baseSpeed = PAC_SPEED_NANNY;
            }
            document.getElementById('hint').textContent = pacPlayAsGhost
                ? '⚠ Сила кончилась! Ты снова опасная няня — лови героев!'
                : '⚠ Сила кончилась! Няня снова опасна · собирай 🥕';
        } else if (pacPlayAsGhost && player) {
            // игрок-няня синяя — медленнее, управление у игрока
            player.speed = PAC_SPEED_NANNY_SCARED;
            player._baseSpeed = PAC_SPEED_NANNY_SCARED;
        }
    }
    if (nannyEatenFlash > 0) nannyEatenFlash--;
    if ((nanny.invuln || 0) > 0) nanny.invuln--;

    // игрок сам управляет няней — AI не двигает
    if (pacPlayAsGhost || nanny === player) {
        return;
    }

    // СИНЯЯ: убегает от ближайшего героя
    if (isNannyScared()) {
        const hunters = chaseVictims();
        let threat = null, bestD = Infinity;
        for (let i = 0; i < hunters.length; i++) {
            const h = hunters[i];
            const dd = dist(nanny, h);
            if (dd < bestD) { bestD = dd; threat = h; }
        }
        if (threat) {
            const ax = nanny.x - threat.x, ay = nanny.y - threat.y;
            const al = Math.hypot(ax, ay) || 1;
            const fx = nanny.x + (ax / al) * 120;
            const fy = nanny.y + (ay / al) * 120;
            const spd = PAC_SPEED_NANNY_SCARED;
            nanny.speed = spd;
            smartMoveToward(nanny, fx, fy, spd);
        }
        return;
    }

    const target = smartNannyTarget();
    if (!target) return;

    if (target._px == null) { target._px = target.x; target._py = target.y; }
    const tvx = target.x - target._px;
    const tvy = target.y - target._py;
    target._px = target.x;
    target._py = target.y;
    target._vx = tvx;
    target._vy = tvy;

    const d = dist(nanny, target);

    // перехват: дальше смотрим, куда бежит
    const eta = Math.min(28, Math.max(8, d / Math.max(2.2, nanny.speed)));
    let predX = target.x + tvx * eta;
    let predY = target.y + tvy * eta;
    if (Math.hypot(tvx, tvy) < 0.3) {
        predX = target.x;
        predY = target.y;
    }
    // cut-off: точка ВПЕРЕДИ жертвы + смещение к выходу из коридора
    if (Math.hypot(tvx, tvy) > 0.5) {
        const vl = Math.hypot(tvx, tvy) || 1;
        predX = target.x + (tvx / vl) * Math.min(120, d * 0.55);
        predY = target.y + (tvy / vl) * Math.min(120, d * 0.55);
    }
    if (!canMove(predX, predY, target.radius || 8)) {
        // запасной перехват — 4 стороны вокруг жертвы
        const offs = [[40,0],[-40,0],[0,40],[0,-40],[55,55],[-55,55]];
        let ok = false;
        for (let i = 0; i < offs.length; i++) {
            const px = target.x + offs[i][0], py = target.y + offs[i][1];
            if (canMove(px, py, nanny.radius || 8)) {
                // предпочитаем точку ближе к няне (отрезать)
                if (!ok || Math.hypot(px - nanny.x, py - nanny.y) < Math.hypot(predX - nanny.x, predY - nanny.y)) {
                    predX = px; predY = py; ok = true;
                }
            }
        }
        if (!ok) { predX = target.x; predY = target.y; }
    }

    // тупик жертвы — идём прямо в морду
    let trap = 0;
    if (typeof mazeTrapBonus === 'function') trap = mazeTrapBonus(target);
    if (trap >= 3) {
        predX = target.x;
        predY = target.y;
    }

    // База скорости: в пакмане — константа, не разгоняется до твоей
    let base;
    if (gameMode === 'pac') {
        base = nanny._baseSpeed || PAC_SPEED_NANNY;
    } else {
        const pSpd = (player && player.speed) ? player.speed : 6.5;
        base = Math.max(nanny._baseSpeed || nanny.speed || 4.2, pSpd * CHASE_SPEED_NANNY_MULT);
    }

    // лёгкий буст рядом — но няня НЕ обгоняет героев
    let boost = 1.0;
    if (d < 160) boost += 0.06;
    if (d < 80) boost += 0.08;
    if (d < 45) boost += 0.06;
    if (trap >= 3) boost += 0.08;
    if ((target.carrots || 0) >= 30) boost += 0.05;
    // потолок: в пакмане не выше ~92% скорости героя
    if (gameMode === 'pac') {
        const cap = PAC_SPEED_PLAYER * 0.92;
        boost = Math.min(boost, cap / base);
    }

    const spd = base * boost;
    nanny.speed = base; // не накапливаем разгон

    // один уверенный шаг + лёгкий дожим (без двойного «ракетного» шага)
    smartMoveToward(nanny, predX, predY, spd);
    if (d < 90) {
        const dx = target.x - nanny.x, dy = target.y - nanny.y;
        const len = Math.hypot(dx, dy) || 1;
        moveEntity(nanny, (dx / len) * spd * 0.28, (dy / len) * spd * 0.28);
    }
}


/**
 * Удар няни по герою-пакману (ты / Пин / Ёжик / Крош).
 * В режиме pac: 3 жизни, респавн. Иначе — выбывание как раньше.
 * @returns true если цель окончательно выбыла
 */
function nannyHitHero(ent) {
    if (!ent || !nanny || gameOver) return false;
    if (ent.dead || ent.hp <= 0) return false;
    if ((ent.invuln || 0) > 0) return false;
    if (dist(ent, nanny) >= CATCH_RADIUS) return false;

    // Синяя няня — её едят герои, а не наоборот
    if (isNannyScared()) {
        eatScaredNanny(ent);
        return false;
    }
    if ((nanny.invuln || 0) > 0) return false;

    // Режим Пакман: 3 жизни
    if (gameMode === 'pac' && (ent.livesMax > 0 || ent.isPacmanRole)) {
        ent.lives = Math.max(0, (ent.lives != null ? ent.lives : 3) - 1);
        if (ent.lives > 0) {
            ent.hp = 1;
            ent.dead = false;
            ent.invuln = 100; // ~1.6 сек неуязвимости
            // респавн в случайной клетке, подальше от няни
            const used = nanny ? [{ x: nanny.x, y: nanny.y }] : [];
            if (player && ent !== player) used.push({ x: player.x, y: player.y });
            const s = (typeof randomPacSpawn === 'function')
                ? randomPacSpawn(used, 120, 6)
                : randomFieldPos(60);
            ent.x = s.x; ent.y = s.y;
            if (typeof ensureClearPacSpawn === 'function') ensureClearPacSpawn(ent);
            if (ent === player) {
                playerDead = false;
                document.getElementById('hint').textContent =
                    '❤ Осталось жизней: ' + ent.lives + ' · убегай от няни!';
            }
            return false;
        }
        // жизни кончились
        ent.hp = 0;
        ent.dead = true;
        ent.lives = 0;
        if (ent === player) {
            playerDead = true;
            // если ты был няней — герои победили
            finishChase(false, null);
        }
        return true;
    }

    // Догонялки / прочее: один удар = выбыл
    ent.hp = 0;
    ent.dead = true;
    if (ent === player) {
        playerDead = true;
        finishChase(false, null);
    }
    return true;
}

/** Победа няни: поймать всех героев */
function checkPacGhostWin() {
    if (!pacPlayAsGhost || gameOver || gameMode !== 'pac') return;
    const alive = (npcs || []).filter(function (n) { return n && !n.dead && n.hp > 0; });
    if (alive.length === 0) finishChase(true, player);
}

function updateChaseNPCs() {
    // раздаём «зоны» Пину/Ёжику/Крошу — чтобы не бежали стаей
    if (npcs && npcs.length) {
        for (let i = 0; i < npcs.length; i++) {
            const n = npcs[i];
            if (!n || n._zoneX != null) continue;
            if (i === 0) { n._zoneX = FIELD.minX + 120; n._zoneY = FIELD.minY + 100; }
            else if (i === 1) { n._zoneX = FIELD.maxX - 120; n._zoneY = FIELD.maxY - 100; }
            else { n._zoneX = FIELD.maxX - 120; n._zoneY = FIELD.minY + 100; }
            if (gameMode === 'pac') n.speed = n._baseSpeed || PAC_SPEED_ALLY;
        }
    }
    for (const n of npcs) {
        if (!n || n.dead || n.hp <= 0) continue;
        if (n.invuln > 0) n.invuln--;
        if (gameMode === 'pac') n.speed = n._baseSpeed || PAC_SPEED_ALLY;
        // синяя няня — союзники тоже гонятся съесть
        if (isNannyScared() && nanny) {
            smartMoveToward(n, nanny.x, nanny.y, (n.speed || PAC_SPEED_ALLY) * 1.1);
        } else {
            fleeFromNanny(n, 1.0);
        }
        nannyHitHero(n);
    }
    if (pacman && !pacman.dead && pacman.hp > 0) {
        if (pacman.invuln > 0) pacman.invuln--;
        if (isNannyScared() && nanny) {
            smartMoveToward(pacman, nanny.x, nanny.y, pacman.speed * 1.05);
        } else {
            fleeFromNanny(pacman, 1.12);
        }
        pacman.mouth = (pacman.mouth + 0.25) % (Math.PI * 2);
        nannyHitHero(pacman);
    }
}

function updateCarrots() {
    if (gameOver) return;
    // подбор: игрок + все друзья (пин, крош, лосяш, пакман, лунтик, ёжик…)
    const collectors = carrotCollectors();
    const pickR = gameMode === 'pac' ? 22 : CARROT_PICKUP_R;
    for (const c of carrots) {
        if (c.taken) continue;
        c.pulse += 0.1;
        for (const ent of collectors) {
            if (c.taken) break;
            if (dist(ent, c) < pickR) {
                c.taken = true;
                // золотая морковь: +2 🥕 и няня синеет
                const add = (gameMode === 'pac' && c.power) ? 2 : 1;
                ent.carrots = (ent.carrots || 0) + add;
                if (ent === player) carrotsCollected = ent.carrots;
                if (gameMode === 'pac' && c.power) activatePacPower(ent);
            }
        }
    }
    carrots = carrots.filter(c => !c.taken);
    // спавн новых (и в Пакмане тоже — нужно набрать 100)
    const maxDots = gameMode === 'pac' ? 18 : MAX_CARROTS_ON_FIELD;
    if (carrots.length < maxDots) {
        if (carrotSpawnCD > 0) carrotSpawnCD--;
        else {
            if (gameMode === 'pac') spawnPacCarrot();
            else spawnCarrot();
            carrotSpawnCD = gameMode === 'pac' ? 18 : CARROT_RESPAWN_CD;
        }
    }
    // побеждает первый, кто набрал 100 🥕
    for (const ent of collectors) {
        if ((ent.carrots || 0) >= CARROTS_TO_WIN) {
            finishChase(true, ent);
            return;
        }
    }
    // легендарный счёт
    for (const ent of collectors) {
        if ((ent.carrots || 0) >= CARROTS_LEGEND) {
            finishChase(true, ent);
            return;
        }
    }
}

function checkNannyCatch() {
    if (!nanny || gameOver) return;
    if (gameMode === 'pac' && pacPlayAsGhost) {
        // ты — няня: ловишь героев-AI
        for (let i = 0; i < (npcs || []).length; i++) {
            const n = npcs[i];
            if (n && !n.dead && n.hp > 0) nannyHitHero(n);
        }
        // победа: все герои выбыли
        const alive = (npcs || []).filter(function (n) { return n && !n.dead && n.hp > 0; });
        if (alive.length === 0 && !gameOver) {
            finishChase(true, player);
        }
        return;
    }
    if (!player) return;
    if (playerDead && gameMode !== 'pac') return;
    nannyHitHero(player);
}

function updatePlayer() {
    if (player.hp <= 0 || player.dead || playerDead) return;
    if (player.invuln > 0) player.invuln--;
    if (player.isPacman) {
        player.mouth = (player.mouth + 0.25) % (Math.PI * 2);
        if (player.biteCooldown > 0) player.biteCooldown--;
    }
    if (gameMode === 'battle' && isDown('Space')) trySwing(player);
    // свой уровень: удар палкой (Пробел), если подобрал
    if (gameMode === 'custom' && isDown('Space') && !player.hasKnife && (player.hasStick || isCustomTeamMode())) trySwing(player);
    const baseSpd = player._baseSpeed || player.speed;
    const shiftMul = gameMode === 'pac' ? PAC_SHIFT_MULT : 1.5;
    const spd = isDown('ShiftLeft') || isDown('ShiftRight') ? baseSpd * shiftMul : baseSpd;
    let dx = 0, dy = 0;
    if (isDown('ArrowLeft') || isDown('KeyA')) dx -= spd;
    if (isDown('ArrowRight') || isDown('KeyD')) dx += spd;
    if (isDown('ArrowUp') || isDown('KeyW')) dy -= spd;
    if (isDown('ArrowDown') || isDown('KeyS')) dy += spd;
    if (dx && dy) { dx *= 0.707; dy *= 0.707; }
    moveEntity(player, dx, dy);
    if (gameMode === 'battle' && knife.onGround) tryPickupKnife(player);
}

function checkCombat() {
    const fighters = [player, nanny, ...npcs];
    for (const att of fighters) {
        if (att.hp <= 0 || att.isPacman || att.swing <= 9 || att.hitCooldown > 0 || att.hasKnife) continue;
        const tip = stickTip(att);
        for (const vic of fighters) {
            if (vic === att || vic.hp <= 0 || vic.dead) continue;
            if (dist(tip, vic) < att.hitRadius) {
                if (vic.isPacman) hurtPacmanEntity(vic, att);
                else vic.hp -= att.damage;
                att.hitCooldown = att.attackCooldown;
                att.swing = 0;
                moveEntity(vic, Math.cos(att.angle) * 16, Math.sin(att.angle) * 16);
            }
        }
        if (!pacman.dead && pacman.hp > 0 && dist(tip, pacman) < att.hitRadius + 10) {
            hurtPacman(att); att.hitCooldown = att.attackCooldown; att.swing = 0;
        }
    }
}
function updateTimers() {
    for (const f of [player, nanny, ...npcs]) {
        if (f.swing > 0) f.swing--;
        if (f.hitCooldown > 0) f.hitCooldown--;
    }
}
function checkGameEnd() {
    trackDeaths();
    if ((player.hp <= 0 || player.dead) && !playerDead) {
        playerDead = true;
        player.hp = 0;
        player.dead = true;
        recordDeath(player);
        if (knife.heldBy === player) dropKnifeFromHolder();
        else player.hasKnife = false;
        document.getElementById('hint').textContent =
            'Ты умер — бой продолжается! | R — выбор | Enter — заново | Выйти';
    }
    const alive = allFighters();
    if (alive.length <= 1) {
        finishMatch(alive[0] || null);
    }
}

function hitBtn(btn, mx, my) {
    return mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h;

/** Подсказка смены трека поверх canvas */
function drawMusicToast() {
    if (musicToastT <= 0) return;
    musicToastT--;
    const a = Math.min(1, musicToastT / 30);
    ctx.save();
    ctx.globalAlpha = 0.85 * a + 0.15;
    ctx.fillStyle = 'rgba(20,10,40,0.92)';
    roundRect(200, 8, 500, 42, 12);
    ctx.fill();
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(musicToastText || '🎵', 450, 36);
    ctx.restore();
}

function canvasMouse(e) {
    const pt = (e && e.clientX != null) ? e
        : (e && e.changedTouches && e.changedTouches[0])
        || (e && e.touches && e.touches[0])
        || e;
    const rect = canvas.getBoundingClientRect();
    const x = pt.clientX != null ? pt.clientX : 0;
    const y = pt.clientY != null ? pt.clientY : 0;
    return {
        mx: (x - rect.left) * (canvas.width / Math.max(1, rect.width)),
        my: (y - rect.top) * (canvas.height / Math.max(1, rect.height))
    };
}

function drawButton(btn, label, fill, stroke, textColor) {
    ctx.fillStyle = fill;

    ctx.stroke();
    ctx.fillStyle = textColor || '#fff';

    ctx.fillText(label, btn.x + btn.w / 2, btn.y + btn.h / 2 + 1);
