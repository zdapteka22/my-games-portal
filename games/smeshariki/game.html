    if (pacman && !pacman.dead && pacman.hp > 0) list.push(pacman);
    return list;
}

function nearestCarrot(ent) {
    let best = null, bestD = Infinity;
    for (const c of carrots) {
        if (c.taken) continue;
        const d = dist(ent, c);
        if (d < bestD) { bestD = d; best = c; }
    }
    return best;
}

/** Итог гонки: места 1…10 по числу морковок (больше — выше) */
function buildChaseRanking(winner) {
    const all = [];
    if (player) all.push(player);
    if (npcs) for (const n of npcs) if (n) all.push(n);
    if (pacman && (pacman.livesMax > 0 || (pacman.carrots || 0) > 0 || !pacman.dead)) all.push(pacman);

    const ranked = all
        .filter(Boolean)
        .map(e => fighterRankEntry(e))
        .sort((a, b) => {
            if (b.carrots !== a.carrots) return b.carrots - a.carrots;
            // кто первым добежал до 10 — выше при равном счёте
            if (winner && a.name === winner.name) return -1;
            if (winner && b.name === winner.name) return 1;
            return String(a.displayName).localeCompare(String(b.displayName), 'ru');
        });

    finalRanking = {
        first: ranked[0] || null,
        second: ranked[1] || null,
        third: ranked[2] || null,
        last: ranked.length ? ranked[ranked.length - 1] : null,
        all: ranked,
        winner: winner ? fighterRankEntry(winner) : null
    };
}

function recordDeath(ent) {
    if (!ent || ent._recordedDeath) return;
    if (ent.isPacman && (ent.lives || 0) > 0 && !ent.dead) return;
    const reallyDead = ent.dead || ent.hp <= 0;
    if (!reallyDead) return;
    if (ent.isPacman && (ent.lives || 0) > 0) return;
    ent._recordedDeath = true;
    deathOrder.push(fighterRankEntry(ent));
}

function trackDeaths() {
    const all = [player, nanny, ...(npcs || [])];
    if (pacman) all.push(pacman);
    for (const f of all) {
        if (!f) continue;
        if (f.isPacman) {
            if (f.dead || ((f.lives || 0) <= 0 && f.hp <= 0)) recordDeath(f);
        } else if (f.hp <= 0 || f.dead) {
            f.dead = true;
            recordDeath(f);
        }
    }
}

function buildFinalRanking(winner) {
    const ranked = [];
    if (winner) ranked.push(fighterRankEntry(winner));
    for (let i = deathOrder.length - 1; i >= 0; i--) {
        const e = deathOrder[i];
        if (winner && e.name === winner.name) continue;
        ranked.push(e);
    }
    const last = ranked.length > 1 ? ranked[ranked.length - 1] : (ranked[0] || null);
    finalRanking = {
        first: ranked[0] || null,
        second: ranked[1] || null,
        third: ranked[2] || null,
        last: last,
        all: ranked
    };
}

function finishMatch(winner) {
    if (gameOver) return;
    trackDeaths();
    buildFinalRanking(winner || null);
    gameOver = true;
    gameplayStop();
    showFullscreenAd();
    gameWon = !!(winner && player && winner === player && !playerDead && player.hp > 0);
    const wName = finalRanking && finalRanking.first
        ? finalRanking.first.displayName
        : '???';
    document.getElementById('hint').textContent =
        '🏁 Конец! 1 место: ' + wName + ' | Enter — заново | R — выбор';
}

function finishChase(won, winnerEnt) {
    if (gameOver) return;
    gameOver = true;
    gameplayStop();
    showFullscreenAd();
    const winner = winnerEnt || (won ? player : null);
    gameWon = !!(won && winner && player && winner === player);
    playerDead = !!(player && (player.dead || player.hp <= 0));
    chaseCaught = !won && playerDead;
    // синхронизируем счёт игрока для UI
    if (player) carrotsCollected = player.carrots || 0;
    buildChaseRanking(winner);
    const wName = finalRanking && finalRanking.first
        ? finalRanking.first.displayName
        : '???';
    const wCar = finalRanking && finalRanking.first ? finalRanking.first.carrots : 0;
    document.getElementById('hint').textContent = won
        ? '🥕 1 место: ' + wName + ' (' + wCar + ' 🥕)! Enter — заново | R — выбор'
        : 'Няня поймала! Места по моркови | Enter — заново | R — выбор';
}

function clampToField(ent) {
    ent.x = Math.max(FIELD.minX + ent.radius, Math.min(FIELD.maxX - ent.radius, ent.x));
    ent.y = Math.max(FIELD.minY + ent.radius, Math.min(FIELD.maxY - ent.radius, ent.y));
}
function circleHitsWall(x, y, r, walls) {
    if (!walls || !walls.length) return false;
    for (const w of walls) {
        const nx = Math.max(w.x, Math.min(x, w.x + w.w));
        const ny = Math.max(w.y, Math.min(y, w.y + w.h));
        if (Math.hypot(x - nx, y - ny) < r + 1) return true;
    }
    return false;
}
function activeWalls() {
    if (gameMode === 'custom' && customLevel) return customLevel.walls;
    return null;
}
function canMove(x, y, r) {
    if (!(x - r >= FIELD.minX && x + r <= FIELD.maxX && y - r >= FIELD.minY && y + r <= FIELD.maxY)) return false;
    if (circleHitsWall(x, y, r, activeWalls())) return false;
    return true;
}
function allFighters() {
    const l = [player, nanny, ...(npcs || [])].filter(f => f && f.hp > 0 && !f.dead);
    if (pacman && !pacman.dead && pacman.hp > 0) l.push(pacman);
    return l;
}
function moveEntity(ent, dx, dy) {
    if (dx === 0 && dy === 0) return false;
    const ox = ent.x, oy = ent.y;
    if (canMove(ent.x + dx, ent.y, ent.radius)) ent.x += dx;
    if (canMove(ent.x, ent.y + dy, ent.radius)) ent.y += dy;
    clampToField(ent);
    if (ent.x !== ox || ent.y !== oy) { ent.angle = Math.atan2(ent.y - oy, ent.x - ox); return true; }
    return false;
}
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function isDown(c) { return !!keys[c]; }

// ——— Нож (режим битвы) ———
function spawnKnife() {
    knife.onGround = true;
    knife.heldBy = null;
    knife.holdTimer = 0;
    knife.killsLeft = 0;
    knife.x = FIELD.minX + 60 + Math.random() * (FIELD.maxX - FIELD.minX - 120);
    knife.y = FIELD.minY + 60 + Math.random() * (FIELD.maxY - FIELD.minY - 120);
    knife.pulse = 0;
}
function dropKnifeFromHolder() {
    const holder = knife.heldBy;
    if (holder) holder.hasKnife = false;
    knife.heldBy = null;
    knife.holdTimer = 0;
    knife.killsLeft = 0;
    knife.onGround = false;
    knife.spawnCD = KNIFE_RESPAWN;
}
function moveTowardKnife(ent, mult = 1.4) {
    const dx = knife.x - ent.x, dy = knife.y - ent.y, len = Math.hypot(dx, dy) || 1;
    moveEntity(ent, (dx / len) * ent.speed * mult, (dy / len) * ent.speed * mult);
}
function tryPickupKnife(ent) {
    if (!knife.onGround || ent.hp <= 0 || (ent.isPacman && ent.dead)) return;
    if (dist(ent, { x: knife.x, y: knife.y }) < 38) {
        knife.onGround = false;
        knife.heldBy = ent;
        ent.hasKnife = true;
        knife.holdTimer = KNIFE_HOLD_FRAMES;
        knife.killsLeft = KNIFE_MAX_KILLS;
    }
}
function knifeKill(att, vic) {
    if (vic.isPacman) { vic.lives = 0; vic.hp = 0; vic.dead = true; }
    else { vic.hp = 0; }
    vic.hasKnife = false;
    knife.killsLeft = Math.max(0, (knife.killsLeft || 0) - 1);
    if (knife.killsLeft <= 0) dropKnifeFromHolder();
    else {
        att.hasKnife = true;
        knife.heldBy = att;
    }
}
function updateKnifeSpawn() {
    knife.pulse += 0.12;
    if (knife.heldBy) {
        const holder = knife.heldBy;
        if (holder.hp <= 0 || holder.dead) {
            dropKnifeFromHolder();
            return;
        }
        if (knife.holdTimer > 0) {
            knife.holdTimer--;
            if (knife.holdTimer <= 0) {
                dropKnifeFromHolder();
                return;
            }
        }
        return;
    }
    if (knife.onGround) return;
    if (knife.spawnCD > 0) knife.spawnCD--; else spawnKnife();
}
function knifeHoldSecondsLeft() {
    if (!knife.heldBy || knife.holdTimer <= 0) return 0;
    return Math.ceil(knife.holdTimer / FPS_EST);
}
function checkKnifeCombat() {
    const att = knife.heldBy;
    if (!att || att.hp <= 0 || (att.isPacman && att.dead)) return;
    const targets = [player, nanny, ...npcs];
    if (!pacman.dead && pacman.hp > 0) targets.push(pacman);
    for (const vic of targets) {
        if (vic === att || vic.hp <= 0 || (vic.isPacman && vic.dead)) continue;
        if (dist(att, vic) < 48) { knifeKill(att, vic); return; }
    }
}
function chaseWithKnife(ent) {
    const t = nearestEnemy(ent); if (!t) return;
    const dx = t.x - ent.x, dy = t.y - ent.y, len = Math.hypot(dx, dy) || 1;
    moveEntity(ent, (dx / len) * ent.speed * 1.5, (dy / len) * ent.speed * 1.5);
}

function trySwing(ent) {
    if (ent.hp <= 0 || ent.hasKnife) return;
    // в своём уровне бить можно только с палкой
    if (gameMode === 'custom' && !ent.hasStick && !isCustomTeamMode()) return;
    if (ent.isPacman) {
        if (ent.biteCooldown > 0 || ent.dead) return;
        ent.biteCooldown = ent.attackCooldown || 12;
        for (const v of allFighters()) {
            if (v === ent || v.hp <= 0) continue;
            if (dist(ent, v) < (ent.hitRadius || 42)) {
                if (v.isPacman && v !== ent) hurtPacmanEntity(v, ent);
                else {
                    v.hp -= ent.damage;
                    moveEntity(v, Math.cos(ent.angle) * 20, Math.sin(ent.angle) * 20);
                }
            }
        }
        return;
    }
    if (ent.swing > 0 || ent.hitCooldown > 0) return;
    ent.swing = 20;
}
function stickTip(ent) {
    const len = ent.swing > 9 ? (ent.upgraded ? 72 : 58) : (ent.upgraded ? 48 : 38);
    const off = ent.swing > 0 ? Math.sin((20 - ent.swing) / 20 * Math.PI) * 0.9 : 0;
    const a = ent.angle + off;
    return { x: ent.x + Math.cos(a) * len, y: ent.y + Math.sin(a) * len };
}
function nearestEnemy(ent) {
    let b = null, d = Infinity;
    for (const o of allFighters()) {
        if (o === ent) continue;
        const t = dist(ent, o);
        if (t < d) { d = t; b = o; }
    }
    return b;
}

function respawnPacmanEntity(ent) {
    ent.x = 200 + Math.random() * 500;
    ent.y = 100 + Math.random() * 400;
    if (ent === pacman) { ent.hp = 1; }
    else { ent.hp = Math.max(1, Math.floor(ent.hpMax * 0.5)); }
    ent.invuln = 90; ent.biteCooldown = 0; ent.dead = false;
    clampToField(ent);
}
function hurtPacmanEntity(ent, att) {
    if (ent.dead || ent.hp <= 0 || ent.invuln > 0) return;
    ent.lives--;
    if (ent.lives > 0) respawnPacmanEntity(ent);
    else { ent.hp = 0; ent.dead = true; }
    if (att) moveEntity(ent, Math.cos(att.angle) * 22, Math.sin(att.angle) * 22);
}
function hurtPacman(att) { hurtPacmanEntity(pacman, att); }

function updatePacman() {
    if (pacman.dead || pacman.hp <= 0) return;
    if (pacman.invuln > 0) pacman.invuln--;
    pacman.mouth = (pacman.mouth + 0.25) % (Math.PI * 2);
    if (knife.onGround) { moveTowardKnife(pacman, 1.5); tryPickupKnife(pacman); }
    else if (pacman.hasKnife) chaseWithKnife(pacman);
    else {
        const t = nearestEnemy(pacman);
        if (t) {
            const dx = t.x - pacman.x, dy = t.y - pacman.y, len = Math.hypot(dx, dy) || 1;
            moveEntity(pacman, (dx / len) * pacman.speed, (dy / len) * pacman.speed);
        } else moveEntity(pacman, Math.cos(pacman.angle) * pacman.speed * 0.5, Math.sin(pacman.angle) * pacman.speed * 0.5);
    }
    if (pacman.biteCooldown > 0) pacman.biteCooldown--;
    if (!pacman.hasKnife) {
        for (const v of [player, nanny, ...npcs]) {
            if (v.hp <= 0 || pacman.biteCooldown > 0) continue;
            if (dist(pacman, v) < 42) {
                if (v.isPacman) hurtPacmanEntity(v, pacman);
                else {
                    v.hp -= pacman.damage;
                    moveEntity(v, Math.cos(pacman.angle) * 20, Math.sin(pacman.angle) * 20);
                }
                pacman.biteCooldown = 40;
            }
        }
    }
}

function updateAI(ent) {
    if (!ent.ai || ent.hp <= 0 || ent.isPacman) return;
    if (knife.onGround) { moveTowardKnife(ent); tryPickupKnife(ent); return; }
    if (ent.hasKnife) { chaseWithKnife(ent); return; }
    const t = nearestEnemy(ent); if (!t) return;
    const dx = t.x - ent.x, dy = t.y - ent.y, len = Math.hypot(dx, dy) || 1, d = dist(ent, t);
    if (d > 60) moveEntity(ent, (dx / len) * ent.speed, (dy / len) * ent.speed);
    else if (d < 35) moveEntity(ent, -(dx / len) * ent.speed * 0.6, -(dy / len) * ent.speed * 0.6);
    else moveEntity(ent, (dx / len) * ent.speed * 0.4, (dy / len) * ent.speed * 0.4);
    if (d < 95) trySwing(ent);
}

// ——— Режим 2: AI ———
/** Все (кроме игрока) убегают от няни и собирают морковь */
function fleeFromNanny(ent, speedMult = 1) {
    if (!nanny || ent === nanny || ent.hp <= 0 || ent.dead) return;
    const d = dist(ent, nanny);
    const danger = d < 200;
    if (danger) {
        // бежать от няни
        const dx = ent.x - nanny.x;
        const dy = ent.y - nanny.y;
        const len = Math.hypot(dx, dy) || 1;
        ent.fleeAngle = (ent.fleeAngle || 0) + (Math.random() - 0.5) * 0.15;
        const nx = dx / len + Math.cos(ent.fleeAngle) * 0.35;
        const ny = dy / len + Math.sin(ent.fleeAngle) * 0.35;
        const nlen = Math.hypot(nx, ny) || 1;
        const panic = d < 90 ? 1.35 : 1.1;
        moveEntity(ent, (nx / nlen) * ent.speed * speedMult * panic, (ny / nlen) * ent.speed * speedMult * panic);
    } else {
        // бегут к ближайшей морковке (Крош, Лосяш, Пин, Ёжик, Лунтик, Пакман…)
        const carrot = nearestCarrot(ent);
        if (carrot) {
            const dx = carrot.x - ent.x;
            const dy = carrot.y - ent.y;
            const len = Math.hypot(dx, dy) || 1;
            const greed = 0.85 + Math.random() * 0.2;
            moveEntity(ent, (dx / len) * ent.speed * speedMult * greed, (dy / len) * ent.speed * speedMult * greed);
        } else {
            ent.wander = (ent.wander || 0) + 0.04;
            if (Math.random() < 0.02) ent.wander = Math.random() * Math.PI * 2;
            moveEntity(ent, Math.cos(ent.wander) * ent.speed * 0.55, Math.sin(ent.wander) * ent.speed * 0.55);
        }
    }
}

/** Все живые жертвы няни: игрок, NPC, пакман */
function chaseVictims() {
    const list = [];
    if (player && !player.dead && player.hp > 0 && !playerDead) list.push(player);
    if (npcs) {
        for (const n of npcs) {
            if (n && !n.dead && n.hp > 0) list.push(n);
        }
    }
    if (pacman && !pacman.dead && pacman.hp > 0) list.push(pacman);
    return list;
}

/** Ближайшая живая жертва для няни */
function nearestChaseVictim() {
    if (!nanny) return null;
    let best = null, bestD = Infinity;
    for (const v of chaseVictims()) {
        const d = dist(nanny, v);
        if (d < bestD) {
            bestD = d;
            best = v;
        }
    }
    return best;
}

/** Няня бежит за ближайшей жертвой (не только за игроком) */
function updateNannyChase() {
    if (!nanny || gameOver) return;
    const target = nearestChaseVictim();
    if (!target) return;
    const dx = target.x - nanny.x;
    const dy = target.y - nanny.y;
    const len = Math.hypot(dx, dy) || 1;
    // ускоряется, если близко
    const boost = len < 150 ? 1.12 : 1.0;
    moveEntity(nanny, (dx / len) * nanny.speed * boost, (dy / len) * nanny.speed * boost);
}

function updateChaseNPCs() {
    for (const n of npcs) {
        if (n.hp <= 0 || n.dead) continue;
        fleeFromNanny(n, 1);
        // если няня догнала NPC — «выбывает» (убежал с поля)
        if (dist(n, nanny) < CATCH_RADIUS) {
            n.hp = 0;
            n.dead = true;
        }
    }
    if (pacman && !pacman.dead && pacman.hp > 0) {
        fleeFromNanny(pacman, 1.05);
        pacman.mouth = (pacman.mouth + 0.25) % (Math.PI * 2);
        if (dist(pacman, nanny) < CATCH_RADIUS) {
            pacman.hp = 0;
            pacman.dead = true;
        }
    }
}

function updateCarrots() {
    if (gameOver) return;
    // подбор: игрок + все друзья (пин, крош, лосяш, пакман, лунтик, ёжик…)
    const collectors = carrotCollectors();
    for (const c of carrots) {
        if (c.taken) continue;
        c.pulse += 0.1;
        for (const ent of collectors) {
            if (c.taken) break;
            if (dist(ent, c) < CARROT_PICKUP_R) {
                c.taken = true;
                ent.carrots = (ent.carrots || 0) + 1;
                if (ent === player) carrotsCollected = ent.carrots;
            }
        }
    }
    carrots = carrots.filter(c => !c.taken);
    // спавн новых
    if (carrots.length < MAX_CARROTS_ON_FIELD) {
        if (carrotSpawnCD > 0) carrotSpawnCD--;
        else {
            spawnCarrot();
            carrotSpawnCD = CARROT_RESPAWN_CD;
        }
    }
    // побеждает первый, кто набрал CARROTS_TO_WIN (10)
    for (const ent of collectors) {
        if ((ent.carrots || 0) >= CARROTS_TO_WIN) {
            finishChase(true, ent);
            return;
        }
    }
    // легендарный счёт 90 — тоже мгновенная победа (на всякий)
    for (const ent of collectors) {
        if ((ent.carrots || 0) >= CARROTS_LEGEND) {
            finishChase(true, ent);
            return;
        }
    }
}

function checkNannyCatch() {
    if (!player || !nanny || playerDead || gameOver) return;
    if (player.invuln > 0) return;
    if (dist(player, nanny) < CATCH_RADIUS) {
        player.hp = 0;
        player.dead = true;
        playerDead = true;
        // игра заканчивается, места — по собранной моркови
        finishChase(false, null);
    }
}

function updatePlayer() {
    if (player.hp <= 0 || player.dead || playerDead) return;
    if (player.invuln > 0) player.invuln--;
    if (player.isPacman) {
        player.mouth = (player.mouth + 0.25) % (Math.PI * 2);
        if (player.biteCooldown > 0) player.biteCooldown--;
    }
    if (gameMode === 'battle' && isDown('Space')) trySwing(player);
    // свой уровень: удар палкой (Пробел), если подобрал
    if (gameMode === 'custom' && isDown('Space') && !player.hasKnife && (player.hasStick || isCustomTeamMode())) trySwing(player);
    const spd = isDown('ShiftLeft') || isDown('ShiftRight') ? player.speed * 1.5 : player.speed;
    let dx = 0, dy = 0;
    if (isDown('ArrowLeft') || isDown('KeyA')) dx -= spd;
    if (isDown('ArrowRight') || isDown('KeyD')) dx += spd;
    if (isDown('ArrowUp') || isDown('KeyW')) dy -= spd;
    if (isDown('ArrowDown') || isDown('KeyS')) dy += spd;
    if (dx && dy) { dx *= 0.707; dy *= 0.707; }
    moveEntity(player, dx, dy);
    if (gameMode === 'battle' && knife.onGround) tryPickupKnife(player);
}

function checkCombat() {
    const fighters = [player, nanny, ...npcs];
    for (const att of fighters) {
        if (att.hp <= 0 || att.isPacman || att.swing <= 9 || att.hitCooldown > 0 || att.hasKnife) continue;
        const tip = stickTip(att);
        for (const vic of fighters) {
            if (vic === att || vic.hp <= 0 || vic.dead) continue;
            if (dist(tip, vic) < att.hitRadius) {
                if (vic.isPacman) hurtPacmanEntity(vic, att);
                else vic.hp -= att.damage;
                att.hitCooldown = att.attackCooldown;
                att.swing = 0;
                moveEntity(vic, Math.cos(att.angle) * 16, Math.sin(att.angle) * 16);
            }
        }
        if (!pacman.dead && pacman.hp > 0 && dist(tip, pacman) < att.hitRadius + 10) {
            hurtPacman(att); att.hitCooldown = att.attackCooldown; att.swing = 0;
        }
    }
}
function updateTimers() {
    for (const f of [player, nanny, ...npcs]) {
        if (f.swing > 0) f.swing--;
        if (f.hitCooldown > 0) f.hitCooldown--;
    }
}
function checkGameEnd() {
    trackDeaths();
    if ((player.hp <= 0 || player.dead) && !playerDead) {
        playerDead = true;
        player.hp = 0;
        player.dead = true;
        recordDeath(player);
        if (knife.heldBy === player) dropKnifeFromHolder();
        else player.hasKnife = false;
        document.getElementById('hint').textContent =
            'Ты умер — бой продолжается! | R — выбор | Enter — заново | Выйти';
    }
    const alive = allFighters();
    if (alive.length <= 1) {
        finishMatch(alive[0] || null);
    }
}

function hitBtn(btn, mx, my) {
    return mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h;

function canvasMouse(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        mx: (e.clientX - rect.left) * (canvas.width / rect.width),
        my: (e.clientY - rect.top) * (canvas.height / rect.height)
    };
}

            ctx.drawImage(img, cx - imgSize / 2, c.y + 18, imgSize, imgSize);
        } else if (ch.drawStyle) {
            const fake = { x: cx, y: c.y + 54, size: imgSize, drawStyle: ch.drawStyle };
            drawFallbackSprite(fake);
        } else {
            ctx.fillStyle = ch.color;
            ctx.beginPath();
            ctx.arc(cx, c.y + 54, 32, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.fillStyle = selected ? '#ffcc00' : '#fff';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(ch.name, cx, c.y + 120);

        ctx.fillStyle = '#ccc';
        ctx.font = '10px Arial';
        ctx.fillText(ch.desc, cx, c.y + 140);

        ctx.fillStyle = ch.color;
        ctx.font = '9px Arial';
        if (gameMode === 'chase' || gameMode === 'tag' || gameMode === 'custom' || gameMode === 'race') {
            ctx.fillText('Скорость ' + ch.speed, cx, c.y + 162);
        } else {
            ctx.fillText('HP ' + ch.hp + ' · Урон ' + ch.damage, cx, c.y + 162);
        }

        if (selected) {
            ctx.fillStyle = '#ffcc00';
            ctx.font = 'bold 13px Arial';
            ctx.fillText('★ ВЫБРАН', cx, c.y + c.h - 12);
        }
        ctx.restore();
    });

    const cur = CHARACTERS[selectedIndex];
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    roundRect(160, 440, 580, 140, 14);
    ctx.fill();
    ctx.fillStyle = cur.color;
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(cur.name + (gameMode === 'chase' ? ' — БЕГИ ЗА 🥕!'
        : gameMode === 'tag' ? ' — СТАРТУЕТ ГОЛЕЙ!'
        : gameMode === 'race' ? ' — НА СТАРТ!'
        : gameMode === 'custom' ? ' — ПРОЙДИ УРОВЕНЬ!'
        : ' — В БОЙ!'), 450, 478);
    ctx.fillStyle = '#ffeeaa';
    ctx.font = '14px Arial';
    ctx.fillText('Описание: ' + cur.desc, 450, 505);
    ctx.fillStyle = '#fff';
    ctx.font = '14px Arial';
    if (gameMode === 'chase') {
        ctx.fillText('Режим Догонялки: собери ' + CARROTS_TO_WIN + ' 🥕 первым. Няня ловит — скорость ' + cur.speed, 450, 528);
    } else if (gameMode === 'tag') {
        ctx.fillText('Режим Голя: ты водящий ' + TAG_ROUND_SEC + ' сек. Кого коснёшься — тот станет голей', 450, 528);
    } else if (gameMode === 'race') {
        ctx.fillText('Гонки: беги вправо к финишу! Shift — ускорение. Скорость героя ' + cur.speed, 450, 528);
    } else if (gameMode === 'custom') {
        const g = customLevel ? customLevel.goalCarrots : 5;
        ctx.fillText('Свой уровень: собери ' + g + ' 🥕, стены мешают, няня (если есть) ловит. Скорость ' + cur.speed, 450, 528);
    } else {
        ctx.fillText('Режим Битва: HP ' + cur.hp + ' · Урон ' + cur.damage + ' · Скорость ' + cur.speed + ' · бей и выживи', 450, 528);
    }
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 18px Arial';
    ctx.fillText('Enter / клик — начать  ·  Esc — к режимам', 450, 558);

    if (showExitDialog) drawExitDialog();
}

function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
}

function pickAt(mx, my) {
    const cards = cardLayout();
    for (let i = 0; i < cards.length; i++) {
        const c = cards[i];
        if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) return i;
    }
    return -1;
}

// ——— Игровая отрисовка ———
function drawField() {
    ctx.fillStyle = gameMode === 'chase' || gameMode === 'custom' ? '#c8e6c9'
        : gameMode === 'tag' ? '#e1bee7'
        : '#f4e8c0';
    ctx.fillRect(0, 0, 900, 600);
    ctx.fillStyle = gameMode === 'chase' || gameMode === 'custom' ? '#a5d6a7'
        : gameMode === 'tag' ? '#ce93d8'
        : '#e8d9a8';
    for (let i = 0; i < 12; i++) {
        ctx.beginPath();
        ctx.arc(80 + i * 70, 80 + (i % 3) * 40, 30, 0, Math.PI * 2);
        ctx.fill();
    }
    // грядки в догонялках / своём уровне
    if (gameMode === 'chase' || gameMode === 'custom') {
        ctx.strokeStyle = 'rgba(76,120,40,0.25)';
        ctx.lineWidth = 2;
        for (let y = 80; y < 560; y += 40) {
            ctx.beginPath();
            ctx.moveTo(60, y);
            ctx.lineTo(840, y);
            ctx.stroke();
        }
    }
    if (gameMode === 'tag') {
        ctx.strokeStyle = 'rgba(123,31,162,0.2)';
        ctx.lineWidth = 2;
        for (let y = 80; y < 560; y += 45) {
            ctx.beginPath();
            ctx.moveTo(60, y);
            ctx.lineTo(840, y);
            ctx.stroke();
        }
    }
    if (gameMode === 'custom' && customLevel) {
        drawCustomWalls(customLevel.walls);
    }
}

function drawCarrot(c) {
    const s = 1 + Math.sin(c.pulse) * 0.12;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(s, s);
    // свечение
    ctx.fillStyle = 'rgba(255,152,0,0.25)';
    ctx.beginPath();
    ctx.arc(0, 0, 26, 0, Math.PI * 2);
    ctx.fill();
    // тело моркови
    ctx.fillStyle = '#ff6d00';
    ctx.beginPath();
    ctx.moveTo(0, 18);
    ctx.quadraticCurveTo(12, 4, 8, -10);
    ctx.lineTo(-8, -10);
    ctx.quadraticCurveTo(-12, 4, 0, 18);
    ctx.closePath();
    ctx.fill();
    // полоски
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(5, 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-4, 8); ctx.lineTo(4, 10); ctx.stroke();
    // ботва
    ctx.fillStyle = '#43a047';
    ctx.beginPath();
    ctx.moveTo(-4, -10);
    ctx.quadraticCurveTo(-10, -22, -2, -26);
    ctx.quadraticCurveTo(0, -16, 0, -10);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, -10);
    ctx.quadraticCurveTo(2, -24, 8, -28);
    ctx.quadraticCurveTo(6, -16, 4, -10);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(2, -10);
    ctx.quadraticCurveTo(12, -20, 10, -26);
    ctx.quadraticCurveTo(4, -18, 4, -10);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

function drawAllCarrots() {
    for (const c of carrots) drawCarrot(c);
}

function drawKnifeOnGround() {
    if (!knife.onGround) return;
    const s = 1 + Math.sin(knife.pulse) * 0.15;
    ctx.save();
    ctx.translate(knife.x, knife.y);
    ctx.rotate(knife.pulse);
    ctx.scale(s, s);
    ctx.fillStyle = 'rgba(255,0,0,0.25)';
    ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ccc'; ctx.fillRect(-4, -22, 8, 28);
    ctx.fillStyle = '#8b0000';
    ctx.beginPath(); ctx.moveTo(0, -22); ctx.lineTo(10, -8); ctx.lineTo(-10, -8); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#444'; ctx.fillRect(-7, 4, 14, 5);
    ctx.restore();
    ctx.fillStyle = '#ff2222';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('НОЖ!', knife.x, knife.y + 38);
}
function drawKnifeHeld(ent) {
    if (!ent.hasKnife || ent.hp <= 0 || (ent.isPacman && ent.dead)) return;
    const a = ent.angle, kx = ent.x + Math.cos(a) * 22, ky = ent.y + Math.sin(a) * 22;
    ctx.save();
    ctx.translate(kx, ky);
    ctx.rotate(a + Math.PI / 4);
    ctx.fillStyle = '#ccc'; ctx.fillRect(-3, -16, 6, 20);
    ctx.fillStyle = '#ff0000';
    ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(8, -4); ctx.lineTo(-8, -4); ctx.closePath(); ctx.fill();
    ctx.restore();
    if (knife.heldBy === ent) {
        const sec = knifeHoldSecondsLeft();
        const urgent = sec <= 5;
        ctx.fillStyle = urgent ? '#ff2222' : '#ffcc00';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        const kills = knife.killsLeft || 0;
        const label = '🔪 ' + sec + 'с · ×' + kills;
        ctx.strokeText(label, ent.x, ent.y - ent.size / 2 - 28);
        ctx.fillText(label, ent.x, ent.y - ent.size / 2 - 28);
        const barW = 50, barH = 6;
        const bx = ent.x - barW / 2, by = ent.y - ent.size / 2 - 22;
        const t = knife.holdMax > 0 ? knife.holdTimer / knife.holdMax : 0;
        ctx.fillStyle = '#333';
        ctx.fillRect(bx, by, barW, barH);
        ctx.fillStyle = urgent ? '#ff2222' : '#ff9800';
        ctx.fillRect(bx, by, barW * t, barH);
    }
}

function drawFallbackSprite(ent) {
    const r = ent.size / 2;
    const style = ent.drawStyle;
    ctx.save();
    ctx.translate(ent.x, ent.y);
    if (style === 'barash') {
        ctx.fillStyle = '#f8bbd0';
        ctx.beginPath(); ctx.arc(0, 0, r * 0.85, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#f48fb1';
        for (let i = 0; i < 8; i++) {
            const a = (i / 8) * Math.PI * 2;
            ctx.beginPath();
            ctx.arc(Math.cos(a) * r * 0.7, Math.sin(a) * r * 0.7, r * 0.28, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-r * 0.28, -r * 0.1, r * 0.18, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(r * 0.28, -r * 0.1, r * 0.18, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.arc(-r * 0.28, -r * 0.1, r * 0.08, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(r * 0.28, -r * 0.1, r * 0.08, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#c2185b';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, r * 0.2, r * 0.25, 0.1, Math.PI - 0.1); ctx.stroke();
    } else if (style === 'kopatych') {
        ctx.fillStyle = '#8d6e63';
        ctx.beginPath(); ctx.arc(0, 0, r * 0.9, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#6d4c41';
        ctx.beginPath(); ctx.arc(-r * 0.55, -r * 0.55, r * 0.32, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(r * 0.55, -r * 0.55, r * 0.32, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffcc80';
        ctx.beginPath(); ctx.ellipse(0, r * 0.15, r * 0.45, r * 0.38, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.arc(-r * 0.22, -r * 0.15, r * 0.09, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(r * 0.22, -r * 0.15, r * 0.09, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#3e2723';
        ctx.beginPath(); ctx.ellipse(0, r * 0.22, r * 0.12, r * 0.08, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#43a047';
        ctx.beginPath();
        ctx.moveTo(-r * 0.5, -r * 0.5);
        ctx.lineTo(0, -r * 1.05);
        ctx.lineTo(r * 0.5, -r * 0.5);
        ctx.closePath();
        ctx.fill();
    } else {
        ctx.fillStyle = '#888';
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold ' + Math.floor(r) + 'px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('?', 0, 0);
        ctx.textBaseline = 'alphabetic';
    }
    ctx.restore();
}
function drawStick(ent) {
    if (gameMode === 'chase' || gameMode === 'tag') return;
    if (ent.hp <= 0 || ent.hasKnife) return;
    const tip = stickTip(ent);
    ctx.strokeStyle = ent.upgraded ? '#ffd700' : '#5c3317';
    ctx.lineWidth = ent.upgraded ? 10 : 7;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(ent.x + Math.cos(ent.angle) * 8, ent.y + Math.sin(ent.angle) * 8);
    ctx.lineTo(tip.x, tip.y);
    ctx.stroke();
}
function drawHpBar(ent) {
    if (gameMode === 'chase' || gameMode === 'tag') return;
    if (ent.hp <= 0) return;
    const w = ent.upgraded ? 60 : 44, bx = ent.x - w / 2, by = ent.y - ent.size / 2 - 18;
    ctx.fillStyle = '#333'; ctx.fillRect(bx, by, w, 7);
    ctx.fillStyle = ent.upgraded ? '#ffd700' : (ent === nanny ? '#ff4444' : '#44cc44');
    ctx.fillRect(bx, by, w * (ent.hp / ent.hpMax), 7);
}
function drawPacmanSprite(ent) {
    if (ent.dead || ent.hp <= 0) return;
    if (ent.invuln > 0 && Math.floor(ent.invuln / 8) % 2 === 0) return;
    // голя-свечение для пакмана
    if (gameMode === 'tag' && ent.isGola) {
        const pulse = 0.25 + Math.sin(chasePulse * 2) * 0.12;
        ctx.fillStyle = 'rgba(233,30,99,' + pulse + ')';
        ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.size / 2 + 20, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#e91e63';
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.size / 2 + 16, 0, Math.PI * 2); ctx.stroke();
    }
    const r = ent.size / 2;
    const img = images.pacman || images[ent.img];
    ctx.save();
    ctx.translate(ent.x, ent.y);
    ctx.rotate(ent.angle);
    const chomp = 1 + Math.sin(ent.mouth || 0) * 0.06;
    ctx.scale(chomp, 1 / chomp);
    if (img && img.complete && img.naturalWidth) {
        ctx.drawImage(img, -r, -r, ent.size, ent.size);
    } else {
        const mo = 0.35 + Math.abs(Math.sin(ent.mouth || 0)) * 0.35;
        ctx.fillStyle = '#ffff00';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, r, mo, -mo, true);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(r * 0.25, -r * 0.35, 5, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
    if (gameMode === 'tag' && ent.isGola) {
        ctx.fillStyle = '#e91e63';
        ctx.font = 'bold 15px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('ГОЛЯ!', ent.x, ent.y + r + 16);
    }
    if (gameMode === 'battle') drawKnifeHeld(ent);
    if (gameMode === 'battle' && ent.livesMax > 0) {
        for (let i = 0; i < ent.livesMax; i++) {
            ctx.fillStyle = i < ent.lives ? '#ffff00' : '#555';
            ctx.beginPath();
            ctx.arc(ent.x - 12 + i * 24, ent.y - r - 14, 7, 0.2, Math.PI * 2 - 0.2);
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            ctx.stroke();
        }
    }
    if (ent.upgraded && gameMode === 'battle') {
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 13px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('ПРОКАЧАН', ent.x, ent.y + r + 16);
    }
}
function drawPacman() {
    drawPacmanSprite(pacman);
}
function drawCharacter(ent) {
    if (ent.hp <= 0 || ent.dead) return;
    if (ent.isPacman) {
        drawPacmanSprite(ent);
        return;
    }
    if (ent.upgraded) {
        ctx.fillStyle = gameMode === 'chase' || gameMode === 'tag' ? 'rgba(255,152,0,0.25)' : 'rgba(255,215,0,0.25)';
        ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.size / 2 + 12, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = gameMode === 'chase' || gameMode === 'tag' ? '#ff9800' : '#ffd700';
        ctx.lineWidth = 3; ctx.stroke();
    }
    // няня в chase — красное свечение
    if (gameMode === 'chase' && ent === nanny) {
        const pulse = 0.2 + Math.sin(chasePulse) * 0.1;
        ctx.fillStyle = 'rgba(244,67,54,' + pulse + ')';
        ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.size / 2 + 18, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#f44336';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.size / 2 + 14, 0, Math.PI * 2); ctx.stroke();
    }
    // голя — яркое красно-фиолетовое свечение
    if (gameMode === 'tag' && ent.isGola) {
        const pulse = 0.25 + Math.sin(chasePulse * 2) * 0.12;
        ctx.fillStyle = 'rgba(233,30,99,' + pulse + ')';
        ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.size / 2 + 20, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#e91e63';
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.size / 2 + 16, 0, Math.PI * 2); ctx.stroke();
    }
    if (gameMode === 'battle') {
        drawStick(ent); drawKnifeHeld(ent); drawHpBar(ent);
    }
    const img = images[ent.img], half = ent.size / 2;
    if (img && img.complete && img.naturalWidth) {
        ctx.drawImage(img, ent.x - half, ent.y - half - 5, ent.size, ent.size);
    } else if (ent.drawStyle) {
        drawFallbackSprite(ent);
    } else {
        ctx.font = (ent.size - 10) + 'px Arial';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#000';
        ctx.fillText('?', ent.x, ent.y + 10);
    }
    if (ent.upgraded) {
        ctx.fillStyle = gameMode === 'chase' || gameMode === 'tag' || gameMode === 'custom' ? '#ff9800' : '#ffd700';
        ctx.font = 'bold 13px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(gameMode === 'chase' || gameMode === 'tag' || gameMode === 'custom' ? 'ТЫ' : 'ПРОКАЧАН', ent.x, ent.y + ent.size / 2 + 14);
    }
    if ((gameMode === 'chase' || gameMode === 'custom') && ent === nanny) {
        ctx.fillStyle = '#f44336';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('ЛОВИТ!', ent.x, ent.y + ent.size / 2 + 14);
    }
    if (gameMode === 'tag' && ent.isGola) {
        ctx.fillStyle = '#e91e63';
        ctx.font = 'bold 15px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('ГОЛЯ!', ent.x, ent.y + ent.size / 2 + (ent.upgraded ? 28 : 14));
    }
}
function fighterLabel(f) {
    if (f === player) return player.displayName || 'Игрок';
    if (f === nanny) return nanny.displayName || 'Враг';
    if (f && f.isPacman) return 'Пакман';
    return (f && f.displayName) || (f && f.name) || '?';
}

function drawUIBattle() {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(8, 8, 520, 100);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'left';
    const pname = player.displayName || player.name;
    if (playerDead) {
        ctx.fillStyle = '#ff6666';
        ctx.fillText(pname + ' — УМЕР (смотришь бой)', 20, 35);
        ctx.fillStyle = '#fff';
        ctx.font = '18px Arial';
        ctx.fillText('Игра продолжается! NPC дерутся дальше', 20, 60);
    } else if (player.isPacman) {
        ctx.fillText(pname + '  HP: ' + Math.max(0, player.hp) + '/' + player.hpMax + '  ♥' + player.lives, 20, 35);
        ctx.fillStyle = '#fff';
        ctx.font = '18px Arial';
        ctx.fillText('Урон x' + player.damage + ' | КУСЬ (Пробел) | Очень быстрый', 20, 60);
    } else {
        ctx.fillText(pname + ' ПРОКАЧАН  HP: ' + Math.max(0, player.hp) + '/' + player.hpMax, 20, 35);
        ctx.fillStyle = '#fff';
        ctx.font = '18px Arial';
        ctx.fillText('Урон x' + player.damage + ' | Быстрый | Большая палка', 20, 60);
    }
    if (knife.onGround) ctx.fillText('НОЖ! 30 сек в руках, 2 убийства = смерть с 1 удара', 20, 85);
    else if (knife.heldBy) {
        const n = fighterLabel(knife.heldBy);
        const sec = knifeHoldSecondsLeft();
        const kills = knife.killsLeft || 0;
        ctx.fillStyle = sec <= 5 ? '#ff2222' : '#ff6666';
        ctx.fillText('Нож у ' + n + '! ⏱ ' + sec + 'с  |  убийств: ' + kills + '/2', 20, 85);
    } else ctx.fillText('Скоро появится нож...', 20, 85);

    drawButton(BTN_EXIT_GAME, 'ВЫЙТИ', '#8b0000', '#ff6666', '#fff');

    let y = 120;
    ctx.font = '16px Arial';
    ctx.textAlign = 'left';
    const list = [
        [nanny.displayName || 'Враг', nanny],
        ...npcs.map(n => [n.displayName || n.name, n])
    ];
    if (!pacman.dead || pacman.livesMax > 0) {
        if (!(player.isPacman && pacman.dead && pacman.livesMax === 0)) {
            list.push(['Пакман', { label: pacman.dead ? '0 жизней' : pacman.lives + ' жизни', isPacLabel: true }]);
        }
    }
    for (const [label, f] of list) {
        ctx.fillStyle = f.isPacLabel ? (pacman.dead ? '#888' : '#ffeb3b') : (f.hp <= 0 ? '#888' : '#fff');
        ctx.fillText(f.label ? label + ': ' + f.label : label + ': ' + Math.max(0, f.hp) + ' HP', 20, y);
        y += 22;
    }
}

function drawUIChase() {
    // таблица мест по моркови (живой рейтинг)
    const board = [];
    if (player) board.push(player);
    if (npcs) for (const n of npcs) if (n) board.push(n);
    if (pacman && !pacman.dead) board.push(pacman);
    board.sort((a, b) => (b.carrots || 0) - (a.carrots || 0));

    const panelH = 100 + board.length * 20;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(8, 8, 280, Math.min(panelH, 340));

    ctx.fillStyle = '#ff9800';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'left';
    const myCar = player ? (player.carrots || 0) : carrotsCollected;
    ctx.fillText('🥕 Цель: ' + CARROTS_TO_WIN + '  (★' + CARROTS_LEGEND + ')', 16, 32);
    ctx.fillStyle = '#fff';
    ctx.font = '15px Arial';
    ctx.fillText('Ты: ' + myCar + ' / ' + CARROTS_TO_WIN, 16, 54);

    // прогресс-бар игрока
    const barW = 250, barH = 10;
    ctx.fillStyle = '#333';
    ctx.fillRect(16, 62, barW, barH);
    const pct = Math.min(1, myCar / CARROTS_TO_WIN);
    ctx.fillStyle = '#ff6d00';
    ctx.fillRect(16, 62, barW * pct, barH);
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 1;
    ctx.strokeRect(16, 62, barW, barH);

    // места 1..N
    let y = 92;
    ctx.font = 'bold 13px Arial';
    ctx.fillStyle = '#ffcc00';
    ctx.fillText('МЕСТА (морковь)', 16, y);
    y += 18;

        const place = i + 1;
        const medal = place === 1 ? '🥇' : place === 2 ? '🥈' : place === 3 ? '🥉' : place + '.';
        const isMe = ent === player;
        const caught = ent.hp <= 0 || ent.dead;
        ctx.fillStyle = caught ? '#666' : (isMe ? '#4fc3f7' : '#eee');
        const name = (ent.displayName || ent.name) + (isMe ? ' (ты)' : '') + (caught ? ' ✕' : '');

        ctx.fillStyle = caught ? '#666' : '#ffab40';
        ctx.fillText((ent.carrots || 0) + ' 🥕', 210, y);
        y += 18;
    });

    if (player && nanny && !gameOver && !playerDead) {

            ctx.fillStyle = '#fff';

            ctx.textAlign = 'center';
            ctx.fillText(d < 90 ? '⚠ НЯНЯ РЯДОМ!!!' : 'Няня близко!', 450, 36);
        }

    drawButton(BTN_EXIT_GAME, 'ВЫЙТИ', '#8b0000', '#ff6666', '#fff');

    ctx.font = '14px Arial';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#f44336';

function drawGame() {
    if (gameMode === 'race') {
        drawRaceTrack();
        for (const n of npcs) {
            if (n) drawCharacter(n);
        }
        if (player) drawCharacter(player);
        drawUI();
        return;
    }
    drawField();
    if (gameMode === 'custom') {
        if (!isCustomTeamMode()) drawAllCarrots();
        drawStickOnGround();
        drawGroundKnives();
        function drawTeamRing(ent) {
            if (!isCustomTeamMode() || !ent) return;
            ctx.beginPath();
            ctx.arc(ent.x, ent.y, (ent.size || 64) * 0.42, 0, Math.PI * 2);
            ctx.strokeStyle = ent.team === 'ally' ? 'rgba(66,165,245,0.95)' : 'rgba(239,83,80,0.95)';
            ctx.lineWidth = 4;
            ctx.stroke();
        }
        for (const n of npcs) {
            if (n && !n.dead && n.hp > 0) {
                drawTeamRing(n);
                if (n.isPacman) drawPacmanSprite(n);
                else drawCharacter(n);
                if (n.hasKnife) drawKnifeHeld(n);
                else if (n.hasStick) drawStick(n);
            }
        }
        if (pacman && !pacman.dead && pacman.hp > 0) {
            drawTeamRing(pacman);
            drawPacmanSprite(pacman);
            if (pacman.hasKnife) drawKnifeHeld(pacman);
            else if (pacman.hasStick) drawStick(pacman);
        }
        if (nanny && !nanny.dead && nanny.hp > 0) {
            drawTeamRing(nanny);
            drawCharacter(nanny);
            if (nanny.hasStick) drawStick(nanny);
        }
        if (player) {
            drawTeamRing(player);
            drawCharacter(player);
            if (player.hasKnife) drawKnifeHeld(player);
            else if (player.hasStick) drawStick(player);
        }
    } else if (gameMode === 'chase') {
        drawAllCarrots();
        for (const n of npcs) drawCharacter(n);
        if (pacman && !pacman.dead) drawPacman();
        if (nanny) drawCharacter(nanny);
        drawCharacter(player);
    } else if (gameMode === 'tag') {
        for (const n of npcs) drawCharacter(n);
        if (pacman && !pacman.dead) drawPacman();
        if (nanny) drawCharacter(nanny);
        drawCharacter(player);
    } else {
        drawKnifeOnGround();
        if (pacman) {
            drawPacman();
            if (!pacman.dead && pacman.hp > 0) drawKnifeHeld(pacman);
        }
        for (const n of npcs) drawCharacter(n);
        if (nanny) drawCharacter(nanny);
        drawCharacter(player);
    }
    drawUI();
}

function updateGame() {
    if (showExitDialog || paused) return;
    if (gameOver) return;

    if (gameMode === 'custom') {
        updateCustomLevel();
        return;
    }

    if (gameMode === 'race') {
        updateRace();
        return;
    }

    if (gameMode === 'chase') {
        chasePulse += 0.08;
        updatePlayer();
        updateNannyChase();
        updateChaseNPCs();
        updateCarrots();
        checkNannyCatch();
        return;
    }

    if (gameMode === 'tag') {
        updatePlayer();
        updateTagAI();
        tryTransferGola();
        updateTagRound();
        return;
    }

    updatePlayer();
    updatePacman();
    updateAI(nanny);
    for (const n of npcs) updateAI(n);
    updateKnifeSpawn();
    updateTimers();
    checkCombat();
    checkKnifeCombat();
    checkGameEnd();
}

function restartSameChar() {
    if (!player) return;
    const cfg = CHARACTERS.find(c => c.id === player.name) || CHARACTERS[selectedIndex];
    startGame(cfg);
}

    ctx.strokeStyle = gameWon ? '#ffd700' : '#ff66aa';
    ctx.lineWidth = 5;
    ctx.stroke();

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 40px Arial';
    ctx.fillText(gameWon ? '🏆 ПОБЕДА!' : '🏁 КТО ПОБЕДИЛ', 450, panelY + 50);

    ctx.fillStyle = '#fff';
    ctx.font = '18px Arial';
    if (gameWon) {
        ctx.fillText((player.displayName || 'Герой') + ' остался последним!', 450, panelY + 82);
    } else if (playerDead) {
        ctx.fillText('Ты выбыл — смотри итоговые места', 450, panelY + 82);
    } else {
        ctx.fillText('Бой окончен', 450, panelY + 82);
    }

    const r = finalRanking || { first: null, second: null, third: null, last: null };
    const rows = [
        { medal: '🥇', title: '1 МЕСТО', who: r.first, color: '#ffd700' },
        { medal: '🥈', title: '2 МЕСТО', who: r.second, color: '#c0c0c0' },
        { medal: '🥉', title: '3 МЕСТО', who: r.third, color: '#cd7f32' },
        { medal: '💀', title: 'ПОСЛЕДНИЙ', who: r.last, color: '#ff5555' }
    ];

    let y = panelY + 120;
    for (const row of rows) {
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        roundRect(170, y - 28, 560, 56, 10);
        ctx.fill();
        ctx.strokeStyle = row.color;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.textAlign = 'left';
        ctx.font = 'bold 22px Arial';
        ctx.fillStyle = row.color;
        ctx.fillText(row.medal + '  ' + row.title, 190, y + 6);

        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 24px Arial';
        const name = row.who ? row.who.displayName : '—';
        ctx.fillText(name, 700, y + 6);

        if (row.who && images[row.who.img] && images[row.who.img].complete && images[row.who.img].naturalWidth) {
            try {
                ctx.drawImage(images[row.who.img], 710, y - 22, 40, 40);
            } catch (e) { /* ignore */ }
        }
        y += 70;
    }

    drawButton(RES_RESTART, 'ЗАНОВО', '#1565c0', '#64b5f6', '#fff');
    drawButton(RES_SELECT, 'ВЫБОР', '#6a1b9a', '#ce93d8', '#fff');
}

// Ввод
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') e.preventDefault();

    // M — вкл/выкл фоновой музыки
    if (e.code === 'KeyM') {
        toggleMusic();
        return;
    }

    // Q — выход (диалог подтверждения)
    if (e.code === 'KeyQ') {
        if (!showExitDialog) {
            showExitDialog = true;
            if (screen === 'game') paused = true;
        }
        return;
    }

    if (showExitDialog) {
        if (e.code === 'Enter' || e.code === 'KeyY') { doExit(); return; }
        if (e.code === 'Escape' || e.code === 'KeyN') { showExitDialog = false; return; }
        return;
    }

    if (screen === 'mode') {
        if (e.code === 'Digit1' || e.code === 'Numpad1') { chooseMode('battle'); return; }
        if (e.code === 'Digit2' || e.code === 'Numpad2') { chooseMode('chase'); return; }
        if (e.code === 'Digit3' || e.code === 'Numpad3') { chooseMode('tag'); return; }
        if (e.code === 'Digit4' || e.code === 'Numpad4') { chooseMode('race'); return; }
        if (e.code === 'Digit5' || e.code === 'Numpad5') { openEditor(); return; }
        if (e.code === 'Escape') { showExitDialog = true; return; }
        return;
    }

    if (screen === 'editor') {
        if (e.code === 'Escape') {
            if (levelsListOpen) { levelsListOpen = false; return; }
            goModeSelect();
            return;
        }
        if (e.code === 'Digit1' || e.code === 'Numpad1') { editorTool = 'wall'; return; }
        if (e.code === 'Digit2' || e.code === 'Numpad2') { editorTool = 'carrot'; return; }
        if (e.code === 'Digit3' || e.code === 'Numpad3') { editorTool = 'spawn'; return; }
        if (e.code === 'Digit4' || e.code === 'Numpad4') { editorTool = 'nanny'; return; }
        if (e.code === 'Digit5' || e.code === 'Numpad5') {
            editorTool = 'hero';
            showEditorMsg('👥 Хранилище героев');
            return;
        }
        if (e.code === 'Digit6' || e.code === 'Numpad6') { editorTool = 'stick'; return; }
        if (e.code === 'Digit7' || e.code === 'Numpad7') { editorTool = 'knife'; return; }
        if (e.code === 'Digit8' || e.code === 'Numpad8') { editorTool = 'erase'; return; }
        // стрелки в хранилище — переключить героя
        if (editorTool === 'hero') {
            const list = placeableCharacters();
            let idx = list.findIndex(c => c.id === editorCharId);
            if (idx < 0) idx = 0;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                idx = (idx - 1 + list.length) % list.length;
                editorCharId = list[idx].id;
                saveCharStorage();
                showEditorMsg('👥 ' + list[idx].name);
                return;
            }
            if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                idx = (idx + 1) % list.length;
                editorCharId = list[idx].id;
                saveCharStorage();
                showEditorMsg('👥 ' + list[idx].name);
                return;
            }
        }
        if (e.code === 'KeyS' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            saveCurrentLevel();
            return;
        }
        if (e.code === 'KeyS') { saveCurrentLevel(); return; }
        if (e.code === 'Enter' || e.code === 'KeyP') { startCustomFromEditor(); return; }
        if (e.code === 'KeyM') {
            editorLevel.playMode = editorLevel.playMode === 'team' ? 'collect' : 'team';
            showEditorMsg(editorLevel.playMode === 'team' ? '⚔️ Командный бой' : '🥕 Сбор морковок');
            return;
        }
        if (e.code === 'KeyT' && editorLevel.playMode === 'team') {
            editorNpcTeam = editorNpcTeam === 'ally' ? 'enemy' : 'ally';
            showEditorMsg(editorNpcTeam === 'ally' ? '🔵 Союзники' : '🔴 Враги');
            return;
        }
        return;
    }

    if (screen === 'select') {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
            selectedIndex = (selectedIndex - 1 + CHARACTERS.length) % CHARACTERS.length;
        }
        if (e.code === 'ArrowRight' || e.code === 'KeyD') {
            selectedIndex = (selectedIndex + 1) % CHARACTERS.length;
        }
        if (e.code === 'KeyT') {
            pickRandomCharacter();
        }
        if (e.code === 'KeyR') {
            startGame(pickRandomCharacter());
            return;
        }
        if (e.code === 'Enter' || e.code === 'Space') {
            startGame(CHARACTERS[selectedIndex]);
        }
        if (e.code === 'Escape') {
            if (gameMode === 'custom') openEditor();
            else goModeSelect();
        }
        return;
    }

    if (e.code === 'Escape') {
        if (paused) showExitDialog = true;
        else {
            paused = true;
            gameplayStop();
        }
        return;
    }
    if (e.code === 'KeyR') {
        if (gameMode === 'custom') { openEditor(); return; }
        goSelect();
        return;
    }
    if (e.code === 'Enter' && (playerDead || gameOver)) {
        restartSameChar();
    }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('mousemove', e => {
    if (showExitDialog) return;
    const { mx, my } = canvasMouse(e);
    if (screen === 'editor') {
        handleEditorMouseMove(mx, my);
        return;
    }
    if (screen !== 'select') return;
    hoverIndex = pickAt(mx, my);
    if (hoverIndex >= 0) selectedIndex = hoverIndex;
});

canvas.addEventListener('mousedown', e => {
    if (screen !== 'editor' || showExitDialog) return;
    const { mx, my } = canvasMouse(e);
    handleEditorMouseDown(mx, my);
});
canvas.addEventListener('mouseup', e => {
    if (screen !== 'editor') return;
    const { mx, my } = canvasMouse(e);
    handleEditorMouseUp(mx, my);
});
canvas.addEventListener('mouseleave', () => {
    if (wallDrag) handleEditorMouseUp(wallDrag.x1, wallDrag.y1);
});

canvas.addEventListener('click', e => {
    const { mx, my } = canvasMouse(e);

    if (showExitDialog) {
        if (hitBtn(EXIT_YES, mx, my)) { doExit(); return; }
        if (hitBtn(EXIT_NO, mx, my)) { showExitDialog = false; return; }
        return;
    }

    if (screen === 'mode') {
        if (hitBtn(BTN_EXIT_SELECT, mx, my)) {
            showExitDialog = true;
            return;
        }
        if (hitBtn(BTN_MODE_BATTLE, mx, my)) {
            chooseMode('battle');
            return;
        }
        if (hitBtn(BTN_MODE_CHASE, mx, my)) {
            chooseMode('chase');
            return;
        }
        if (hitBtn(BTN_MODE_TAG, mx, my)) {
            chooseMode('tag');
            return;
        }
        if (hitBtn(BTN_MODE_RACE, mx, my)) {
            chooseMode('race');
            return;
        }
        if (hitBtn(BTN_MODE_EDITOR, mx, my)) {
            openEditor();
            return;
        }
        return;
    }

    if (screen === 'editor') {
        // если тянули стену — mouseup уже обработал; клик для остальных инструментов
        if (editorTool === 'wall' && wallDrag) return;
        handleEditorClick(mx, my);
        return;
    }

    if (screen === 'select') {
        if (hitBtn(BTN_EXIT_SELECT, mx, my)) {
            showExitDialog = true;
            return;
        }
        if (hitBtn(BTN_BACK_MODE, mx, my)) {
            if (gameMode === 'custom') openEditor();
            else goModeSelect();
            return;
        }
        if (hitBtn(BTN_RANDOM, mx, my)) {
            startGame(pickRandomCharacter());
            return;
        }
        const i = pickAt(mx, my);
        if (i >= 0) {
            selectedIndex = i;
            startGame(CHARACTERS[selectedIndex]);
        }
        return;
    }

    if (hitBtn(BTN_EXIT_GAME, mx, my)) {
        showExitDialog = true;
        return;
    }
    if (playerDead && !gameOver && gameMode === 'battle') {
        if (hitBtn(DEAD_RESTART, mx, my)) { restartSameChar(); return; }
        if (hitBtn(DEAD_SELECT, mx, my)) { goSelect(); return; }
    }
    if (gameOver) {
        if (hitBtn(RES_RESTART, mx, my)) { restartSameChar(); return; }
        if (hitBtn(RES_SELECT, mx, my)) { goSelect(); return; }
    }
});

function loop() {
    if (screen === 'mode') drawModeScreen();
    else if (screen === 'select') drawSelectScreen();
    else if (screen === 'editor') drawEditorScreen();
    else { updateGame(); drawGame(); }
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
