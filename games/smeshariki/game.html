let ysdk = null;
let ysdkReady = false;
let gameplayActive = false;
let lastFullscreenAdAt = 0;
const FULLSCREEN_AD_COOLDOWN_MS = 65000;

function ysdkSafe(fn) {
    try { if (ysdk) return fn(ysdk); } catch (e) { console.warn('ysdk', e); }
}

function gameplayStart() {
    if (gameplayActive) return;
    gameplayActive = true;
    ysdkSafe(s => s.features?.GameplayAPI?.start());
}

function gameplayStop() {
    if (!gameplayActive) return;
    gameplayActive = false;
    ysdkSafe(s => s.features?.GameplayAPI?.stop());
}

function showFullscreenAd(onDone) {
    const done = typeof onDone === 'function' ? onDone : () => {};
    if (!ysdk || !ysdk.adv) { done(); return; }
    const now = Date.now();
    if (now - lastFullscreenAdAt < FULLSCREEN_AD_COOLDOWN_MS) { done(); return; }
    lastFullscreenAdAt = now;
    gameplayStop();
    try {
        ysdk.adv.showFullscreenAdv({
            callbacks: {
                onClose: () => { done(); },
                onError: () => { done(); }
            }
        });
    } catch (e) {
        console.warn('fullscreen ad', e);
        done();
    }
}

function initYandexSDK() {
    if (typeof YaGames === 'undefined') {
        console.info('YaGames SDK не найден (локальный запуск). Игра работает без платформы.');
        ysdkReady = true;
        return Promise.resolve(null);
    }
    return YaGames.init()
        .then((sdk) => {
            ysdk = sdk;
            ysdkReady = true;
            try { ysdk.features?.LoadingAPI?.ready(); } catch (e) {}
            return ysdk;
        })
        .catch((err) => {
            console.warn('YaGames.init failed', err);
            ysdkReady = true;
            return null;
        });
}

let musicIndex = 0;
const bgMusic = new Audio();
bgMusic.loop = false;

bgMusic.preload = 'auto';
if (musicTracks.length) { try { bgMusic.src = musicTracks[0]; } catch (e) {} }
let musicStarted = false;
let musicMuted = false;

function playCurrentTrack() {
    if (!musicTracks.length) return;
    bgMusic.src = musicTracks[musicIndex];
    bgMusic.volume = 0.35;
    bgMusic.load();
    const p = bgMusic.play();
    if (p && typeof p.catch === 'function') {
        p.catch(() => { musicStarted = false; });
    }
}

function nextMusicTrack() {
    if (musicMuted || !musicTracks.length) return;
    musicIndex = (musicIndex + 1) % musicTracks.length;
    playCurrentTrack();
}

bgMusic.addEventListener('ended', nextMusicTrack);

function startBgMusic() {
    if (musicStarted || musicMuted || !musicTracks.length) return;
    if (!bgMusic.src && musicTracks[0]) bgMusic.src = musicTracks[0];
    musicStarted = true;
    const p = bgMusic.play();
    if (p && typeof p.catch === 'function') {
        p.catch(() => { musicStarted = false; });
    }
}

function toggleMusic() {
    if (!musicTracks.length) { musicMuted = !musicMuted; return; }
    musicMuted = !musicMuted;
    if (musicMuted) {
        bgMusic.pause();
    } else {
        musicStarted = true;
        bgMusic.play().catch(() => { musicStarted = false; });
    }
}

/** Приводит уровень к новому формату (массивы ножей/палок/NPC) */
function normalizeLevel(lv) {
    if (!lv || typeof lv !== 'object') return emptyEditorLevel();
    const out = emptyEditorLevel();
    out.name = lv.name || out.name;
    out.id = lv.id;
    out.updated = lv.updated;
    out.walls = Array.isArray(lv.walls) ? lv.walls : [];
    out.carrots = Array.isArray(lv.carrots) ? lv.carrots : [];
    out.playerSpawn = lv.playerSpawn || out.playerSpawn;
    out.nannySpawn = lv.nannySpawn || null;
    out.goalCarrots = Math.max(1, lv.goalCarrots || 5);
    out.nannySpeed = lv.nannySpeed || 4.2;
    // NPC
    out.playMode = (lv.playMode === 'team') ? 'team' : 'collect';
    out.npcs = Array.isArray(lv.npcs)
        ? lv.npcs.filter(n => n && n.id && n.x != null && n.y != null).map(n => ({
            id: n.id, x: n.x, y: n.y,
            team: (n.team === 'ally') ? 'ally' : 'enemy'
        }))
        : [];
    // Палки: массив + старый stickSpawn
    out.sticks = Array.isArray(lv.sticks)
        ? lv.sticks.filter(s => s && s.x != null && s.y != null).map(s => ({ x: s.x, y: s.y }))
        : [];
    if (!out.sticks.length && lv.stickSpawn) {
        out.sticks.push({ x: lv.stickSpawn.x, y: lv.stickSpawn.y });
    }
    out.stickSpawn = out.sticks[0] || null;
    // Ножи: массив + старый knifeSpawn
    out.knives = Array.isArray(lv.knives)
        ? lv.knives.filter(k => k && k.x != null && k.y != null).map(k => ({ x: k.x, y: k.y }))
        : [];
    if (!out.knives.length && lv.knifeSpawn) {
        out.knives.push({ x: lv.knifeSpawn.x, y: lv.knifeSpawn.y });
    }
    out.knifeSpawn = out.knives[0] || null;
    return out;
}

        const d = dist(ent, o);
        if (d < bestD) { bestD = d; best = o; }
    }
    return best;
}

function randomFieldPos(margin = 50) {
    return {
        x: FIELD.minX + margin + Math.random() * (FIELD.maxX - FIELD.minX - margin * 2),
        y: FIELD.minY + margin + Math.random() * (FIELD.maxY - FIELD.minY - margin * 2)
    };
}

function randomSpawnAway(occupied, minDist = 90, margin = 50, tries = 40) {
    let best = randomFieldPos(margin);
    let bestMin = -1;
    for (let t = 0; t < tries; t++) {
        const p = randomFieldPos(margin);
        let nearest = Infinity;
        for (const o of occupied) {
            const d = Math.hypot(p.x - o.x, p.y - o.y);
            if (d < nearest) nearest = d;
        }
        if (nearest >= minDist || occupied.length === 0) return p;
        if (nearest > bestMin) { bestMin = nearest; best = p; }
    }
    return best;
}

function pickRandomCharacter() {
    selectedIndex = Math.floor(Math.random() * CHARACTERS.length);
    return CHARACTERS[selectedIndex];
}

function placeAllFighters() {
    const occupied = [];
    const place = (ent) => {
        if (!ent || ent.dead) return;
        const p = randomSpawnAway(occupied, 100, 55);
        ent.x = p.x;
        ent.y = p.y;
        occupied.push(p);
    };
    place(player);
    place(nanny);
    for (const n of npcs) place(n);
    if (pacman && !pacman.dead) place(pacman);
}

function buildPlayerFromCfg(charCfg) {
    player = makeFighter({
        name: charCfg.id,
        img: charCfg.img,
        displayName: charCfg.name,
        speed: charCfg.speed,
        radius: charCfg.isPacman ? 14 : 8,
        hp: charCfg.hp,
        damage: charCfg.damage,
        hitRadius: charCfg.hitRadius,
        attackCooldown: charCfg.attackCooldown,
        size: charCfg.size,
        ai: false,
        upgraded: true,
        isPacman: !!charCfg.isPacman,
        lives: charCfg.lives || 0,
        drawStyle: charCfg.drawStyle || null
    });
    if (charCfg.isPacman) {
        player.livesMax = charCfg.lives || 2;
        player.lives = player.livesMax;
    }

            rest = playable.filter(c => c.id !== 'robonanny');
            // игрок = няня, но охотник — отдельный босс-клоун? Нет: если выбрали няню,
            // пусть охотник будет «злая няня» — используем robonanny как nanny,
            // а игрока оставим няней (будет странно). Лучше: охотник = Крош-босс.
            bossCfg = CHARACTERS.find(c => c.id === 'krosh');
            rest = playable.filter(c => c.id !== 'krosh');

function startGame(charCfg) {
    if (gameMode === 'custom') {
        startCustomGame(charCfg);
        return;
    }
    if (gameMode === 'chase') {
        startChaseGame(charCfg);
        return;
    }
    if (gameMode === 'tag') {
        startTagGame(charCfg);
        return;
    }

        startRaceGame(charCfg);

    }
    buildPlayerFromCfg(charCfg);

    knife = {
        onGround: false, x: 0, y: 0, heldBy: null, spawnCD: 120, pulse: 0,
        holdTimer: 0, holdMax: KNIFE_HOLD_FRAMES,
        killsLeft: 0
    };
    placeAllFighters();
    carrots = [];
    carrotsCollected = 0;
    chaseCaught = false;
    paused = false;
    gameOver = false;
    gameWon = false;
    playerDead = false;
    showExitDialog = false;
    deathOrder = [];
    finalRanking = null;
    screen = 'game';
    gameplayStart();
    document.getElementById('hint').textContent = charCfg.isPacman
        ? 'WASD — ходить | Пробел — КУСЬ! | Shift — бег | Esc — пауза | Q — выйти | R — выбор'
        : 'WASD — ходить | Пробел — удар | Shift — бег | Esc — пауза | Q — выйти | R — выбор';
}

function spawnCarrot(occupied) {
    const occ = occupied || [];
    // не рядом с игроком / няней
    if (player) occ.push({ x: player.x, y: player.y });
    if (nanny) occ.push({ x: nanny.x, y: nanny.y });
    for (const c of carrots) occ.push({ x: c.x, y: c.y });
    const p = randomSpawnAway(occ, 70, 45);
    carrots.push({ x: p.x, y: p.y, pulse: Math.random() * Math.PI * 2, taken: false });
}

/** Режим 4: Гонки — кто первый до финиша */
function startRaceGame(charCfg) {
    buildPlayerFromCfg(charCfg);
    player.x = RACE_START_X;
    player.y = RACE_LANES_Y[0];
    player.finished = false;
    player.finishPlace = 0;
    player.raceBoost = 0;
    player.hp = 1;
    player.hpMax = 1;
    player.dead = false;

    npcs = [];
    pacman = null;
    nanny = null;
    knife = { onGround: false, x: 0, y: 0, heldBy: null, spawnCD: 99999, pulse: 0, holdTimer: 0, holdMax: 0, killsLeft: 0 };
    carrots = [];
    raceFinishOrder = [];
    raceCountdown = 180; // 3 сек
    raceStarted = false;

    const pool = CHARACTERS.filter(c => c.id !== charCfg.id && c.id !== 'robonanny' && !c.isPacman);
    // перемешать
    for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = pool[i]; pool[i] = pool[j]; pool[j] = t;
    }
    const racers = pool.slice(0, Math.min(4, pool.length));
    racers.forEach((cfg, i) => {
        const f = makeFighter({
            name: cfg.id, img: cfg.img || cfg.id, displayName: cfg.name,
            speed: cfg.speed, radius: cfg.radius || 8, hp: 1,
            damage: 0, hitRadius: 20, attackCooldown: 99, size: cfg.size || 62, ai: true
        });
        f.x = RACE_START_X - Math.random() * 10;
        f.y = RACE_LANES_Y[i + 1] || RACE_LANES_Y[RACE_LANES_Y.length - 1];
        f.finished = false;
        f.finishPlace = 0;
        f.raceBoost = 0;
        f.raceBase = (cfg.speed || 3.5) * (0.88 + Math.random() * 0.28);
        f.wander = Math.random() * Math.PI * 2;
        f.laneY = f.y;
        npcs.push(f);
    });

    paused = false;
    gameOver = false;
    gameWon = false;
    playerDead = false;
    showExitDialog = false;
    deathOrder = [];
    finalRanking = null;
    screen = 'game';
    gameplayStart();
    document.getElementById('hint').textContent =
        '🏁 ГОНКИ! A/D или ←/→ — бег · Shift — ускорение · первый к финишу побеждает | Esc | Q';
}

function updateRace() {
    if (gameOver) return;
    if (raceCountdown > 0) {
        raceCountdown--;
        if (raceCountdown === 0) raceStarted = true;
        return;
    }
    if (!raceStarted) raceStarted = true;

    // игрок
    if (player && !player.finished && !player.dead) {
        const boost = (isDown('ShiftLeft') || isDown('ShiftRight')) ? 1.55 : 1;
        let dx = 0;
        if (isDown('ArrowLeft') || isDown('KeyA')) dx -= player.speed * boost;
        if (isDown('ArrowRight') || isDown('KeyD')) dx += player.speed * boost * 1.08;
        // лёгкое удержание на своей дорожке
        let dy = 0;
        if (isDown('ArrowUp') || isDown('KeyW')) dy -= player.speed * 0.45;
        if (isDown('ArrowDown') || isDown('KeyS')) dy += player.speed * 0.45;
        player.x = Math.max(40, Math.min(RACE_FINISH_X + 40, player.x + dx));
        player.y = Math.max(120, Math.min(560, player.y + dy));
        if (player.x >= RACE_FINISH_X && !player.finished) {
            player.finished = true;
            player.finishPlace = raceFinishOrder.length + 1;
            raceFinishOrder.push(player);
            if (player.finishPlace === 1) {
                gameWon = true;
                gameOver = true;
                gameplayStop();
                document.getElementById('hint').textContent =
                    '🏆 Ты пришёл первым! Enter — заново | R — выбор';
            }
        }
    }

    // NPC AI — бегут вперёд с вариацией
    for (const n of npcs) {
        if (!n || n.finished) continue;
        n.wander = (n.wander || 0) + 0.05;
        const wobble = Math.sin(n.wander * 2.1) * 0.15;
        const surge = 1 + Math.sin(n.wander * 0.7 + n.x * 0.01) * 0.12;
        const spd = (n.raceBase || n.speed || 3.5) * surge + wobble;
        n.x += Math.max(1.2, spd * 0.92);
        // держатся своей дорожки
        if (n.laneY != null) {
            n.y += (n.laneY - n.y) * 0.08;
        }
        if (n.x >= RACE_FINISH_X && !n.finished) {
            n.finished = true;
            n.finishPlace = raceFinishOrder.length + 1;
            raceFinishOrder.push(n);
            if (n.finishPlace === 1 && !gameOver) {
                gameWon = false;
                gameOver = true;
                gameplayStop();
                document.getElementById('hint').textContent =
                    '🏁 Победил ' + (n.displayName || n.name) + '! Enter — заново | R — выбор';
            }
        }
    }

    // все финишировали
    const all = [player, ...npcs].filter(Boolean);
    if (all.every(r => r.finished) && !gameOver) {
        gameOver = true;
        gameWon = player && player.finishPlace === 1;
        gameplayStop();
    }
}

function drawRaceTrack() {
    // небо / трава
    const sky = ctx.createLinearGradient(0, 0, 0, 600);
    sky.addColorStop(0, '#4fc3f7');
    sky.addColorStop(0.45, '#81d4fa');
    sky.addColorStop(0.45, '#66bb6a');
    sky.addColorStop(1, '#2e7d32');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, 900, 600);

    // трасса
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(40, 120, 820, 440);
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 4;
    ctx.strokeRect(40, 120, 820, 440);

    // полосы дорожек
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 2;
    ctx.setLineDash([12, 10]);
    for (let i = 1; i < RACE_LANES_Y.length; i++) {
        const y = (RACE_LANES_Y[i - 1] + RACE_LANES_Y[i]) / 2;
        ctx.beginPath();
        ctx.moveTo(50, y);
        ctx.lineTo(850, y);
        ctx.stroke();
    }
    ctx.setLineDash([]);

    // старт / финиш
    ctx.fillStyle = '#fff';
    for (let y = 120; y < 560; y += 20) {
        ctx.fillRect(RACE_START_X - 8, y, 10, 10);
        if ((y / 20) % 2 === 0) ctx.fillStyle = '#222';
        else ctx.fillStyle = '#fff';
    }
    // клетчатый финиш
    for (let y = 120; y < 560; y += 16) {
        for (let c = 0; c < 2; c++) {
            ctx.fillStyle = ((Math.floor(y / 16) + c) % 2 === 0) ? '#111' : '#fff';
            ctx.fillRect(RACE_FINISH_X + c * 12, y, 12, 16);
        }
    }

    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('СТАРТ', RACE_START_X, 110);
    ctx.fillText('ФИНИШ', RACE_FINISH_X + 12, 110);
}

function drawRaceUI() {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    roundRect(12, 8, 320, 70, 10);
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('🏁 ГОНКИ СМЕШАРИКОВ', 24, 34);
    const place = player && player.finished
        ? ('Место: ' + player.finishPlace)
        : ('Прогресс: ' + Math.min(100, Math.round(((player ? player.x : 0) - RACE_START_X) / (RACE_FINISH_X - RACE_START_X) * 100)) + '%');
    ctx.fillStyle = '#fff';
    ctx.font = '14px Arial';
    ctx.fillText(place, 24, 58);

    if (raceCountdown > 0) {
        const sec = Math.ceil(raceCountdown / 60);
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, 900, 600);
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 90px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(String(sec), 450, 320);
        ctx.font = 'bold 28px Arial';
        ctx.fillText('Приготовьтесь…', 450, 380);
    }

    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.72)';
        ctx.fillRect(0, 0, 900, 600);
        ctx.fillStyle = gameWon ? 'rgba(0,90,40,0.96)' : 'rgba(40,20,60,0.96)';
        roundRect(160, 80, 580, 420, 18);
        ctx.fill();
        ctx.strokeStyle = '#ffcc00';
        ctx.lineWidth = 5;
        ctx.stroke();
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 36px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(gameWon ? '🏆 ТЫ ПОБЕДИЛ!' : '🏁 ФИНИШ!', 450, 130);
        let y = 180;
        const ordered = raceFinishOrder.length
            ? raceFinishOrder
            : [player, ...npcs].filter(Boolean).sort((a, b) => (b.x || 0) - (a.x || 0));
        ordered.forEach((r, i) => {
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1) + '.';
            ctx.fillStyle = r === player ? '#7CFC00' : '#fff';
            ctx.font = 'bold 22px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(medal + '  ' + (r.displayName || r.name || '?'), 220, y);
            y += 42;
        });
        drawButton(RES_RESTART, 'ЗАНОВО', '#1565c0', '#64b5f6', '#fff');
        drawButton(RES_SELECT, 'ВЫБОР', '#6a1b9a', '#ce93d8', '#fff');
    }
}

/** Режим 5: свой уровень — стены, морковь, няня, герои, палка, нож, цель */
function startCustomGame(charCfg) {
    const lv = customLevel || cloneLevel(editorLevel);
    customLevel = normalizeLevel(lv);
    if (!customLevel.playerSpawn) customLevel.playerSpawn = { x: 450, y: 300 };
    customLevel.goalCarrots = Math.max(1, customLevel.goalCarrots || 5);
    const teamMode = customLevel.playMode === 'team';

    buildPlayerFromCfg(charCfg);
    player.team = 'ally';
    player.carrots = 0;
    player.hasKnife = false;
    player.hasStick = false;
    player.swing = 0;
    player.hitCooldown = 0;
    player.x = customLevel.playerSpawn.x;
    player.y = customLevel.playerSpawn.y;
    if (teamMode) {
        player.hp = 5;
        player.hpMax = 5;
        player.damage = 2;
        player.hitRadius = 34;
        player.attackCooldown = 16;
        player.hasStick = true;
    } else {
        player.hp = 1;
        player.hpMax = 1;

        nanny.y = customLevel.nannySpawn.y;
        nanny.stun = 0;
        nanny.team = 'enemy';

            ' | союзн: ' + allyN + ' | враги: ' + enemyN +
            ' | Пробел — удар | WASD | Shift | Esc | R';
    } else {
        const heroN = (customLevel.npcs || []).length;
        document.getElementById('hint').textContent =
            '🗺️ Свой уровень! Собери ' + customLevel.goalCarrots + ' 🥕' +
            (nanny ? ' · убеги от няни' : '') +
            (heroN ? ' · герои: ' + heroN : '') +
            (weaponHint ? ' · оружие: ' + weaponHint + ' (пробел — удар)' : '') +
            ' | WASD | Shift | Esc | Q | R';
    }
}

function tryPickupStick(ent) {
    if (!ent || ent.hp <= 0 || ent.dead) return;
    if (ent.hasStick || ent.hasKnife) return;
    for (const s of groundSticks) {
        if (!s.onGround) continue;
        if (dist(ent, s) < 40) {
            s.onGround = false;
            ent.hasStick = true;
            return;
        }
    }
    // совместимость со старым stickPickup
    if (stickPickup && stickPickup.onGround && dist(ent, stickPickup) < 40) {
        stickPickup.onGround = false;
        ent.hasStick = true;
    }
}

function tryPickupGroundKnife(ent) {
    if (!ent || ent.hp <= 0 || ent.dead) return;
    if (ent.hasKnife || ent.hasStick) return;
    if (knife && knife.heldBy) return;
    for (const k of groundKnives) {
        if (!k.onGround) continue;
        if (dist(ent, k) < 38) {
            k.onGround = false;
            knife.onGround = false;
            knife.heldBy = ent;
            knife.x = k.x;
            knife.y = k.y;
            ent.hasKnife = true;
            knife.holdTimer = KNIFE_HOLD_FRAMES;
            knife.killsLeft = KNIFE_MAX_KILLS;
            knife.custom = true;
            return;
        }
    }
}

function dropCustomKnife() {
    const holder = knife.heldBy;
    const hx = holder ? holder.x : knife.x;
    const hy = holder ? holder.y : knife.y;
    if (holder) holder.hasKnife = false;
    knife.heldBy = null;
    knife.holdTimer = 0;
    knife.killsLeft = 0;
    knife.onGround = false;
    // вернуть нож на землю рядом с держателем
    groundKnives.push({ x: hx, y: hy, pulse: 0, onGround: true });
}

/** AI друзей: убегают от няни, собирают морковь, могут взять оружие */
function updateCustomNpcAI(ent) {
    if (!ent || ent.dead || ent.hp <= 0) return;
    if (ent.swing > 0) ent.swing--;
    if (ent.hitCooldown > 0) ent.hitCooldown--;

    tryPickupStick(ent);
    tryPickupGroundKnife(ent);

    if (isCustomTeamMode()) {
        if (ent.hasKnife) {
            const t = nearestTeamEnemy(ent);
            if (t) {
                const dx = t.x - ent.x, dy = t.y - ent.y;
                const len = Math.hypot(dx, dy) || 1;
                moveEntity(ent, (dx / len) * ent.speed * 1.35, (dy / len) * ent.speed * 1.35);
                if (dist(ent, t) < 48) {
                    t.hp = 0;
                    t.dead = true;
                    if (t === player) playerDead = true;
                    if (knife.heldBy === ent) {
                        knife.killsLeft = Math.max(0, (knife.killsLeft || 0) - 1);
                        if (knife.killsLeft <= 0) dropCustomKnife();
                    }
                }
            }
            if (ent.isPacman) ent.mouth = (ent.mouth + 0.25) % (Math.PI * 2);
            return;
        }
        const foe = nearestTeamEnemy(ent);
        if (foe) {
            const dx = foe.x - ent.x, dy = foe.y - ent.y;
            const len = Math.hypot(dx, dy) || 1;
            const d = dist(ent, foe);
            moveEntity(ent, (dx / len) * ent.speed * 1.1, (dy / len) * ent.speed * 1.1);
            if (ent.isPacman) {
                ent.mouth = (ent.mouth + 0.25) % (Math.PI * 2);
                if (d < 48 && ent.biteCooldown <= 0) {
                    ent.biteCooldown = ent.attackCooldown || 12;
                    foe.hp -= ent.damage || 1;
                    moveEntity(foe, Math.cos(ent.angle) * 14, Math.sin(ent.angle) * 14);
                    if (foe.hp <= 0) {
                        foe.hp = 0; foe.dead = true;
                        if (foe === player) playerDead = true;
                    }
                }
            } else if (ent.hasStick) {
                if (d < 95) trySwing(ent);
                if (ent.swing > 9 && ent.hitCooldown <= 0) {
                    const tip = stickTip(ent);
                    if (dist(tip, foe) < 50) {
                        foe.hp -= ent.damage || 2;
                        ent.hitCooldown = ent.attackCooldown || 16;
                        ent.swing = 0;
                        moveEntity(foe, Math.cos(ent.angle) * 16, Math.sin(ent.angle) * 16);
                        if (foe.hp <= 0) {
                            foe.hp = 0; foe.dead = true;
                            if (foe === player) playerDead = true;
                        }
                    }
                }
            }
            return;
        }
        ent.wander = (ent.wander || 0) + 0.04;
        if (Math.random() < 0.02) ent.wander = Math.random() * Math.PI * 2;
        moveEntity(ent, Math.cos(ent.wander) * ent.speed * 0.45, Math.sin(ent.wander) * ent.speed * 0.45);
        if (ent.isPacman) ent.mouth = (ent.mouth + 0.25) % (Math.PI * 2);
        return;
    }

    if (nanny && !nanny.dead && nanny.hp > 0) {
        const dN = dist(ent, nanny);
        if (dN < 180) {
            const dx = ent.x - nanny.x, dy = ent.y - nanny.y;
            const len = Math.hypot(dx, dy) || 1;
            moveEntity(ent, (dx / len) * ent.speed * 1.15, (dy / len) * ent.speed * 1.15);
            if (dN < CATCH_RADIUS) {
                ent.hp = 0;
                ent.dead = true;
                if (knife.heldBy === ent) dropCustomKnife();
                ent.hasStick = false;
                return;
            }
        }
    }

    if (ent.hasKnife && nanny && !nanny.dead && nanny.hp > 0) {
        const dx = nanny.x - ent.x, dy = nanny.y - ent.y;
        const len = Math.hypot(dx, dy) || 1;
        moveEntity(ent, (dx / len) * ent.speed * 1.3, (dy / len) * ent.speed * 1.3);
        if (dist(ent, nanny) < 48) {
            nanny.hp = 0;
            nanny.dead = true;
            if (knife.heldBy === ent) {
                knife.killsLeft = Math.max(0, (knife.killsLeft || 0) - 1);
                if (knife.killsLeft <= 0) dropCustomKnife();
            }
        }
        return;
    }

    if (ent.hasStick && nanny && !nanny.dead && nanny.hp > 0) {
        const dx = nanny.x - ent.x, dy = nanny.y - ent.y;
        const len = Math.hypot(dx, dy) || 1;
        const d = dist(ent, nanny);
        moveEntity(ent, (dx / len) * ent.speed * 1.1, (dy / len) * ent.speed * 1.1);
        if (d < 90) trySwing(ent);
        if (ent.swing > 9 && ent.hitCooldown <= 0) {
            const tip = stickTip(ent);
            if (dist(tip, nanny) < 50) {
                nanny.hp -= 2;
                nanny.stun = 30;
                ent.hitCooldown = 20;
                ent.swing = 0;
                moveEntity(nanny, Math.cos(ent.angle) * 18, Math.sin(ent.angle) * 18);
                if (nanny.hp <= 0) { nanny.hp = 0; nanny.dead = true; }
            }
        }
        return;
    }

    let best = null, bestD = Infinity;
    for (const c of carrots) {
        if (c.taken) continue;
        const d = dist(ent, c);
        if (d < bestD) { bestD = d; best = c; }
    }
    if (best) {
        const dx = best.x - ent.x, dy = best.y - ent.y;
        const len = Math.hypot(dx, dy) || 1;
        moveEntity(ent, (dx / len) * ent.speed, (dy / len) * ent.speed);
        if (bestD < CARROT_PICKUP_R) {
            best.taken = true;
            ent.carrots = (ent.carrots || 0) + 1;
        }
    } else {
        ent.wander = (ent.wander || 0) + 0.04;
        if (Math.random() < 0.02) ent.wander = Math.random() * Math.PI * 2;
        moveEntity(ent, Math.cos(ent.wander) * ent.speed * 0.5, Math.sin(ent.wander) * ent.speed * 0.5);
    }
    if (ent.isPacman) ent.mouth = (ent.mouth + 0.25) % (Math.PI * 2);
}

function dealCustomTeamHit(att, vic, dmg, knock) {
    if (!att || !vic || sameTeam(att, vic)) return false;
    if (vic.hp <= 0 || vic.dead) return false;
    vic.hp -= dmg;
    if (knock) moveEntity(vic, Math.cos(att.angle) * knock, Math.sin(att.angle) * knock);
    if (vic.hp <= 0) {
        vic.hp = 0;
        vic.dead = true;
        if (vic === player) playerDead = true;
        if (knife && knife.heldBy === vic) dropCustomKnife();
        vic.hasStick = false;
        vic.hasKnife = false;
    }
    return true;
}

function updateCustomLevel() {
    if (showExitDialog || paused || gameOver) return;
    chasePulse += 0.08;
    if (knife) knife.pulse += 0.12;
    for (const s of groundSticks) if (s.onGround) s.pulse += 0.1;
    for (const k of groundKnives) if (k.onGround) k.pulse += 0.12;

    if (player) {
        if (player.swing > 0) player.swing--;
        if (player.hitCooldown > 0) player.hitCooldown--;
        if (player.invuln > 0) player.invuln--;
        if (player.biteCooldown > 0) player.biteCooldown--;
    }
    if (nanny && nanny.stun > 0) nanny.stun--;

    updatePlayer();

    if (player && !player.dead) {
        tryPickupStick(player);
        tryPickupGroundKnife(player);
    }

    if (knife && knife.heldBy) {
        const holder = knife.heldBy;
        if (!holder || holder.hp <= 0 || holder.dead) {
            dropCustomKnife();
        } else if (knife.holdTimer > 0) {
            knife.holdTimer--;
            if (knife.holdTimer <= 0) dropCustomKnife();
        }
    }

    for (const n of npcs) updateCustomNpcAI(n);
    if (pacman && !pacman.dead) updateCustomNpcAI(pacman);

    if (isCustomTeamMode()) {
        if (nanny && !nanny.dead && nanny.hp > 0) {
            if (!(nanny.stun > 0)) {
                const t = nearestTeamEnemy(nanny);
                if (t) {
                    const dx = t.x - nanny.x, dy = t.y - nanny.y;
                    const len = Math.hypot(dx, dy) || 1;
                    moveEntity(nanny, (dx / len) * nanny.speed, (dy / len) * nanny.speed);
                    if (dist(nanny, t) < 90 && nanny.hasStick) trySwing(nanny);
                    if (nanny.swing > 9 && nanny.hitCooldown <= 0) {
                        const tip = stickTip(nanny);
                        if (dist(tip, t) < 52) {
                            dealCustomTeamHit(nanny, t, nanny.damage || 2, 18);
                            nanny.hitCooldown = nanny.attackCooldown || 18;
                            nanny.swing = 0;
                        }
                    }
                    if (dist(nanny, t) < CATCH_RADIUS && (t.invuln || 0) <= 0 && !t.hasKnife) {
                        dealCustomTeamHit(nanny, t, 1, 12);
                        t.invuln = (t === player) ? 40 : 20;
                    }
                }
            }
            if (nanny.swing > 0) nanny.swing--;
            if (nanny.hitCooldown > 0) nanny.hitCooldown--;
        }

        if (player && !player.dead && player.hp > 0) {
            if (player.hasKnife) {
                const t = nearestTeamEnemy(player);
                if (t && dist(player, t) < 48) {
                    dealCustomTeamHit(player, t, 99, 10);
                    if (knife.heldBy === player) {
                        knife.killsLeft = Math.max(0, (knife.killsLeft || 0) - 1);
                        if (knife.killsLeft <= 0) dropCustomKnife();
                    }
                }
            } else if (player.hasStick && player.swing > 9 && player.hitCooldown <= 0) {
                const tip = stickTip(player);
                for (const t of allCustomFighters()) {
                    if (sameTeam(player, t)) continue;
                    if (dist(tip, t) < (player.hitRadius || 34) + 10) {
                        dealCustomTeamHit(player, t, player.damage || 2, 20);
                        player.hitCooldown = player.attackCooldown || 16;
                        player.swing = 0;
                        break;
                    }
                }
            } else if (player.isPacman && player.biteCooldown <= 0) {
                for (const t of allCustomFighters()) {
                    if (sameTeam(player, t)) continue;
                    if (dist(player, t) < 48) {
                        player.biteCooldown = player.attackCooldown || 12;
                        dealCustomTeamHit(player, t, 1, 14);
                        break;
                    }
                }
            }
        }

        if (playerDead || (player && (player.hp <= 0 || player.dead))) {
            finishCustom(false);
            return;
        }
        if (countTeamAlive('enemy') <= 0) {
            finishCustom(true);
            return;
        }
        return;
    }

    if (nanny && !nanny.dead && nanny.hp > 0 && !playerDead && player && player.hp > 0) {
        if (!(nanny.stun > 0)) {
            const dx = player.x - nanny.x, dy = player.y - nanny.y;
            const len = Math.hypot(dx, dy) || 1;
            const spd = nanny.speed;
            moveEntity(nanny, (dx / len) * spd, (dy / len) * spd);
            if (Math.hypot(player.x - nanny.x, player.y - nanny.y) > 8) {
                const side = Math.sin(chasePulse * 3) > 0 ? 1 : -1;
                moveEntity(nanny, (-dy / len) * spd * 0.4 * side, (dx / len) * spd * 0.4 * side);
            }
        }
        if (player.hasKnife && dist(player, nanny) < 48) {
            nanny.hp = 0;
            nanny.dead = true;
            if (knife.heldBy === player) {
                knife.killsLeft = Math.max(0, (knife.killsLeft || 0) - 1);
                if (knife.killsLeft <= 0) dropCustomKnife();
            }
        }
        if (player.hasStick && !player.hasKnife && player.swing > 9 && player.hitCooldown <= 0) {
            const tip = stickTip(player);
            if (dist(tip, nanny) < (player.hitRadius || 40) + 10) {
                nanny.hp -= player.damage || 3;
                nanny.stun = 40;
                player.hitCooldown = player.attackCooldown || 15;
                player.swing = 0;
                moveEntity(nanny, Math.cos(player.angle) * 22, Math.sin(player.angle) * 22);
                if (nanny.hp <= 0) {
                    nanny.hp = 0;
                    nanny.dead = true;
                }
            }
        }
        if (!nanny.dead && nanny.hp > 0 && dist(player, nanny) < CATCH_RADIUS && player.invuln <= 0) {
            if (!(player.hasKnife && dist(player, nanny) < 48)) {
                player.hp = 0;
                player.dead = true;
                playerDead = true;
                finishCustom(false);
                return;
            }
        }
    }

    for (const c of carrots) {
        if (c.taken) continue;
        c.pulse += 0.1;
        if (player && !player.dead && dist(player, c) < CARROT_PICKUP_R) {
            c.taken = true;
            carrotsCollected++;
            player.carrots = carrotsCollected;
        }
    }
    carrots = carrots.filter(c => !c.taken);

    if (carrotsCollected >= customLevel.goalCarrots) {
        finishCustom(true);
    }
}

function drawOneStickOnGround(s) {
    if (!s || !s.onGround) return;
    const sc = 1 + Math.sin(s.pulse) * 0.12;
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(0.4 + Math.sin(s.pulse) * 0.15);
    ctx.scale(sc, sc);
    ctx.fillStyle = 'rgba(255,193,7,0.28)';
    ctx.beginPath(); ctx.arc(0, 0, 26, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#6d4c41';
    ctx.lineWidth = 7;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-18, 10);
    ctx.lineTo(18, -12);
    ctx.stroke();
    ctx.strokeStyle = '#a1887f';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-16, 8);
    ctx.lineTo(16, -10);
    ctx.stroke();
    ctx.restore();
    ctx.fillStyle = '#ffcc80';
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('ПАЛКА!', s.x, s.y + 36);
}

function drawOneKnifeOnGround(k) {
    if (!k || !k.onGround) return;
    const sc = 1 + Math.sin(k.pulse) * 0.15;
    ctx.save();
    ctx.translate(k.x, k.y);
    ctx.rotate(k.pulse);
    ctx.scale(sc, sc);
    ctx.fillStyle = 'rgba(255,0,0,0.25)';
    ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ccc'; ctx.fillRect(-4, -22, 8, 28);
    ctx.fillStyle = '#8b0000';
    ctx.beginPath(); ctx.moveTo(0, -22); ctx.lineTo(10, -8); ctx.lineTo(-10, -8); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#444'; ctx.fillRect(-7, 4, 14, 5);
    ctx.restore();
    ctx.fillStyle = '#ff2222';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('НОЖ!', k.x, k.y + 38);
}

function drawStickOnGround() {
    for (const s of groundSticks) drawOneStickOnGround(s);
    if (stickPickup && stickPickup.onGround && !groundSticks.includes(stickPickup)) {
        drawOneStickOnGround(stickPickup);
    }
}

function drawGroundKnives() {
    for (const k of groundKnives) drawOneKnifeOnGround(k);
}

function drawEditorWeaponMarker(x, y, kind) {
    ctx.save();
    if (kind === 'knife') {
        ctx.fillStyle = 'rgba(255,40,40,0.3)';
        ctx.beginPath(); ctx.arc(x, y, 26, 0, Math.PI * 2); ctx.fill();
        ctx.translate(x, y);
        ctx.rotate(-0.5);
        ctx.fillStyle = '#ccc'; ctx.fillRect(-3, -18, 6, 24);
        ctx.fillStyle = '#c62828';
        ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(8, -6); ctx.lineTo(-8, -6); ctx.closePath(); ctx.fill();
        ctx.restore();
        ctx.fillStyle = '#ff5252';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🔪 НОЖ', x, y + 38);
    } else {
        ctx.fillStyle = 'rgba(255,193,7,0.3)';
        ctx.beginPath(); ctx.arc(x, y, 26, 0, Math.PI * 2); ctx.fill();
        ctx.translate(x, y);
        ctx.rotate(0.5);
        ctx.strokeStyle = '#6d4c41';
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(-16, 8); ctx.lineTo(16, -10); ctx.stroke();
        ctx.restore();
        ctx.fillStyle = '#ffcc80';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🪵 ПАЛКА', x, y + 38);
    }
}

function finishCustom(won) {
    if (gameOver) return;
    gameOver = true;
    gameWon = !!won;
    playerDead = !won;
    gameplayStop();
    const teamMode = customLevel && customLevel.playMode === 'team';
    if (teamMode) {
        finalRanking = {
            first: won
                ? { displayName: 'Синие 🔵', img: player ? player.img : 'krosh' }
                : { displayName: 'Красные 🔴', img: 'robonanny' },
            second: { displayName: (player && player.displayName) || 'Ты', img: player ? player.img : 'krosh' },
            third: { displayName: 'Союзников живо: ' + countTeamAlive('ally'), img: player ? player.img : 'krosh' },
            last: { displayName: customLevel ? customLevel.name : 'Командный бой', img: player ? player.img : 'krosh' }
        };
        document.getElementById('hint').textContent = won
            ? '⚔️ Синие победили! Enter — снова | R — редактор | Q — меню'
            : '💀 Красные победили! Enter — снова | R — редактор';
    } else {
        finalRanking = {
            first: won ? { displayName: player.displayName || 'Ты', img: player.img } : { displayName: 'Няня 🤖', img: 'robonanny' },
            second: won ? { displayName: 'Уровень пройден 🏗️', img: player.img } : { displayName: player.displayName || 'Ты', img: player.img },
            third: { displayName: '🥕 ' + carrotsCollected + ' / ' + (customLevel ? customLevel.goalCarrots : 0), img: player.img },
            last: { displayName: customLevel ? customLevel.name : 'Уровень', img: player.img }
        };
        document.getElementById('hint').textContent = won
            ? '🏆 Уровень пройден! Enter — снова | R — герои | Q — меню'
            : '💀 Поймали! Enter — снова | R — герои | 4 — редактор';
    }
    showFullscreenAd(() => {});
}

function drawCustomWalls(walls) {
    if (!walls) return;
    for (const w of walls) {
        const g = ctx.createLinearGradient(w.x, w.y, w.x + w.w, w.y + w.h);
        g.addColorStop(0, '#5d4037');
        g.addColorStop(1, '#3e2723');
        ctx.fillStyle = g;
        roundRect(w.x, w.y, w.w, w.h, 6);
        ctx.fill();
        ctx.strokeStyle = '#ffcc00';
        ctx.lineWidth = 2;
        ctx.stroke();
        // кирпичики
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 1;
        for (let yy = w.y + 10; yy < w.y + w.h; yy += 14) {
            ctx.beginPath();
            ctx.moveTo(w.x + 2, yy);
            ctx.lineTo(w.x + w.w - 2, yy);
            ctx.stroke();
        }
    }
}

function openEditor() {
    gameplayStop();
    screen = 'editor';
    gameMode = 'custom';
    levelsListOpen = false;
    wallDrag = null;
    editorLevel = normalizeLevel(editorLevel || emptyEditorLevel());
    document.getElementById('hint').textContent =
        '🏗️ РЕДАКТОР: M — сбор/командный бой · T — союз/враг · ▶ играть · S сохранить · 1–8 инструменты';
}

function saveCurrentLevel() {
    editorLevel = normalizeLevel(editorLevel);
    const name = (editorLevel.name || 'Мой уровень').slice(0, 40);
    editorLevel.name = name;
    editorLevel.goalCarrots = Math.max(1, Math.min(99, editorLevel.goalCarrots || 5));
    editorLevel.id = editorLevel.id || ('lv_' + Date.now());
    editorLevel.updated = Date.now();
    const list = loadSavedLevels().filter(x => x.id !== editorLevel.id);
    list.unshift(cloneLevel(editorLevel));
    if (list.length > 30) list.length = 30;
    persistSavedLevels(list);
    showEditorMsg('💾 Сохранено: ' + name);
}

function clearEditorLevel() {
    editorLevel = emptyEditorLevel();
    wallDrag = null;
    groundSticks = [];
    groundKnives = [];
    showEditorMsg('🧹 Поле очищено');
}

function startCustomFromEditor() {
    editorLevel = normalizeLevel(editorLevel);
    if (editorLevel.playMode === 'team') {
        const enemies = (editorLevel.npcs || []).filter(n => n.team !== 'ally').length
            + (editorLevel.nannySpawn ? 1 : 0);
        if (enemies < 1) {
            showEditorMsg('⚔️ Нужен хотя бы 1 враг (🔴 герой или няня)!');
            return;
        }
    } else {
        const nCar = (editorLevel.carrots || []).length;
        if (nCar > 0) {
            editorLevel.goalCarrots = Math.min(editorLevel.goalCarrots || nCar, nCar);
            if (editorLevel.goalCarrots < 1) editorLevel.goalCarrots = nCar;
        } else {
            editorLevel.goalCarrots = Math.max(1, editorLevel.goalCarrots || 5);
        }
    }
    customLevel = cloneLevel(editorLevel);
    gameMode = 'custom';
    screen = 'select';
    setHintSelect();
    showEditorMsg('');
}

function editorCanvasToField(mx, my) {
    // редактор рисует поле 1:1 в ED_FIELD, координаты уровня = координаты игры FIELD
    // используем те же 50..850 / 50..550 как FIELD
    return { x: mx, y: my };
}

function pointInEditorField(mx, my) {
    return mx >= FIELD.minX && mx <= FIELD.maxX && my >= FIELD.minY && my <= FIELD.maxY && my >= 120;
}

function eraseAt(mx, my) {
    const R = 28;
    editorLevel = normalizeLevel(editorLevel);
    const beforeW = editorLevel.walls.length;
    editorLevel.walls = editorLevel.walls.filter(w =>
        !(mx >= w.x && mx <= w.x + w.w && my >= w.y && my <= w.y + w.h)
    );
    const beforeC = editorLevel.carrots.length;
    editorLevel.carrots = editorLevel.carrots.filter(c => Math.hypot(c.x - mx, c.y - my) > R);
    const beforeN = (editorLevel.npcs || []).length;
    editorLevel.npcs = (editorLevel.npcs || []).filter(n => Math.hypot(n.x - mx, n.y - my) > R);
    const beforeS = (editorLevel.sticks || []).length;
    editorLevel.sticks = (editorLevel.sticks || []).filter(s => Math.hypot(s.x - mx, s.y - my) > R);
    const beforeK = (editorLevel.knives || []).length;
    editorLevel.knives = (editorLevel.knives || []).filter(k => Math.hypot(k.x - mx, k.y - my) > R);
    editorLevel.stickSpawn = editorLevel.sticks[0] || null;
    editorLevel.knifeSpawn = editorLevel.knives[0] || null;
    let removed = editorLevel.walls.length < beforeW
        || editorLevel.carrots.length < beforeC
        || editorLevel.npcs.length < beforeN
        || editorLevel.sticks.length < beforeS
        || editorLevel.knives.length < beforeK;
    if (editorLevel.nannySpawn && Math.hypot(editorLevel.nannySpawn.x - mx, editorLevel.nannySpawn.y - my) < R) {
        editorLevel.nannySpawn = null;
        removed = true;
    }
    if (removed) showEditorMsg('Удалено');
}

function drawEditorScreen() {
    selectPulse += 0.05;
    if (editorMsgT > 0) editorMsgT--;

    // фон
    const g = ctx.createLinearGradient(0, 0, 900, 600);
    g.addColorStop(0, '#1a0a2e');
    g.addColorStop(1, '#0f3460');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 900, 600);

    // поле
    ctx.fillStyle = '#c8e6c9';
    ctx.fillRect(FIELD.minX, FIELD.minY, FIELD.maxX - FIELD.minX, FIELD.maxY - FIELD.minY);
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    for (let x = FIELD.minX; x <= FIELD.maxX; x += EDITOR_GRID) {
        ctx.beginPath(); ctx.moveTo(x, FIELD.minY); ctx.lineTo(x, FIELD.maxY); ctx.stroke();
    }
    for (let y = FIELD.minY; y <= FIELD.maxY; y += EDITOR_GRID) {
        ctx.beginPath(); ctx.moveTo(FIELD.minX, y); ctx.lineTo(FIELD.maxX, y); ctx.stroke();
    }
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 3;
    ctx.strokeRect(FIELD.minX, FIELD.minY, FIELD.maxX - FIELD.minX, FIELD.maxY - FIELD.minY);

    // объекты
    drawCustomWalls(editorLevel.walls);
    for (const c of editorLevel.carrots) {
        drawCarrot({ x: c.x, y: c.y, pulse: selectPulse * 2 + c.x * 0.01 });
    }
    // спавн игрока
    if (editorLevel.playerSpawn) {
        ctx.fillStyle = 'rgba(255,204,0,0.35)';
        ctx.beginPath();
        ctx.arc(editorLevel.playerSpawn.x, editorLevel.playerSpawn.y, 28, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ffcc00';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('ТЫ', editorLevel.playerSpawn.x, editorLevel.playerSpawn.y + 5);
    }
    // няня
    if (editorLevel.nannySpawn) {
        ctx.fillStyle = 'rgba(239,83,80,0.35)';
        ctx.beginPath();
        ctx.arc(editorLevel.nannySpawn.x, editorLevel.nannySpawn.y, 28, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ef5350';
        ctx.lineWidth = 3;
        ctx.stroke();
        if (images.robonanny && images.robonanny.complete) {
            try { ctx.drawImage(images.robonanny, editorLevel.nannySpawn.x - 28, editorLevel.nannySpawn.y - 28, 56, 56); }
            catch (e) {}
        }
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('НЯНЯ', editorLevel.nannySpawn.x, editorLevel.nannySpawn.y + 40);
    }
    // 👥 NPC из хранилища (в командном бою — цвет команды)
    for (const n of (editorLevel.npcs || [])) {
        const cfg = CHARACTERS.find(c => c.id === n.id);
        const isAlly = n.team === 'ally';
        const teamMode = editorLevel.playMode === 'team';
        ctx.fillStyle = teamMode
            ? (isAlly ? 'rgba(66,165,245,0.4)' : 'rgba(239,83,80,0.4)')
            : 'rgba(100,180,255,0.3)';
        ctx.beginPath();
        ctx.arc(n.x, n.y, 26, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = teamMode ? (isAlly ? '#42a5f5' : '#ef5350') : ((cfg && cfg.color) || '#4fc3f7');
        ctx.lineWidth = 3;
        ctx.stroke();
        const imgKey = (cfg && cfg.img) || n.id;
        if (images[imgKey] && images[imgKey].complete && images[imgKey].naturalWidth) {
            try { ctx.drawImage(images[imgKey], n.x - 24, n.y - 24, 48, 48); } catch (e) {}
        }
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px Arial';
        ctx.textAlign = 'center';
        const tLabel = teamMode ? (isAlly ? ' 🔵' : ' 🔴') : '';
        ctx.fillText(((cfg && cfg.name) || n.id) + tLabel, n.x, n.y + 38);
    }
    // спавны палок / ножей (несколько)
    for (const s of (editorLevel.sticks || [])) {
        drawEditorWeaponMarker(s.x, s.y, 'stick');
    }
    for (const k of (editorLevel.knives || [])) {
        drawEditorWeaponMarker(k.x, k.y, 'knife');
    }
    if (!(editorLevel.sticks || []).length && editorLevel.stickSpawn) {
        drawEditorWeaponMarker(editorLevel.stickSpawn.x, editorLevel.stickSpawn.y, 'stick');
    }
    if (!(editorLevel.knives || []).length && editorLevel.knifeSpawn) {
        drawEditorWeaponMarker(editorLevel.knifeSpawn.x, editorLevel.knifeSpawn.y, 'knife');
    }

    // preview стены
    if (wallDrag) {
        const x = Math.min(wallDrag.x0, wallDrag.x1);
        const y = Math.min(wallDrag.y0, wallDrag.y1);
        const w = Math.abs(wallDrag.x1 - wallDrag.x0);
        const h = Math.abs(wallDrag.y1 - wallDrag.y0);
        ctx.fillStyle = 'rgba(93,64,55,0.5)';
        ctx.strokeStyle = '#ffcc00';
        ctx.lineWidth = 2;
        roundRect(x, y, Math.max(w, 4), Math.max(h, 4), 4);
        ctx.fill();
        ctx.stroke();
    }

    // верхняя панель
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, 900, 115);
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('🏗️ РЕДАКТОР УРОВНЕЙ', 150, 42);
    ctx.fillStyle = '#aaa';
    ctx.font = '11px Arial';
    const nSt = (editorLevel.sticks || []).length;
    const nKn = (editorLevel.knives || []).length;
    const nHero = (editorLevel.npcs || []).length;
    const modeTag = editorLevel.playMode === 'team' ? '⚔️ бой' : '🥕 сбор';
    const alliesN = (editorLevel.npcs || []).filter(n => n.team === 'ally').length;
    const enemiesN = (editorLevel.npcs || []).filter(n => n.team !== 'ally').length;
    ctx.fillText(editorLevel.name + ' · ' + modeTag +
        (editorLevel.playMode === 'team'
            ? (' · 🔵' + alliesN + ' 🔴' + enemiesN)
            : (' · 🎯' + editorLevel.goalCarrots)) +
        ' · 🧱' + editorLevel.walls.length +
        (nHero ? ' · 👥' + nHero : '') +
        (nSt ? ' · 🪵' + nSt : '') +
        (nKn ? ' · 🔪' + nKn : ''), 150, 58);

    drawButton(ED_BTN_BACK, '← МЕНЮ', '#333', '#ffcc00', '#ffcc00');
    if (editorLevel.playMode !== 'team') {
        drawButton(ED_BTN_GOAL_M, '−', '#222', '#4deeea', '#4deeea');
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🎯' + editorLevel.goalCarrots, 815, 44);
        drawButton(ED_BTN_GOAL_P, '+', '#222', '#4deeea', '#4deeea');
    } else {
        ctx.fillStyle = '#ff8a80';
        ctx.font = 'bold 13px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('⚔️ БОЙ', 815, 44);
    }

    for (const t of ED_TOOLS) {
        const on = editorTool === t.id;
        drawButton(t, t.label, on ? '#6a1b9a' : '#222', on ? '#ffcc00' : '#888', '#fff');
    }
    drawButton(ED_BTN_PLAY, '▶ ИГРАТЬ', '#2e7d32', '#81c784', '#fff');
    drawButton(ED_BTN_SAVE, '💾', '#1565c0', '#64b5f6', '#fff');
    drawButton(ED_BTN_LOAD, '📂', '#6a1b9a', '#ce93d8', '#fff');
    drawButton(ED_BTN_CLEAR, 'ОЧИСТИТЬ', '#5d4037', '#ffab91', '#fff');
    const teamModeOn = editorLevel.playMode === 'team';
    drawButton(ED_BTN_PLAYMODE, teamModeOn ? '⚔️ БОЙ' : '🥕 СБОР',
        teamModeOn ? '#b71c1c' : '#1b5e20', teamModeOn ? '#ff8a80' : '#81c784', '#fff');
    if (teamModeOn) {
        const allyOn = editorNpcTeam === 'ally';
        drawButton(ED_BTN_TEAM, allyOn ? '🔵 СОЮЗ' : '🔴 ВРАГ',
            allyOn ? '#0d47a1' : '#b71c1c', allyOn ? '#64b5f6' : '#ef5350', '#fff');
    }

    if (editorMsg && editorMsgT > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        roundRect(250, 540, 400, 36, 10);
        ctx.fill();
        ctx.fillStyle = '#7cfc00';
        ctx.font = 'bold 15px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(editorMsg, 450, 564);
    }

    // подсказка инструмента
    const tips = {
        wall: 'Зажми ЛКМ и тяни — стена (блокирует движение)',
        carrot: 'Клик — поставить морковь',
        spawn: 'Клик — где появишься ты',
        nanny: 'Клик — где няня-охотник (ещё клик = убрать)',
        hero: editorLevel.playMode === 'team'
            ? ('Команда: ' + (editorNpcTeam === 'ally' ? '🔵 союзник' : '🔴 враг') + ' · клик = поставить · T = смена команды')
            : 'Выбери героя внизу, клик по полю — поставить (ещё клик по нему — убрать)',
        stick: 'Клик — спавн ПАЛКИ (можно несколько, подбери в игре, Пробел — удар)',
        knife: 'Клик — спавн НОЖА (можно несколько, подбери — касание бьёт няню)',
        erase: 'Клик — стереть стену / морковь / няню / героя / палку / нож'
    };
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.font = '13px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(tips[editorTool] || '', 450, editorTool === 'hero' ? 528 : 590);

    // 👥 Хранилище персонажей (палитра внизу)
    if (editorTool === 'hero') {
        const list = placeableCharacters();
        const cardW = 72, gap = 6;
        const total = list.length * cardW + (list.length - 1) * gap;
        const startX = (900 - total) / 2;
        const y = 538;
        ctx.fillStyle = 'rgba(0,0,0,0.78)';
        roundRect(startX - 12, y - 8, total + 24, 58, 12);
        ctx.fill();
        ctx.strokeStyle = '#4deeea';
        ctx.lineWidth = 2;
        ctx.stroke();
        list.forEach((ch, i) => {
            const x = startX + i * (cardW + gap);
            const on = editorCharId === ch.id;
            const hover = charStorageHover === i;
            ctx.fillStyle = on ? 'rgba(255,204,0,0.35)' : (hover ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.3)');
            roundRect(x, y, cardW, 44, 8);
            ctx.fill();
            if (on) {
                ctx.strokeStyle = '#ffcc00';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            if (images[ch.img] && images[ch.img].complete && images[ch.img].naturalWidth) {
                try { ctx.drawImage(images[ch.img], x + 4, y + 4, 36, 36); } catch (e) {}
            }
            ctx.fillStyle = on ? '#ffcc00' : '#fff';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(ch.name.slice(0, 7), x + 42, y + 26);
        });
    }

    // список сохранений
    if (levelsListOpen) {
        const list = loadSavedLevels();
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        roundRect(560, 115, 320, 360, 14);
        ctx.fill();
        ctx.strokeStyle = '#ce93d8';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('📂 Сохранённые уровни', 580, 145);
        if (!list.length) {
            ctx.fillStyle = '#aaa';
            ctx.font = '14px Arial';
            ctx.fillText('Пока пусто — нажми 💾', 580, 180);
        } else {
            list.slice(0, 10).forEach((lv, i) => {
                const y = 165 + i * 30;
                ctx.fillStyle = levelsListHover === i ? 'rgba(255,204,0,0.2)' : 'transparent';
                ctx.fillRect(575, y - 18, 290, 28);
                ctx.fillStyle = '#fff';
                ctx.font = '14px Arial';
                ctx.fillText((i + 1) + '. ' + (lv.name || 'Уровень').slice(0, 28), 585, y);
            });
        }
        ctx.fillStyle = '#888';
        ctx.font = '12px Arial';
        ctx.fillText('Клик — загрузить · Esc — закрыть', 580, 455);
    }

    if (showExitDialog) drawExitDialog();
}

function handleEditorClick(mx, my) {
    if (levelsListOpen) {
        const list = loadSavedLevels();
        if (mx >= 560 && mx <= 880 && my >= 115 && my <= 475) {
            list.slice(0, 10).forEach((lv, i) => {
                const y = 165 + i * 30;
                if (my >= y - 18 && my <= y + 10) {
                    editorLevel = cloneLevel(lv);
                    levelsListOpen = false;
                    showEditorMsg('📂 Загружен: ' + (lv.name || 'уровень'));
                }
            });
            return;
        }
        levelsListOpen = false;
        return;
    }

    if (hitBtn(ED_BTN_BACK, mx, my)) { goModeSelect(); return; }
    if (hitBtn(ED_BTN_CLEAR, mx, my)) { clearEditorLevel(); return; }
    if (hitBtn(ED_BTN_PLAYMODE, mx, my)) {
        editorLevel.playMode = editorLevel.playMode === 'team' ? 'collect' : 'team';
        showEditorMsg(editorLevel.playMode === 'team'
            ? '⚔️ Командный бой: ставь союзников 🔵 и врагов 🔴'
            : '🥕 Режим сбора морковок');
        return;
    }
    if (editorLevel.playMode === 'team' && hitBtn(ED_BTN_TEAM, mx, my)) {
        editorNpcTeam = editorNpcTeam === 'ally' ? 'enemy' : 'ally';
        showEditorMsg(editorNpcTeam === 'ally' ? '🔵 Ставим СОЮЗНИКОВ' : '🔴 Ставим ВРАГОВ');
        return;
    }
    if (hitBtn(ED_BTN_GOAL_M, mx, my)) {
        if (editorLevel.playMode === 'team') return;
        editorLevel.goalCarrots = Math.max(1, (editorLevel.goalCarrots || 5) - 1);
        return;
    }
    if (hitBtn(ED_BTN_GOAL_P, mx, my)) {
        if (editorLevel.playMode === 'team') return;
        editorLevel.goalCarrots = Math.min(99, (editorLevel.goalCarrots || 5) + 1);
        return;
    }
    if (hitBtn(ED_BTN_PLAY, mx, my)) { startCustomFromEditor(); return; }
    if (hitBtn(ED_BTN_SAVE, mx, my)) {
        const n = prompt('Название уровня:', editorLevel.name || 'Мой уровень');
        if (n) editorLevel.name = n.slice(0, 40);
        saveCurrentLevel();
        return;
    }
    if (hitBtn(ED_BTN_LOAD, mx, my)) { levelsListOpen = !levelsListOpen; return; }
    for (const t of ED_TOOLS) {
        if (hitBtn(t, mx, my)) {
            editorTool = t.id;
            if (t.id === 'hero') showEditorMsg('👥 Хранилище: выбери героя внизу');
            return;
        }
    }

    // клик по палитре хранилища персонажей
    if (editorTool === 'hero' && my >= 530) {
        const list = placeableCharacters();
        const cardW = 72, gap = 6;
        const total = list.length * cardW + (list.length - 1) * gap;
        const startX = (900 - total) / 2;
        const y = 538;
        list.forEach((ch, i) => {
            const x = startX + i * (cardW + gap);
            if (mx >= x && mx <= x + cardW && my >= y && my <= y + 44) {
                editorCharId = ch.id;
                saveCharStorage();
                showEditorMsg('👥 Выбран: ' + ch.name + ' — кликни по полю');
            }
        });
        return;
    }

    // клик по полю
    if (my < 120) return;
    if (mx < FIELD.minX || mx > FIELD.maxX || my < FIELD.minY || my > FIELD.maxY) return;

    editorLevel = normalizeLevel(editorLevel);

    if (editorTool === 'erase') { eraseAt(mx, my); return; }
    if (editorTool === 'carrot') {
        editorLevel.carrots.push({ x: snapGrid(mx), y: snapGrid(my) });
        showEditorMsg('🥕 +1 морковь');
        return;
    }
    if (editorTool === 'spawn') {
        editorLevel.playerSpawn = { x: snapGrid(mx), y: snapGrid(my) };
        showEditorMsg('⭐ Спавн игрока');
        return;
    }
    if (editorTool === 'nanny') {
        const sx = snapGrid(mx), sy = snapGrid(my);
        if (editorLevel.nannySpawn && Math.hypot(editorLevel.nannySpawn.x - sx, editorLevel.nannySpawn.y - sy) < 40) {
            editorLevel.nannySpawn = null;
            showEditorMsg('Няня убрана');
        } else {
            editorLevel.nannySpawn = { x: sx, y: sy };
            showEditorMsg('🤖 Няня поставлена');
        }
        return;
    }
    if (editorTool === 'hero') {
        const sx = snapGrid(mx), sy = snapGrid(my);
        // клик по уже стоящему — убрать
        const near = (editorLevel.npcs || []).findIndex(n => Math.hypot(n.x - sx, n.y - sy) < 36);
        if (near >= 0) {
            const removed = editorLevel.npcs.splice(near, 1)[0];
            const cfg = CHARACTERS.find(c => c.id === removed.id);
            showEditorMsg('👥 Убран: ' + ((cfg && cfg.name) || removed.id));
            return;
        }
        if ((editorLevel.npcs || []).length >= 12) {
            showEditorMsg('Максимум 12 героев на уровне');
            return;
        }
        const team = editorLevel.playMode === 'team' ? editorNpcTeam : 'enemy';
        editorLevel.npcs.push({ id: editorCharId, x: sx, y: sy, team: team });
        const cfg = CHARACTERS.find(c => c.id === editorCharId);
        const teamMark = editorLevel.playMode === 'team' ? (team === 'ally' ? ' 🔵' : ' 🔴') : '';
        showEditorMsg('👥 +' + ((cfg && cfg.name) || editorCharId) + teamMark);
        return;
    }
    if (editorTool === 'stick') {
        const sx = snapGrid(mx), sy = snapGrid(my);
        if (!editorLevel.sticks) editorLevel.sticks = [];
        const near = editorLevel.sticks.findIndex(s => Math.hypot(s.x - sx, s.y - sy) < 36);
        if (near >= 0) {
            editorLevel.sticks.splice(near, 1);
            editorLevel.stickSpawn = editorLevel.sticks[0] || null;
            showEditorMsg('🪵 Палка убрана');
        } else {
            editorLevel.sticks.push({ x: sx, y: sy });
            editorLevel.stickSpawn = editorLevel.sticks[0];
            showEditorMsg('🪵 Спавн палки ×' + editorLevel.sticks.length);
        }
        return;
    }
    if (editorTool === 'knife') {
        const sx = snapGrid(mx), sy = snapGrid(my);
        if (!editorLevel.knives) editorLevel.knives = [];
        const near = editorLevel.knives.findIndex(k => Math.hypot(k.x - sx, k.y - sy) < 36);
        if (near >= 0) {
            editorLevel.knives.splice(near, 1);
            editorLevel.knifeSpawn = editorLevel.knives[0] || null;
            showEditorMsg('🔪 Нож убран');
        } else {
            editorLevel.knives.push({ x: sx, y: sy });
            editorLevel.knifeSpawn = editorLevel.knives[0];
            showEditorMsg('🔪 Спавн ножа ×' + editorLevel.knives.length);
        }
        return;
    }
    // wall starts on mousedown — handled separately
}

function handleEditorMouseDown(mx, my) {
    if (levelsListOpen || my < 120) return;
    if (editorTool !== 'wall') return;
    if (mx < FIELD.minX || mx > FIELD.maxX || my < FIELD.minY || my > FIELD.maxY) return;
    wallDrag = { x0: snapGrid(mx), y0: snapGrid(my), x1: snapGrid(mx), y1: snapGrid(my) };
}

function handleEditorMouseMove(mx, my) {
    if (wallDrag) {
        wallDrag.x1 = Math.max(FIELD.minX, Math.min(FIELD.maxX, snapGrid(mx)));
        wallDrag.y1 = Math.max(FIELD.minY, Math.min(FIELD.maxY, snapGrid(my)));
    }
    if (levelsListOpen) {
        levelsListHover = -1;
        const list = loadSavedLevels();
        list.slice(0, 10).forEach((lv, i) => {
            const y = 165 + i * 30;
            if (mx >= 575 && mx <= 865 && my >= y - 18 && my <= y + 10) levelsListHover = i;
        });
    }
    // hover палитры героев
    charStorageHover = -1;
    if (editorTool === 'hero') {
        const list = placeableCharacters();
        const cardW = 72, gap = 6;
        const total = list.length * cardW + (list.length - 1) * gap;
        const startX = (900 - total) / 2;
        const y = 538;
        list.forEach((ch, i) => {
            const x = startX + i * (cardW + gap);
            if (mx >= x && mx <= x + cardW && my >= y && my <= y + 44) charStorageHover = i;
        });
    }
}

function setGola(ent) {

function tryTransferGola() {
    if (!gola || gameOver || tagCooldown > 0) return;
    const targets = tagParticipants().filter(e => e !== gola);
    for (const t of targets) {
        if (dist(gola, t) < TAG_RADIUS) {
            // оттолкнуть старую голю чуть назад
            const dx = t.x - gola.x;
            const dy = t.y - gola.y;
            const len = Math.hypot(dx, dy) || 1;
            moveEntity(gola, -(dx / len) * 28, -(dy / len) * 28);
            moveEntity(t, (dx / len) * 18, (dy / len) * 18);
            setGola(t);
            return;
        }
    }
}

/** AI: голя бежит к ближайшему, остальные убегают от голи */
function updateTagAI() {
    if (!gola || gameOver) return;
    const all = tagParticipants();
    for (const ent of all) {
        if (ent === player) continue; // игрока двигает updatePlayer
        if (ent === gola) {
            // голя (AI) — к ближайшей жертве
            let best = null, bestD = Infinity;
            for (const v of all) {
                if (v === ent) continue;
                const d = dist(ent, v);
                if (d < bestD) { bestD = d; best = v; }
            }
            if (best) {
                const dx = best.x - ent.x;
                const dy = best.y - ent.y;
                const len = Math.hypot(dx, dy) || 1;
                const boost = len < 140 ? 1.15 : 1.0;
                moveEntity(ent, (dx / len) * ent.speed * boost, (dy / len) * ent.speed * boost);
            }
        } else {
            // убегать от голи
            const d = dist(ent, gola);
            const dx = ent.x - gola.x;
            const dy = ent.y - gola.y;
            const len = Math.hypot(dx, dy) || 1;
            ent.fleeAngle = (ent.fleeAngle || 0) + (Math.random() - 0.5) * 0.2;
            const nx = dx / len + Math.cos(ent.fleeAngle) * 0.4;
            const ny = dy / len + Math.sin(ent.fleeAngle) * 0.4;
            const nlen = Math.hypot(nx, ny) || 1;
            const panic = d < 100 ? 1.35 : (d < 200 ? 1.15 : 0.9);
            if (d < 220) {
                moveEntity(ent, (nx / nlen) * ent.speed * panic, (ny / nlen) * ent.speed * panic);
            } else {
                ent.wander = (ent.wander || 0) + 0.05;
                if (Math.random() < 0.02) ent.wander = Math.random() * Math.PI * 2;
                moveEntity(ent, Math.cos(ent.wander) * ent.speed * 0.6, Math.sin(ent.wander) * ent.speed * 0.6);
            }
        }
        if (ent.isPacman) {
            ent.mouth = (ent.mouth + 0.25) % (Math.PI * 2);
        }
    }
}

function updateTagRound() {
    if (gameOver) return;
    if (tagCooldown > 0) tagCooldown--;
    if (lastTagFlash > 0) lastTagFlash--;
    chasePulse += 0.08;

    // считаем время в роли голи
    if (gola && gola.name) {
        tagTimeAsGola[gola.name] = (tagTimeAsGola[gola.name] || 0) + 1;
    }

    if (tagTimer > 0) {
        tagTimer--;
        if (tagTimer <= 0) {
            finishTag();
        }
    }
}

function finishTag() {
    if (gameOver) return;
    gameOver = true;
    gameplayStop();
    showFullscreenAd();
    // меньше всего был голей — лучше (1 место)
    const all = tagParticipants();
    // добавить всех, кто был в tagTimeAsGola
    const names = new Set(Object.keys(tagTimeAsGola));
    for (const e of all) if (e && e.name) names.add(e.name);

    const ranked = [];
    for (const name of names) {
        let ent = all.find(e => e && e.name === name);
        if (!ent) {
            // выбывших нет — ищем среди известных
            if (player && player.name === name) ent = player;
            else if (nanny && nanny.name === name) ent = nanny;
            else if (pacman && pacman.name === name) ent = pacman;
            else if (npcs) ent = npcs.find(n => n && n.name === name);
        }
        if (!ent) continue;
        ranked.push({
            name: ent.name,
            displayName: ent.displayName || ent.name,
            img: ent.img || ent.name,
            carrots: 0,
            golaFrames: tagTimeAsGola[name] || 0,
            golaSec: Math.round((tagTimeAsGola[name] || 0) / FPS_EST)
        });
    }
    ranked.sort((a, b) => {
        if (a.golaFrames !== b.golaFrames) return a.golaFrames - b.golaFrames;
        return String(a.displayName).localeCompare(String(b.displayName), 'ru');
    });

    finalRanking = {
        first: ranked[0] || null,
        second: ranked[1] || null,
        third: ranked[2] || null,
        last: ranked.length ? ranked[ranked.length - 1] : null,
        all: ranked,
        winner: ranked[0] || null
    };
    gameWon = !!(ranked[0] && player && ranked[0].name === player.name);
    playerDead = false;
    const wName = ranked[0] ? ranked[0].displayName : '???';
    document.getElementById('hint').textContent =
        '🏁 Голя окончена! Меньше всех водящим: ' + wName + ' | Enter — заново | R — выбор';
}

function fighterRankEntry(ent) {
    if (!ent) return null;
    return {
        name: ent.name,
        displayName: ent.displayName || ent.name || '???',
        img: ent.img || ent.name,
        carrots: ent.carrots || 0
    };
}

/** Все, кто может собирать морковь (не няня) */
function carrotCollectors() {
    const list = [];
    if (player && !player.dead && player.hp > 0 && !playerDead) list.push(player);
    if (npcs) {
        for (const n of npcs) {
            if (n && !n.dead && n.hp > 0) list.push(n);
        }
