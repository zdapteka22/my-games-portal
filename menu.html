<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Меню игр — Портал</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(255, 0, 200, .2), transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 204, 0, .18), transparent 45%),
        linear-gradient(160deg, #0a0a14, #12122a 45%, #0a1a28);
      overflow-x: hidden;
    }
    .bg-stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(2px 2px at 20% 30%, #fff8, transparent),
        radial-gradient(2px 2px at 60% 70%, #fff6, transparent),
        radial-gradient(1px 1px at 80% 20%, #fff7, transparent),
        radial-gradient(1px 1px at 40% 80%, #fff5, transparent);
    }
    .wrap {
      position: relative; z-index: 1;
      max-width: 980px; margin: 0 auto;
      padding: 28px 16px 48px;
    }
    .title-block { text-align: center; margin-bottom: 22px; }
    .badge {
      display: inline-block;
      background: rgba(255,204,0,.15);
      border: 1px solid rgba(255,204,0,.45);
      color: #ffcc00;
      font-weight: 800; font-size: 13px;
      padding: 6px 14px; border-radius: 999px; margin-bottom: 12px;
    }
    h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      color: #ffcc00;
      text-shadow: 0 0 30px rgba(255, 0, 255, .35), 0 4px 0 #8a6000;
      line-height: 1.15;
    }
    h1 span {
      display: block; font-size: .45em; color: #fff;
      text-shadow: none; font-weight: 700; margin-top: 8px; opacity: .9;
    }
    .sub { margin-top: 10px; color: rgba(255,255,255,.75); font-size: 1rem; }
    .actions-top {
      display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
      margin: 18px 0 8px;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 48px; padding: 0 22px;
      border-radius: 14px; font-weight: 800; font-size: 1rem;
      text-decoration: none; border: none; cursor: pointer;
      transition: transform .12s, filter .12s;
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
    .btn-main {
      background: linear-gradient(135deg, #ffcc00, #ff9f1c);
      color: #2a1200;
      box-shadow: 0 6px 0 #b87a00, 0 10px 28px rgba(255,160,0,.35);
      min-width: 200px; min-height: 56px; font-size: 1.1rem;
    }
    .btn-ghost {
      background: rgba(255,255,255,.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,.25);
    }
    .section-title {
      margin: 28px 0 12px; font-size: 1.15rem; color: #ffcc00;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::after {
      content: ""; flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(255,204,0,.5), transparent);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    a.card {
      display: flex; flex-direction: column;
      background: rgba(0,0,0,.35);
      border: 2px solid rgba(255,255,255,.12);
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 12px 30px rgba(0,0,0,.3);
      transition: transform .15s, border-color .15s, box-shadow .15s;
    }
    a.card:hover {
      transform: translateY(-4px) scale(1.01);
      border-color: #ffcc00;
      box-shadow: 0 16px 40px rgba(255, 0, 200, .15);
    }
    .card-art {
      height: 120px;
      display: flex; align-items: center; justify-content: center;
      position: relative; font-size: 48px;
    }
    .card-art img {
      width: 88px; height: 88px; object-fit: contain;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,.45));
    }
    .card-art .num {
      position: absolute; top: 10px; left: 12px;
      width: 28px; height: 28px; border-radius: 8px;
      background: rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.2);
      display: grid; place-items: center;
      font-weight: 800; font-size: 13px; color: #ffcc00;
    }
    .card-body { padding: 14px 16px 16px; }
    .card-body h2 { font-size: 1.05rem; margin: 0 0 6px; color: #fff; line-height: 1.25; }
    .card-body p {
      margin: 0 0 12px; color: rgba(255,255,255,.65);
      font-size: .88rem; line-height: 1.4; min-height: 2.5em;
    }
    .play-bar {
      display: flex; align-items: center; justify-content: center;
      height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, #ffcc00, #ff9f1c);
      color: #2a1200; font-weight: 800;
    }
    .keys {
      margin-top: 28px;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      padding: 16px 18px;
      color: rgba(255,255,255,.75);
      font-size: .9rem; line-height: 1.55;
    }
    .keys b { color: #ffcc00; }
    kbd {
      display: inline-block; min-width: 1.4em; padding: 2px 7px;
      border-radius: 6px; border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.08); font-size: .8rem; color: #ffcc00;
    }
    footer {
      margin-top: 24px; text-align: center;
      color: rgba(255,255,255,.45); font-size: .85rem;
    }
    footer a { color: #ffcc00; }
  </style>
</head>
<body>
  <div class="bg-stars"></div>
  <div class="wrap">
    <div class="title-block">
      <div class="badge">МЕНЮ ИГР</div>
      <h1>
        Портал игр
        <span>Выбери игру и нажми «Играть»</span>
      </h1>
      <p class="sub">Игра откроется в новой вкладке браузера</p>
      <div class="actions-top">
        <a class="btn btn-main" href="games/minis/snake.html" target="_blank" rel="noopener">▶ Змейка</a>
        <a class="btn btn-ghost" href="index.html">← На главную</a>
      </div>
    </div>

    <div class="section-title">Классика</div>
    <div class="grid" id="classicsGrid"></div>

    <div class="section-title">Другие игры</div>
    <div class="grid" id="otherGrid"></div>

    <div class="keys">
      <b>Подсказка:</b> клавиши <kbd>1</kbd>–<kbd>9</kbd> быстро открывают игру из списка.
      На странице каждой игры — своё управление (WASD, стрелки, пробел…).
    </div>

    <footer>
      <a href="index.html">Главная</a> ·
      <a href="games/smeshariki/index.html">Смешарики (страница игры)</a>
    </footer>
  </div>

  <script>
    const CLASSICS = [
      {
        title: "Змейка",
        desc: "Ешь, расти, не врежься в стены",
        url: "games/minis/snake.html",
        emoji: "🐍",
        bg: "linear-gradient(145deg,#0a3a1a,#062a10)"
      },
      {
        title: "Пакман",
        desc: "Собирай точки и убегай от призраков",
        url: "games/minis/pacman.html",
        img: "images/niouuutk7kxy85x5teac44aq0996llta.png",
        emoji: "🟡",
        bg: "linear-gradient(145deg,#0a0a40,#1a1a6a)"
      },
      {
        title: "Зелёный Марио (9 уровней)",
        desc: "Платформер: монеты, враги, флаг",
        url: "games/minis/mario.html",
        img: "images/e091479ed98337ac93d30276ab079ea8.jpg",
        emoji: "🍄",
        bg: "linear-gradient(145deg,#5c94fc,#00a800)"
      }
    ];

    const OTHERS = [
      {
        title: "Смешарики: Битва и Догонялки",
        desc: "Страница игры: режимы, персонажи, управление и старт",
        url: "games/smeshariki/index.html",
        img: "games/smeshariki/images/smeshariki_kruglaya_kompaniya-square.jpg",
        bg: "linear-gradient(145deg,#2d1b4e,#0f3460)"
      },
      {
        title: "Смешарики — сразу играть",
        desc: "Открыть canvas-игру без описания",
        url: "games/smeshariki/game.html",
        img: "games/smeshariki/images/smeshariki_kruglaya_kompaniya-square.jpg",
        bg: "linear-gradient(145deg,#1a0a2e,#0f3460)"
      }
    ];

    function cardHtml(g, i) {
      const art = g.img
        ? `<img src="${g.img}" alt="" onerror="this.outerHTML='<span style=\\'font-size:48px\\'>${g.emoji || "🎮"}</span>'">`
        : `<span>${g.emoji || "🎮"}</span>`;
      const sameTab = /mario\.html/i.test(g.url);
      const tgt = sameTab ? "" : ` target="_blank" rel="noopener"`;
      return `
        <a class="card" href="${g.url}"${tgt} data-i="${i}">
          <div class="card-art" style="background:${g.bg}">
            <span class="num">${i}</span>
            ${art}
          </div>
          <div class="card-body">
            <h2>${g.title}</h2>
            <p>${g.desc}</p>
            <div class="play-bar">▶ Играть</div>
          </div>
        </a>`;
    }

    const all = [...CLASSICS, ...OTHERS];
    document.getElementById("classicsGrid").innerHTML = CLASSICS.map((g, i) => cardHtml(g, i + 1)).join("");
    document.getElementById("otherGrid").innerHTML = OTHERS.map((g, i) => cardHtml(g, CLASSICS.length + i + 1)).join("");

    document.addEventListener("keydown", (e) => {
      const n = parseInt(e.key, 10);
      if (n >= 1 && n <= Math.min(9, all.length)) {
        e.preventDefault();
        const g = all[n - 1];
        if (/mario\.html/i.test(g.url)) window.location.href = g.url;
        else window.open(g.url, "_blank", "noopener");
      }
    });
  </script>
</body>
</html>
